bonus_ux_gaps_and_edge_cases:
  - >-
    Invalid or unknown osac-entry on cold load is ignored per welcome entry_bootstrap; user
    remains able to pick a persona from the welcome page.
  - Login forms accept empty password; no client validation_error state in prototype.
  - Forgot password, Help, Settings masthead actions are no-ops (preventDefault only).
  - Account settings menu item prevents default with no navigation.
  - Provider admin Network topology wires onOpenVirtualMachineDetail to a stub (no handoff to VM detail).
  - Vertexa tenant user path is not used for VM creation from catalog (App guards selectedDemoTenant === vertexa for template/new provision).
  - Trusted token issuers load only when VITE_FULFILLMENT_API_URL is set; otherwise undefined with no explicit error UI.
  - Session persistence across refresh is absent (all client state).

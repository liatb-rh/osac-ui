  - >-
    Bluestone Financial Group on the welcome card maps to demo tenant id evergreen; osac-entry
    values remain evergreen-user and evergreen-admin for optional deep links.
  - >-
    Tenant org User/Admin paths use wrs_welcome_landing → wrs_role_selected_pre_auth →
    auth_sign_in_form in the same tab, matching Provider Admin.


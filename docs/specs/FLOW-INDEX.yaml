flows:
  # ── Auth flows ────────────────────────────────────────────────────────────
  - id: welcome-and-role-selection
    file: ui-flows/welcome-and-role-selection.yaml
    primary_routes: []          # pre-auth, no route
    roles: [providerAdmin, tenantAdmin, tenantUser]
    summary: >-
      Pre-auth landing page.  Four persona cards (Vertexa ProviderAdmin, Serve Robotics
      User/Admin, T-Mobile User/Admin).  Selecting a card writes tenant+role to
      SessionContext and navigates to institutional sign-in.  Supports cold-load
      ?osac-entry=northstar-user|northstar-admin|evergreen-user|evergreen-admin deep link.
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/pages/auth/WelcomePage.tsx
        - apps/app-frontend/src/contexts/SessionContext.tsx
      deployment_variants: [standalone]

  - id: institutional-sign-in
    file: ui-flows/institutional-sign-in.yaml
    primary_routes: []          # auth pages, no shell route
    roles: [providerAdmin, tenantAdmin, tenantUser]
    summary: >-
      Branded sign-in shell (InstitutionalSignInPage) with per-tenant logo, accent, and
      copy (Vertexa, Northstar Bank/Serve Robotics, T-Mobile).  Submitting the form
      triggers a 2-second simulated login delay, then routes to defaultRouteForRole.
      Back link returns to WelcomePage.
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/pages/auth/InstitutionalSignInPage.tsx
        - apps/app-frontend/src/pages/auth/SignInPage.tsx
        - apps/app-frontend/src/components/login/LoginForm.tsx
        - apps/app-frontend/src/components/login/institutionalBranding.ts
      deployment_variants: [standalone]

  # ── Shell ─────────────────────────────────────────────────────────────────
  - id: application-shell-session
    file: ui-flows/application-shell-session.yaml
    primary_routes:
      - /*  # wraps all authenticated routes via AppShell
    roles: [providerAdmin, tenantAdmin, tenantUser]
    summary: >-
      Authenticated page shell — PatternFly Page with masthead (role/tenant identity,
      theme toggle, account menu, logout, recent-activities bell), sidebar nav
      (role-gated sections: Services, Resources, Roadmap Preview, Account), and
      breadcrumb.  Nav items are filtered at navRowsForRole(role).  Dark theme toggled
      via isDarkTheme → pf-v6-theme-dark root class.
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/pages/AppShell.tsx
        - apps/app-frontend/src/pages/shell/shellNav.ts
        - apps/app-frontend/src/pages/shell/shellRoutes.ts
        - apps/app-frontend/src/pages/shell/ShellMasthead.tsx
        - apps/app-frontend/src/pages/shell/ShellSidebar.tsx
        - apps/app-frontend/src/pages/shell/ShellBreadcrumb.tsx
      deployment_variants: [standalone]

  # ── Tenant services ───────────────────────────────────────────────────────
  - id: tenant-catalog
    file: ui-flows/tenant-catalog.yaml
    primary_routes:
      - /catalog-items
    roles: [tenantUser]
    summary: >-
      Tenant user catalog — browse published + tenant-enabled catalog items (VM, Cluster,
      BareMetal types) as filter-able cards.  Clicking a VM card navigates to /vms with
      ?catalogItem=<id>, auto-opening the CreateVmWizard pre-seeded to that template.
      Cluster cards open LaunchInstanceWizard.  Search + type-filter chip bar.
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/pages/services/catalog/CatalogItemsPage.tsx
        - apps/app-frontend/src/pages/services/catalog/catalogItemsStore.ts
        - apps/app-frontend/src/components/instances/LaunchInstanceWizard.tsx
      deployment_variants: [standalone]

  - id: manage-virtual-machines
    file: ui-flows/manage-virtual-machines.yaml
    primary_routes:
      - /vms
      - /vms/:id
    roles: [tenantUser, tenantAdmin]
    summary: >-
      VM lifecycle management.  List view (table with search + status filter: All/Running/Stopped),
      per-row ActionsColumn (Start/Stop/Restart/Open console/Delete).  Clicking a row navigates
      to full-page detail (/vms/:id) with KPI bar (state, vCPU, memory, IP) and tabs
      (Overview, Networking, Storage, Activity).  Create VM button (tenantUser only) opens
      CreateVmWizard modal.  Delete triggers VmDeleteConfirmModal; auto-stop if running.
      Pending creations and deletes tracked optimistically via usePendingVmCreations /
      usePendingVmDeletes.
    deferred:
      - Clone VM (WIZARD_TEMPLATE_ONLY — openFromClone is no-op)
      - VmDangerZoneTab (commented out)
      - VmMetricsTab (not connected to real data)
      - VmSnapshotsTab (not present in active tabs)
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/pages/services/vms/VmsPage.tsx
        - apps/app-frontend/src/pages/services/vms/VmDetailPage.tsx
        - apps/app-frontend/src/components/vm/createVmWizard/CreateVmWizard.tsx
        - apps/app-frontend/src/components/vm/VmDeleteConfirmModal.tsx
        - apps/app-frontend/src/components/vm/tabs/
      deployment_variants: [standalone]

  - id: create-virtual-machine-wizard
    file: ui-flows/create-virtual-machine-wizard.yaml
    primary_routes: []          # modal overlay on /vms
    roles: [tenantUser, tenantAdmin]
    summary: >-
      PatternFly Wizard inside Modal (large variant, ~980px).  Three active steps:
      Templates → Customization → Review.  BFF session lifecycle: POST /api/wizard/v1/sessions
      (start), POST .../advance (per step), POST .../finalize (submit), POST .../abandon (cancel).
      Template step fetches compute_instance_templates.  Customization captures VM name, boot
      disk, cores, memory, additional disks.  Review shows full spec before provisioning.
    deferred:
      - Deployment mode picker (DeploymentStep)
      - Guest OS step (GuestOsStep)
      - Boot source step (BootSourceStep)
      - Compute step (ComputeStep)
      - Clone source step (CloneSourceStep)
    implementation_status:
      as_of: "2026-06-18"
      code_refs:
        - apps/app-frontend/src/components/vm/createVmWizard/CreateVmWizard.tsx
        - apps/app-frontend/src/components/vm/createVmWizard/stepIds.ts
        - apps/app-frontend/src/components/vm/createVmWizard/constants.ts
        - apps/app-frontend/src/components/vm/createVmWizard/steps/
        - apps/app-frontend/src/api/createVmWizardClient.ts
      deployment_variants: [standalone]

  - id: manage-clusters
    file: ui-flows/manage-clusters.yaml
    primary_routes:
      - /clusters
      - /clusters/:id
    roles: [tenantUser]
    summary: >-

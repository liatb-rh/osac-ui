# OSAC UI — flow specification index
# Repository: Projects/osac-ui  (monorepo: apps/app-frontend, apps/app-backend, libs/*)
# Generated: 2026-06-18  Blueprint Extraction Agent v1
# This file is the source of truth for all user journeys, canonical step ids, and
# cross-flow wiring.  Read this file first, then rbac.yaml, then statecharts/, then ui-flows/.

version: 2
repository_path: Projects/osac-ui
generated_for: spec-driven UI implementation, QA, and design alignment
project: OSAC (Open Source Cloud — multi-tenant IaaS UI)

ai-hints:
  summary: >-
    Master catalog for OSAC UI flow specs (osac-ui monorepo).  Three personas — providerAdmin
    (Vertexa), tenantAdmin, tenantUser — drive role-gated navigation.  Session state lives in
    SessionContext (no refresh persistence).  BFF runs on Fastify at /api/fulfillment/v1 and
    /api/events/v1; all primary data flows through React Query.  Canonical read order:
    FLOW-INDEX → rbac.yaml → statecharts/<id>.statechart.yaml → ui-flows/<id>.yaml →
    design-system.yaml → backend-api.yaml.
  readOrder:
    - FLOW-INDEX.yaml
    - rbac.yaml
    - statecharts/<flow-id>.statechart.yaml
    - ui-flows/<flow-id>.yaml
    - design-system.yaml
    - backend-api.yaml

design_system_spec:
  file: design-system.yaml
  summary: >-
    PatternFly 6 visual policy — required packages (PF 6.4.x), token-based theming,
    page/shell layout, a11y, topology canvas, and flow_component_mapping.

rbac_spec:
  file: rbac.yaml
  summary: >-
    Three roles (providerAdmin, tenantAdmin, tenantUser) with semantic permission ids
    and role_permission_matrix.  Nav visibility is role-gated at shellNav.ts.

backend_spec:
  file: backend-api.yaml
  summary: >-
    BFF + fulfillment-service REST contracts (/api/fulfillment/v1), event watch,
    console access, wire format (snake_case JSON), and data_requirements_by_flow.

statechart_specs:
  directory: statecharts/
  convention: >-
    One <flow-id>.statechart.yaml per flow.  States = screens/modals/wizard-steps.
    Events = SCREAMING_SNAKE_CASE.  Guards = can(role, "permission_id").
    external = cross-flow delegation.
  files:
    - id: welcome-and-role-selection
      file: statecharts/welcome-and-role-selection.statechart.yaml
    - id: institutional-sign-in
      file: statecharts/institutional-sign-in.statechart.yaml
    - id: application-shell-session
      file: statecharts/application-shell-session.statechart.yaml
    - id: manage-virtual-machines
      file: statecharts/manage-virtual-machines.statechart.yaml
    - id: create-virtual-machine-wizard
      file: statecharts/create-virtual-machine-wizard.statechart.yaml
    - id: tenant-catalog
      file: statecharts/tenant-catalog.statechart.yaml
    - id: manage-clusters
      file: statecharts/manage-clusters.statechart.yaml
    - id: manage-networks
      file: statecharts/manage-networks.statechart.yaml
    - id: manage-public-ips
      file: statecharts/manage-public-ips.statechart.yaml
    - id: manage-storage-volumes
      file: statecharts/manage-storage-volumes.statechart.yaml
    - id: manage-storage-tiers
      file: statecharts/manage-storage-tiers.statechart.yaml
    - id: manage-storage-backends
      file: statecharts/manage-storage-backends.statechart.yaml
    - id: manage-baremetal
      file: statecharts/manage-baremetal.statechart.yaml
    - id: manage-baremetal-inventory
      file: statecharts/manage-baremetal-inventory.statechart.yaml
    - id: manage-catalog-items
      file: statecharts/manage-catalog-items.statechart.yaml
    - id: manage-global-templates
      file: statecharts/manage-global-templates.statechart.yaml
    - id: manage-agents
      file: statecharts/manage-agents.statechart.yaml
    - id: manage-cluster-offerings
      file: statecharts/manage-cluster-offerings.statechart.yaml
    - id: manage-provider-public-ip-pools
      file: statecharts/manage-provider-public-ip-pools.statechart.yaml
    - id: manage-network-classes
      file: statecharts/manage-network-classes.statechart.yaml
    - id: recent-activities
      file: statecharts/recent-activities.statechart.yaml
    - id: vm-console-demo
      file: statecharts/vm-console-demo.statechart.yaml
    - id: manage-organizations

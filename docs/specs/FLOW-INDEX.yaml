# OSAC demo — flow specification index (agentic SDLC)
# Source prototype: Projects/osac-demo/src (App.tsx orchestrates shell, auth, nav)
# Visual implementation: PatternFly 6 — see design-system.yaml (packages, tokens, layout, a11y).
#
# Each file under ui-flows/ is self-contained: steps, transitions, and inferred states.
# Cross-flow links are named actions (same string in multiple files where applicable).

version: 1
repository_path: Projects/osac-demo
generated_for: spec-driven UI implementation and QA

ai-hints:
  summary: >-
    Master catalog for OSAC UX flow specs. Read this file first, then rbac.yaml for role and
    permission definitions, statecharts for machine semantics, ui-flows for UX detail, then
    design-system.yaml and backend-fulfillment.yaml for implementation constraints.
    For **dev/real** SPA↔fulfillment integration (OIDC via capabilities, BFF proxy matrix including
    events and console paths, client/hooks for orgs/users/networks/events, replacing VM_TEMPLATES/DEMO_*,
    TS alignment, utilization chart gap), see **context.osac_real_api_integration** in
    backend-fulfillment.yaml; mock mode remains unchanged per that section.
  readOrder:
    - FLOW-INDEX.yaml
    - rbac.yaml
    - template-catalog-wizard-api-alignment.yaml
    - statecharts/<flow-id>.statechart.yaml
    - ui-flows/<flow-id>.yaml
    - design-system.yaml
    - backend-fulfillment.yaml

design_system_spec:
  file: design-system.yaml
  summary: >-
    Single source for PatternFly 6 visual policy — required packages, page/shell layout, design tokens
    and theming, accessibility, charts/topology notes, and mapping from reusable_components_across_flows to PF primitives.

rbac_spec:
  file: rbac.yaml
  summary: Canonical role and permission manifest used by UX flow gating and statechart guards.

statechart_specs:
  directory: statecharts/
  convention: One <flow-id>.statechart.yaml per flow; step ids mirror ui-flows transitions and guards map to rbac permissions.
  files:
    - id: welcome-and-role-selection
      file: statecharts/welcome-and-role-selection.statechart.yaml
    - id: institutional-sign-in
      file: statecharts/institutional-sign-in.statechart.yaml
    - id: application-shell-session
      file: statecharts/application-shell-session.statechart.yaml
    - id: tenant-user-dashboard
      file: statecharts/tenant-user-dashboard.statechart.yaml
    - id: vm-template-catalog
      file: statecharts/vm-template-catalog.statechart.yaml
    - id: create-virtual-machine-wizard
      file: statecharts/create-virtual-machine-wizard.statechart.yaml
    - id: manage-virtual-machines
      file: statecharts/manage-virtual-machines.statechart.yaml
    - id: recent-activities
      file: statecharts/recent-activities.statechart.yaml
    - id: tenant-administration
      file: statecharts/tenant-administration.statechart.yaml
    - id: provider-administration
      file: statecharts/provider-administration.statechart.yaml
    - id: vm-console-standalone-demo
      file: statecharts/vm-console-standalone-demo.statechart.yaml
    - id: cluster-service-catalog
      file: statecharts/cluster-service-catalog.statechart.yaml

implementation_specs:
  - id: osac-fullstack-demo-implementation
    file: demo-application-build-spec.yaml
    summary: >-
      Agent-executable monorepo build order for Projects/osac (BFF, UI, contracts, tests,
      deploy) tied to this FLOW-INDEX, ui-flows/, and backend-fulfillment.yaml.
  - id: template-catalog-wizard-api-alignment
    file: template-catalog-wizard-api-alignment.yaml
    summary: >-
      Catalog + CreateVmWizard template step share GET compute_instance_templates; copy-paste **implementer_agent.prompt_implementation**.

backend_specs:
  - id: fulfillment-service-rest-grpc
    file: backend-fulfillment.yaml
    summary: >-
      Agentic OpenAPI-like contract for osac-project/fulfillment-service (public
      /api/fulfillment/v1, events, console access, private /api/private/v1) aligned
      to UX flow specs.

flows:
  - id: welcome-and-role-selection
    file: ui-flows/welcome-and-role-selection.yaml
    summary: >-
      Welcome landing titled Red Hat OSAC Prototypes — every demo persona (Provider Admin, tenant org User/Admin for Northstar
      Bank and Bluestone Financial Group) applies tenant and role in session then navigates to
      institutional sign-in in the same tab; optional osac-entry cold load is documented in
      routing_matrix and entry_bootstrap in that file.
  - id: institutional-sign-in
    file: ui-flows/institutional-sign-in.yaml
    summary: >-
      Institutional sign-in uses one configurable shell (InstitutionalSignInPage) for Vertexa,
      Northstar, and Bluestone; branding_profiles supply per-tenant copy and affordances.
      Trusted issuers optional; post-login delay then role-specific shell (tenant user vs tenant admin vs provider admin).
  - id: application-shell-session
    file: ui-flows/application-shell-session.yaml
    summary: >-
      Masthead identity, operating mode label, tenant trust strip, and sidebar nav differ by role;
      theme, account menu, logout, breadcrumb for recent activities; Vertexa aggregates tenant VMs in prototype.
  - id: tenant-user-dashboard
    file: ui-flows/tenant-user-dashboard.yaml
    summary: >-
      VMaaS home — power-state KPI cards derived from normalized compute_instances list (not static demo counts when API data exists);
      create VM; deep links into My VMs with filters. Recent activities sidebar in dev per backend-fulfillment.yaml osac_bff_runtime_modes.
  - id: vm-template-catalog
    file: ui-flows/vm-template-catalog.yaml
    summary: >-
      Template gallery (tenant/admin/provider); data from GET **compute_instance_templates** per template-catalog-wizard-api-alignment.yaml;
      opens create wizard from template.
  - id: create-virtual-machine-wizard
    file: ui-flows/create-virtual-machine-wizard.yaml
    summary: >-
      Modal PatternFly Wizard — template path uses **same** compute_instance_templates inventory as catalog (shared query); BFF sessions for advance/finalize.
  - id: manage-virtual-machines
    file: ui-flows/manage-virtual-machines.yaml
    summary: >-
      My VMs list/cards/table aligned with fulfillment compute_instances wire format after normalization (resources, IP, conditions);
      filters, detail drawer, power lifecycle (start/stop/restart/delete; clone/migrate not in menu), console demo launch.
  - id: recent-activities
    file: ui-flows/recent-activities.yaml
    summary: Full-page activity feed from masthead bell (breadcrumb return).
  - id: tenant-administration
    file: ui-flows/tenant-administration.yaml
    summary: >-
      Tenant admin dashboard, users, quota, networks management (VN/Subnet/SG CRUD + topology with VM handoff),
      public IPs lifecycle (allocate/attach/detach/delete), placeholders, and cluster offerings management
      (enable/disable catalog items, org-level defaults). Routes /admin/networks, /admin/public-ips,
      /admin/cluster-offerings.
  - id: provider-administration
    file: ui-flows/provider-administration.yaml
    summary: >-
      Provider dashboard, tenant orgs, allocation/templates placeholders, infra topology, network classes
      catalog (/provider/network-classes), and CaaS management: agent management (/provider/agents),
      cluster offerings CRUD (/provider/cluster-offerings), storage tiers (/provider/storage-tiers),
      cross-tenant all-clusters view (/provider/clusters).
  - id: vm-console-standalone-demo
    file: ui-flows/vm-console-standalone-demo.yaml
    summary: Query-param driven full-page console demo (?demo=vm-console).
  - id: cluster-service-catalog
    file: ui-flows/cluster-service-catalog.yaml
    summary: >-
      Tenant user Clusters page — lists OpenShift clusters provisioned for the tenant organization
      with status (PROGRESSING/READY/FAILED/UPGRADING), detail drawer with Overview/NodeSets/
      Networking/Storage/Conditions tabs, create-cluster modal with networking section, upgrade
      modal, and kubeconfig download. Route /clusters; tenantUser only.


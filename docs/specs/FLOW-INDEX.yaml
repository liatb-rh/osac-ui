        - apps/app-frontend/src/components/clusters/CreateClusterModal.tsx
        - apps/app-frontend/src/components/clusters/UpgradeClusterModal.tsx
        - apps/app-frontend/src/components/clusters/ClusterActionsMenu.tsx
      deployment_variants: [standalone]

  - id: manage-baremetal
    file: ui-flows/manage-baremetal.yaml
    primary_routes:
      - /baremetal
      - /baremetal/:name
    roles: [tenantUser, tenantAdmin]
    summary: >-

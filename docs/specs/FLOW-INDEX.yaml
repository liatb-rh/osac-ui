        - apps/app-frontend/src/pages/administration/TenantDetailPage.tsx
        - apps/app-frontend/src/mocks/organizations-store.ts
      deployment_variants: [standalone]

  - id: manage-tenant-users
    file: ui-flows/manage-tenant-users.yaml
    primary_routes:
      - /admin/users
    roles: [tenantAdmin]
    summary: >-
      Tenant admin Users & Access page — lists users scoped to the current tenant with
      their name, email, RBAC role (tenantAdmin/tenantUser), and MFA enrollment status.
      Invite user modal sets User.spec + RoleBinding.spec (role + groups).
    implementation_status:
      as_of: "2026-06-19"
      code_refs:
        - apps/app-frontend/src/pages/administration/UsersPage.tsx
      deployment_variants: [standalone]


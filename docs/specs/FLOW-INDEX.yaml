# ---------------------------------------------------------------------------
# Reusable component surfaces
# ---------------------------------------------------------------------------

reusable_components_across_flows:
  - PageLayout           # libs/ui-components — title + description + actions slot + PageSection
  - PageHeader           # libs/ui-components — title + description + actions (PF Title + Flex)
  - KpiHeader            # libs/ui-components — horizontal KPI bar (label:value pairs)
  - ObjectsTable         # libs/ui-components — paginated PF Table with action cells
  - CustomTableLink      # libs/ui-components — link cell with disabled state
  - CatalogItemCard      # libs/ui-components — FullCatalogItemCard for gallery
  - VmStatusLabel        # libs/ui-components — coloured PF Label for VmPowerState
  - ClusterStatusLabel   # libs/ui-components — coloured PF Label for ClusterState
  - RequestBareMetalWizard # libs/ui-components — baremetal provisioning wizard
  - LightDarkToggle      # libs/ui-components — dark mode toggle (welcome + sidebar)
  - PagePlaceholder      # libs/ui-components — branded placeholder for deferred routes
  - NetworkTopology      # libs/ui-components — PF react-topology DAG component
  - CardActive           # libs/ui-components — clickable accent card (welcome personas)
  - CatalogItemStudio    # libs/ui-components — admin catalog item CRUD form + preview
  - Modal                # @patternfly/react-core
  - Wizard               # @patternfly/react-core
  - Tabs                 # @patternfly/react-core
  - SearchInput          # @patternfly/react-core
  - ToggleGroup          # @patternfly/react-core
  - ActionsColumn        # @patternfly/react-table
  - Alert                # @patternfly/react-core

# ---------------------------------------------------------------------------
# Cross-flow entry points
# ---------------------------------------------------------------------------

cross_flow_entry_points:
  - id: catalog_to_vm_wizard
    from_step: cat_catalog_browse
    to_step: cvm_wizard_template
    mechanism: navigate('/vms?catalogItem=<id>') → VmsPage auto-opens wizard
    note: URL param catalogItem is read on mount; wizardRef.openFromTemplate(catalogItemId).

  - id: vm_list_to_detail
    from_step: mvm_list_view
    to_step: mvm_detail_page
    mechanism: navigate('/vms/:id') on row click or name link.

  - id: cluster_list_to_detail
    from_step: csc_clusters_list
    to_step: csc_cluster_detail_page
    mechanism: navigate('/clusters/:id') on row click or name link.

  - id: vms_to_console_demo
    from_step: mvm_list_view
    to_step: vcd_console_page
    mechanism: window.open('?demo=vm-console&vm=…', '_blank') from ActionsColumn "Open console".

  - id: welcome_to_sign_in
    from_step: wrs_welcome_landing
    to_step: auth_sign_in_form
    mechanism: selectProviderAdmin() / selectTenantPersona() → navigate to sign-in route.

  - id: sign_in_to_shell
    from_step: auth_sign_in_form
    to_step: shell_primary_workspace
    mechanism: loginSuccess() → 2s delay → navigate(defaultRouteForRole(role)).

  - id: network_vn_to_detail
    from_step: net_virtual_networks_tab
    to_step: net_vn_detail_page
    mechanism: navigate('/networks/virtual-networks/:id').

  - id: storage_volumes_to_detail
    from_step: vol_list_view
    to_step: vol_detail_page
    mechanism: navigate('/resources/storage/storage-volumes/:id').


          description: Unknown cluster id

  - name: clusters_update
    description: >-
      Partial update for tenant-allowed fields. Primary use case: update spec.node_sets[key].size for
      worker node scaling. Client sends only the fields to update (implicit FieldMask via HTTP+JSON).
      NOT used to update status â€” status is system-owned.
    endpoint: /api/fulfillment/v1/clusters/{id}
    method: PATCH
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, system]
    request:
      schema:
        type: object
        description: Partial Cluster; only present fields are updated.
        properties:
          spec:
            type: object
            properties:
              node_sets:
                type: object
                description: >-
                  Send the full updated node_sets map (or the specific key being scaled) per fulfillment
                  FieldMask semantics. Only size field may be updated by tenant users; host_type is immutable.
    response:
      success:
        status: 200
        schema:
          $ref: '#/reusable_schemas/Cluster'
      errors:
        - code: 400_BAD_REQUEST
          description: Invalid node count (below 1 or above permitted maximum)
        - code: 403_FORBIDDEN
          description: Attempted to modify a system-owned field
        - code: 412_PRECONDITION_FAILED
          description: Optimistic lock version mismatch when lock=true
    example_requests:
      - |
        curl -sS -X PATCH -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
          https://fulfillment.example/api/fulfillment/v1/clusters/northstar-prod-1 \
          -d '{"spec":{"node_sets":{"workers":{"host_type":"dell-r640","size":5}}}}'
    spa_integration:
      client: apps/app-frontend/src/api/client.ts â€” patchClusterNodeSets(id, nodeSets)
      hook: usePatchCluster â€” invalidates clusters query keys on success
      ui: ClusterDetailDrawer Node Sets tab â€” inline scale input + confirm button

  - name: clusters_delete
    description: >-
      Delete a cluster. Disabled in UI while cluster state is CLUSTER_STATE_PROGRESSING.
      Mock BFF removes entry from clusterStore; dev proxies DELETE to fulfillment with Authorization.
      On deletion, the controller removes cluster-side resources (StorageClasses, VolumeSnapshotClasses,
      CSI Secret) from the target cluster. Backend resources (VAST tenant, views, quotas) and the
      per-tenant K8s Secret are preserved so other clusters sharing the same tenant can continue
      using them.
    endpoint: /api/fulfillment/v1/clusters/{id}
    method: DELETE
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, system]
    request:
      schema:
        type: object
        properties:
          id:
            type: string
            required: true
    response:
      success:
        status: 200
        schema:
          type: object
          properties: {}
      errors:
        - code: 404_NOT_FOUND
          description: Unknown cluster id
        - code: 409_CONFLICT
          description: Delete rejected while provisioning is in progress (fulfillment policy)
    example_requests:
      - |
        curl -sS -X DELETE -H "Authorization: Bearer $TOKEN" \
          https://fulfillment.example/api/fulfillment/v1/clusters/northstar-dev-1
    spa_integration:
      client: apps/app-frontend/src/api/client.ts â€” deleteCluster(id)
      hook: useDeleteCluster â€” invalidates clusters query key on success
      ui: ClustersPage + ClusterDetailDrawer â€” confirm modal; disabled when PROGRESSING

  - name: clusters_create
    description: >-
      Create a cluster. NOTE: the fulfillment proto marks this as system-only â€” regular tenant users
      should create via an async order path. In mock mode the BFF handles create locally (clusterStore).
      In dev mode document as requiring a platform token or BFF-mediated order. See contract_note_cluster_create.
    endpoint: /api/fulfillment/v1/clusters
    method: POST
    auth:
      required: true
      roles_allowed: [system, provider_admin]
      demo_note: >-
        Mock BFF accepts this call from tenant users for demo purposes. Dev mode requires platform token
        or an unimplemented ClusterOrders API; track as technical debt until an order API ships.
    request:
      schema:
        description: >-
          Body is Cluster at the root. Required: spec.catalog_item (xor spec.template) and metadata.name.
          Optional: spec.ssh_public_key, spec.release_image, spec.network, editable spec fields per
          catalog item field_definitions.
        allOf:
          - $ref: '#/reusable_schemas/Cluster'
    response:
      success:
        status: 200
        schema:
          $ref: '#/reusable_schemas/Cluster'
          description: Returns the created Cluster with state CLUSTER_STATE_PROGRESSING
      errors:
        - code: 400_BAD_REQUEST
          description: Missing required fields or invalid CIDR notation
        - code: 403_FORBIDDEN
          description: Non-system caller in dev/production mode
        - code: 409_CONFLICT
          description: Name or id collision
    example_requests:
      - |
        curl -sS -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
          https://fulfillment.example/api/fulfillment/v1/clusters \
          -d '{
            "metadata": { "name": "my-cluster" },
            "spec": {
              "catalog_item": "ocp-standard",
              "node_sets": { "workers": { "host_type": "dell-r640", "size": 3 } }
            }
          }'
    spa_integration:
      client: apps/app-frontend/src/api/client.ts â€” createCluster(payload)
      hook: useCreateCluster â€” invalidates clusters query key; adds provisional PROGRESSING row to cache
      ui: csc_create_cluster_modal â€” second form step; submit triggers useCreateCluster

  - name: cluster_catalog_items_list
    description: >-
      Browse available cluster catalog offerings. Tenant users select a catalog item when creating a cluster.
      Only published items (published: true) are shown to tenants in the UI.
    endpoint: /api/fulfillment/v1/cluster_catalog_items
    method: GET
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, viewer]
    request:
      schema:
        allOf:
          - $ref: '#/reusable_schemas/ListQuery'
          - properties:
              filter:
                example: this.published == true
    response:
      success:
        status: 200
        schema:
          type: object
          properties:
            size: { type: integer }
            total: { type: integer }
            items:
              type: array
              items:
                $ref: '#/reusable_schemas/ClusterCatalogItem'
      errors:
        - code: 401_UNAUTHORIZED
          description: Missing or invalid bearer token
    example_requests:
      - |
        curl -sS -H "Authorization: Bearer $TOKEN" \
          'https://fulfillment.example/api/fulfillment/v1/cluster_catalog_items?filter=this.published%3D%3Dtrue&limit=20'
    example_responses:
      - |
        {
          "size": 2, "total": 2,
          "items": [
            {
              "id": "ocp-standard",
              "metadata": { "name": "ocp-standard", "creation_timestamp": "2026-03-01T00:00:00Z" },
              "title": "OpenShift Standard",

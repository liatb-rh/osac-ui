  - name: cluster_upgrade_post
    description: >-
      Initiate an OCP version upgrade for a specific cluster. Cluster must be in CLUSTER_STATE_READY.
      Returns the updated Cluster in CLUSTER_STATE_UPGRADING state.
    endpoint: /api/fulfillment/v1/clusters/{id}/upgrade
    method: POST
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin]
    request:
      schema:
        type: object
        required: [target_version]
        properties:
          target_version:
            type: string
            description: >-
              Target OCP version string; must be present in the cluster's catalog_item.allowed_versions
              and strictly greater than current status.version
    response:
      success:
        status: 200
        schema:
          $ref: '#/reusable_schemas/Cluster'
      errors:
        - code: 400_BAD_REQUEST
          description: target_version not allowed or cluster not in READY state
        - code: 404_NOT_FOUND
          description: Unknown cluster id
    mock_behavior: >-
      BFF mock transitions cluster to CLUSTER_STATE_UPGRADING immediately, then auto-transitions
      to CLUSTER_STATE_READY (with updated version) after 90 seconds.

  - name: cluster_kubeconfig_get
    description: >-
      Retrieve the kubeconfig YAML for a specific cluster. Only available when cluster is
      CLUSTER_STATE_READY. Response is application/yaml.
    endpoint: /api/fulfillment/v1/clusters/{id}/kubeconfig
    method: GET
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin]
    request:
      schema:
        type: object
        properties:
          id:
            type: string
            required: true
    response:
      success:
        status: 200
        content_type: application/yaml
        description: kubeconfig YAML string
      errors:
        - code: 400_BAD_REQUEST
          description: Cluster not in READY state
        - code: 404_NOT_FOUND
          description: Unknown cluster id
    mock_behavior: >-
      BFF mock returns a generated kubeconfig YAML with the cluster's api_url substituted for the
      server field. Context name is the cluster metadata.name.


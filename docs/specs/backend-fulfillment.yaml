  - name: cluster_catalog_items_get
    description: Fetch a single cluster catalog item by id (used for modal form hydration).
    endpoint: /api/fulfillment/v1/cluster_catalog_items/{id}
    method: GET
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, viewer]

  flows:
    - name: institutional-sign-in
      description: Discover OIDC issuers before interactive login.
      steps:
        - GET /api/fulfillment/v1/capabilities (unauthenticated)
        - Client obtains access token from chosen issuer (out of band for this spec)
        - Subsequent calls include Authorization Bearer
    - name: vm-template-catalog
      description: Browse VM templates available to the tenant or provider (fulfillment compute_instance_templates).
      steps:
        - >-
          GET /api/fulfillment/v1/compute_instance_templates?filter=&offset=&limit= (primary; PROTO_JSON wire may differ from legacy ClusterTemplate â€” normalize in client per product decision)
        - GET /api/fulfillment/v1/compute_instance_templates/{id} when drawer/detail needs full resource
        - >-
          cluster_templates list/get remains optional for non-VM cluster surfaces only â€” do not use as the duplicate source for the same VM catalog rows (template-catalog-wizard-api-alignment.yaml).
    - name: create-virtual-machine-wizard
      description: >-
        BFF-orchestrated wizard sessions (ephemeral UI) compose desired state, then finalize persists
        the VM; optional fulfillment template GETs may hydrate BFF when not mocked.
      steps:
        - POST /api/osac/bff/v1/create-vm-wizard/sessions (entry preset + deployment hint)
        - Repeat POST /api/osac/bff/v1/create-vm-wizard/sessions/{sessionId}/advance until review complete
        - Optional POST .../back when user revisits earlier steps via WizardNav
        - POST /api/osac/bff/v1/create-vm-wizard/sessions/{sessionId}/finalize â€” BFF validates draft and returns
          a built **ComputeInstance** (mock: append to vmStore); SPA then **POST /api/fulfillment/v1/compute_instances**
          with the same payload when OSAC is integrated with real fulfillment (list GET polling is independent).
        - DELETE /api/osac/bff/v1/create-vm-wizard/sessions/{sessionId} on cancel/close
        - >-
          GET /api/fulfillment/v1/compute_instance_templates (list) + optional GET â€¦/{id} for template path â€”
          **same data contract as vm-template-catalog**; BFF wizard may cache template snapshot in session after client selection
        - Optional Poll GET /api/fulfillment/v1/compute_instances/{id} after real upstream create
    - name: manage-virtual-machines
      description: Operate lifecycle on existing compute instances.
      steps:
        - GET /api/fulfillment/v1/compute_instances with CEL filter for name/state
        - PATCH /api/fulfillment/v1/compute_instances/{id} for Start and Stop (run_strategy, status.state)
        - >-
          Restart â€” PATCH stop, wait until GET compute_instances shows **stopped**, then PATCH start (SPA orchestrator; see power_actions.restart)
        - DELETE /api/fulfillment/v1/compute_instances/{id} after stop when needed (confirm modal; PATCH stop then DELETE)
        - GET /api/osac/public/v1/console/COMPUTE_INSTANCE_RESOURCE_TYPE_COMPUTE_INSTANCE/{id}/access
    - name: recent-activities
      description: Stream or poll domain events (SSE/WebSocket mapping depends on gateway).
      steps:
        - GET /api/events/v1/events?filter= (long-lived; reconnect with backoff)
        - Correlate with GETs on affected objects
    - name: tenant-user-dashboard-activities
      description: >
        Dashboard utilization section â€” "Recent activities" sidebar (and preview list) for tenant user home.
      runtime_modes:
        dev:
          steps:
            - GET /api/events/v1/events?filter= (fulfillment stream; BFF proxy in dev mode)
            - Map Event payload fields to sidebar cards (type, time, message, severity as available)
            - Optional GET /api/fulfillment/v1/compute_instances/{id} when correlating refs
        mock:
          steps:
            - May use buildRecentActivities(compute instances) and/or BFF mock events endpoint
    - name: tenant-administration
      description: Tenant-scoped networking and org metadata.
      steps:
        - GET/PATCH /api/fulfillment/v1/virtual_networks
        - GET/PATCH /api/fulfillment/v1/subnets
        - GET/PATCH /api/fulfillment/v1/security_groups
        - GET /api/fulfillment/v1/organizations/{tenantId}
    - name: provider-administration
      description: Cross-tenant inventory; same endpoints with broader authz.
      steps:
        - GET /api/fulfillment/v1/organizations?filter=
        - GET /api/fulfillment/v1/clusters (provider visibility)
    - name: vm-console-standalone-demo
      description: Check console availability before opening serial/VNC session.
      steps:
        - GET console access endpoint
        - gRPC bidi Connect(stream) for real I/O (not exposed as REST)

  # Same-origin OSAC BFF JSON routes (not fulfillment gRPC-gateway paths). Documented here so UI
  # and BFF implementations share one contract file with fulfillment alignment notes.
  bff_demo_osac_extensions:
    create_virtual_machine_wizard:
      base_path: /api/osac/bff/v1/create-vm-wizard
      auth: Bearer session (same as other BFF APIs in demo); tenant scoping matches signed-in context.
      session_storage: >-
        In-memory map keyed by sessionId for mock mode; production-shaped deployments may use Redis
        or opaque encrypted cookies â€” out of scope for this YAML detail.
      step_ids: >-
        activeStepId and advance fromStepId use exactly: deployment, guest-os, boot-source, compute,
        template, clone-source, customization, review. Ordered lists per mode and skipDeployment flag
        match ui-flow canonical_bff_step_ids; BFF and client MUST use the same strings (see
        create-virtual-machine-wizard.yaml step_worksheets).
      endpoints:
        - name: create_vm_wizard_session_start
          method: POST
          path: /sessions
          description: >-
            Create a wizard session. Body includes optional deploymentMethod (new|template|clone),
            entry (dashboard|catalog|clone_drawer), optional presetTemplateId, optional presetCloneSourceVmId.
            Response returns sessionId, activeStepId, activeIndex, skipDeployment (boolean; when true the
            ordered path omits deployment â€” catalog template or clone-drawer preset), stepNav[], full draft
            snapshot, and optional fieldErrors on error.
        - name: create_vm_wizard_session_get
          method: GET
          path: /sessions/{sessionId}
          description: >-
            Return current activeStepId, stepNav, draft â€” used after errors or focus recovery; not a
            substitute for URL-routed wizard state (wizard remains ephemeral).
        - name: create_vm_wizard_advance
          method: POST
          path: /sessions/{sessionId}/advance
          description: >-
            JSON body includes fromStepId (must match server activeStepId) and draft (WizardState-shaped
            object merged into server draft). BFF validates the active step, increments activeIndex on success,
            returns next activeStepId, skipDeployment, stepNav, and draft; 400 with fieldErrors keeps client on same step.
        - name: create_vm_wizard_back
          method: POST
          path: /sessions/{sessionId}/back
          description: >-
            Optional explicit back; body may include currentStepId. BFF moves to previous step when allowed;
            may be folded into advance with direction if implementation prefers a single endpoint.
        - name: create_vm_wizard_finalize
          method: POST
          path: /sessions/{sessionId}/finalize
          description: >-
            Validates full draft; mock mode appends to vmStore and returns the **ComputeInstance**; integrated
            mode returns the composed object for the SPA to **POST /api/fulfillment/v1/compute_instances**.
            4xx on business validation failure. Session is closed after success.
        - name: create_vm_wizard_abandon
          method: DELETE
          path: /sessions/{sessionId}
          description: Abandon draft when modal closes without finalize; idempotent.
      finalize_persistence_note: >-
        Mock BFF finalize persists to the demo vmStore and returns the object to the SPA. When the UI targets
        real fulfillment, the SPA MUST still **POST /api/fulfillment/v1/compute_instances** after finalize
        (same provision path from Dashboard, Catalog, and My VMs) so upstream inventory matches the wizard output;
        TanStack **GET** list refetch does not substitute for that create. Align request body with
        contract_note_compute_instance_create for environments where POST is permitted.

requirements:
  functional:
    - List collections support offset, limit, optional CEL filter, optional SQL-like order string.
    - Updates use PATCH with body field presence driving implicit FieldMask in HTTP+JSON.
    - Optimistic concurrency via optional lock comparing metadata.version when enabled.
    - Regular users must not bypass policy; respect comments on restricted RPCs in protos.
    - Capabilities endpoint is unauthenticated and safe for pre-login discovery.
  non_functional:
    performance: p95 read list < 500ms for modest page sizes under normal load
    scalability: horizontally scaled stateless gateway; DB-backed consistency
    security: TLS everywhere in production; Bearer auth; tenant isolation via authz layer
    observability: true

contract_note_cluster_create: >
  Proto comments on Clusters.Create state: "Note that this operation is not allowed for regular users,
  only for the server. Regular users create clusters indirectly, creating a cluster order that will
  eventually result in the system creating a cluster." The grpcurl README output references
  osac.public.v1.ClusterOrders service, but no cluster_orders_service.proto exists in the analyzed
  main-branch public protos â€” it may be removed or unpublished. Demo implementations MUST:
  (a) In OSAC_API_MODE=mock â€” BFF accepts POST /api/fulfillment/v1/clusters from tenant users and
      appends to a clusterStore fixture, returning state CLUSTER_STATE_PROGRESSING.
  (b) In OSAC_API_MODE=dev â€” document that a platform token (system/provider_admin JWT) is required
      or that a ClusterOrders API must be added; block dev cluster creation behind a feature flag or
      BFF-mediated order until upstream publishes a tenant-facing create path.
  Track this constraint and remove when a public order API ships.

contract_note_compute_instance_create: >
  Proto comments state POST /compute_instances is not for regular end users; users
  should create via an order/async path. The historical README still mentions
  ClusterOrders gRPC services; main-branch public protos analyzed here expose
  ComputeInstances CRUD but with that restriction. Demo implementations should use
  mock/local create OR a documented platform-only token until a public order API ships.

instructions:
  - Generate API endpoints per flow and component needs
  - Ensure each endpoint maps to a clear business capability
  - Include request/response schemas with types
  - Define validation rules and error responses
  - Align naming conventions across endpoints
  - Reuse entities where possible (DRY principle)
  - Include pagination, filtering, and sorting where relevant
  - Apply authentication and role-based access control
  - Ensure APIs are frontend-consumable and predictable

output_format:
  type: openapi-like
  include:
    - endpoints
    - methods
    - request_schema
    - response_schema
    - error_codes
    - auth_rules
    - example_requests
    - example_responses

output_constraints:
  naming: >-
    Document schemas here often use camelCase; **live fulfillment responses use snake_case PROTO_JSON** per
    context.architecture.json_conventions.fulfillment_gateway_wire. Generated OpenAPI from protos is authoritative for wire keys.
  avoid_redundant_endpoints: true
  read_vs_write: clearly separated by HTTP verb
  edge_cases: included under each_api.errors

reusable_schemas:
  PageOfT:
    type: object
    properties:
      size:
        type: integer
        format: int32
      total:
        type: integer
        format: int32
      items:
        type: array
        items:
          type: object
  ListQuery:
    type: object
    properties:
      offset:
        type: integer
        format: int32
      limit:
        type: integer
        format: int32
      filter:
        type: string
        description: CEL expression; see docs/FILTER.md in fulfillment-service
      order:
        type: string
        description: Attribute names from resource model; SQL-like asc/desc
  Metadata:
    type: object
    description: >-
      See osac/public/v1/metadata_type.proto. On fulfillment wire JSON, prefer creation_timestamp, creators, tenants
      (snake_case); UI models map to createdAt / normalized lists per compute_instances_wire_format_and_ui.
    properties:
      name:
        type: string
      version:
        type: integer
        format: int64
      labels:
        type: object
        additionalProperties:
          type: string
      createdAt:
        type: string
        format: date-time
      creation_timestamp:
        type: string
        format: date-time
        description: Wire JSON alias (snake_case) mapped to UI createdAt
      creators:
        type: array
        items:
          type: string
      tenants:
        type: array
        items:
          type: string
  ClusterNodeSet:
    type: object
    description: >-
      Wire JSON from fulfillment uses snake_case: host_type, size. UI model maps to hostType, size.
    properties:
      host_type:
        type: string
        description: Wire alias; UI model field is hostType after normalize
      hostType:
        type: string
      size:
        type: integer
        format: int32

  ResourceMetadata:
    type: object
    description: Standard resource metadata (mirrors osac.public.v1.Metadata proto).
    properties:
      name:
        type: string
      labels:
        type: object
        additionalProperties:
          type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  VirtualNetworkResource:
    type: object
    description: >-
      VirtualNetwork â€” tenant-isolated virtual network. Wire format uses snake_case;
      UI model uses camelCase after normalization. Mirrors osac.public.v1.VirtualNetwork proto.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      spec:
        type: object
        properties:
          network_class:
            type: string
            description: NetworkClass ID; immutable after creation
          ipv4_cidr:
            type: string
            description: IPv4 CIDR block; immutable after creation (e.g. "10.0.0.0/16")
          ipv6_cidr:
            type: string
            description: IPv6 CIDR block; immutable after creation (e.g. "fd00::/64")
          capabilities:
            type: object
            properties:
              enable_ipv4: { type: boolean }
              enable_ipv6: { type: boolean }
              enable_dual_stack: { type: boolean }
      status:
        type: object
        properties:
          state:
            type: string
            enum: [VIRTUAL_NETWORK_STATE_UNSPECIFIED, VIRTUAL_NETWORK_STATE_PENDING, VIRTUAL_NETWORK_STATE_READY, VIRTUAL_NETWORK_STATE_FAILED]
          message:
            type: string

  SubnetResource:
    type: object
    description: >-
      Subnet â€” subdivision of a VirtualNetwork. Mirrors osac.public.v1.Subnet proto.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      spec:
        type: object
        properties:
          virtual_network:
            type: string
            description: Parent VirtualNetwork ID; required and immutable
          ipv4_cidr:
            type: string
            description: IPv4 CIDR block; immutable after creation
          ipv6_cidr:
            type: string
            description: IPv6 CIDR block; immutable after creation
      status:
        type: object
        properties:
          state:
            type: string
            enum: [SUBNET_STATE_UNSPECIFIED, SUBNET_STATE_PENDING, SUBNET_STATE_READY, SUBNET_STATE_FAILED, SUBNET_STATE_DELETING, SUBNET_STATE_DELETE_FAILED]
          message:
            type: string

  SecurityGroupResource:
    type: object
    description: >-
      SecurityGroup â€” virtual firewall for compute instances. Rule editor is deferred; only
      name and parent VN are set on create in v1. Mirrors osac.public.v1.SecurityGroup proto.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      spec:
        type: object
        properties:
          virtual_network:
            type: string
            description: Parent VirtualNetwork ID; required and immutable
          ingress:
            type: array
            items:
              $ref: '#/reusable_schemas/SecurityRule'
          egress:
            type: array
            items:
              $ref: '#/reusable_schemas/SecurityRule'
      status:
        type: object
        properties:
          state:
            type: string
            enum: [SECURITY_GROUP_STATE_UNSPECIFIED, SECURITY_GROUP_STATE_PENDING, SECURITY_GROUP_STATE_READY, SECURITY_GROUP_STATE_FAILED, SECURITY_GROUP_STATE_DELETING, SECURITY_GROUP_STATE_DELETE_FAILED]
          message:
            type: string

  SecurityRule:
    type: object
    description: Single firewall rule. Mirrors osac.public.v1.SecurityRule proto.
    properties:
      protocol:
        type: string
        enum: [PROTOCOL_UNSPECIFIED, PROTOCOL_TCP, PROTOCOL_UDP, PROTOCOL_ICMP, PROTOCOL_ALL]
      port_from:
        type: integer
        description: Start port (TCP/UDP only)
      port_to:
        type: integer
        description: End port (TCP/UDP only)
      ipv4_cidr:
        type: string
      ipv6_cidr:
        type: string

  NetworkClassResource:
    type: object
    description: >-
      NetworkClass â€” pluggable network backend descriptor. Read-only for UI users; managed
      by operator. Mirrors osac.public.v1.NetworkClass proto.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      title:
        type: string
        description: Short human-friendly name (e.g. "UDN Network")
      description:
        type: string
        description: Markdown long description
      capabilities:
        type: object
        properties:
          supports_ipv4: { type: boolean }
          supports_ipv6: { type: boolean }
          supports_dual_stack: { type: boolean }
      status:
        type: object
        properties:
          state:
            type: string
            enum: [NETWORK_CLASS_STATE_UNSPECIFIED, NETWORK_CLASS_STATE_PENDING, NETWORK_CLASS_STATE_READY, NETWORK_CLASS_STATE_FAILED]
          message:
            type: string
      is_default:
        type: boolean
        description: True if this is the default NetworkClass; at most one at a time

  PublicIPResource:
    type: object
    description: >-
      PublicIP â€” floating IP allocated from a PublicIPPool; optionally attached to a
      ComputeInstance. Mirrors osac.public.v1.PublicIP proto.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      spec:
        type: object
        properties:
          pool:
            type: string
            description: PublicIPPool ID; required and immutable after creation
          compute_instance:
            type: string
            description: ComputeInstance ID to attach to; mutable (set to null to detach)
      status:
        type: object
        properties:
          state:
            type: string
            enum: [PUBLIC_IP_STATE_UNSPECIFIED, PUBLIC_IP_STATE_PENDING, PUBLIC_IP_STATE_ALLOCATED, PUBLIC_IP_STATE_ATTACHING, PUBLIC_IP_STATE_ATTACHED, PUBLIC_IP_STATE_RELEASING, PUBLIC_IP_STATE_FAILED]
          message:
            type: string
          address:
            type: string
            description: Allocated IP address; populated once ALLOCATED
          pool:
            type: string
            description: Pool ID mirror for convenience

  PublicIPPoolResource:
    type: object
    description: Public IP pool (read-only for UI users; managed by provider).
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/ResourceMetadata'
      spec:
        type: object
        properties:
          cidr:
            type: string
            description: CIDR range of the pool
      status:
        type: object
        properties:
          state:
            type: string
          available_count:
            type: integer

  ClusterNetwork:
    type: object
    properties:
      pod_cidr:
        type: string
        description: CIDR for cluster pod network; wire snake_case; default 10.128.0.0/14
      service_cidr:
        type: string
        description: CIDR for cluster service network; wire snake_case; default 172.30.0.0/16
      virtual_network_ref:
        type: string
        description: ID of the VirtualNetwork assigned to this cluster; wire snake_case
      subnet_ref:
        type: string
        description: ID of the Subnet within the selected VirtualNetwork; wire snake_case
      security_group_refs:
        type: array
        items:
          type: string
        description: IDs of SecurityGroups attached to the cluster; wire snake_case

  ClusterNetworkStatus:
    type: object
    description: Runtime networking state populated by the controller after provisioning.
    properties:
      api_public_ip:
        type: string
        description: Public IP assigned to the API server LoadBalancer; wire snake_case
      ingress_public_ip:
        type: string
        description: Public IP assigned to the Ingress controller LoadBalancer; wire snake_case
      dns_records:
        type: array
        items:
          type: string
        description: DNS hostnames provisioned for this cluster (API + apps wildcard); wire snake_case

  ClusterStorageClass:
    type: object
    properties:
      name:
        type: string
      tier:
        type: string
        description: >-
          StorageTier id this StorageClass was created for (e.g. "fast", "standard", "archive");
          populated after CSI setup; wire snake_case
      is_default:
        type: boolean
        description: Whether this is the default StorageClass; wire snake_case
      parameters:
        type: object
        additionalProperties:
          type: string

  ClusterStorageStatus:
    type: object
    description: VAST CSI driver and StorageClass provisioning state.
    properties:
      csi_driver:
        type: string
        description: CSI driver name (e.g. "csi.vastdata.com"); wire snake_case
      storage_classes:
        type: array
        items:
          $ref: '#/reusable_schemas/ClusterStorageClass'
        description: StorageClasses created by VAST CSI driver; wire snake_case
      volume_snapshot_classes:
        type: array
        items:
          $ref: '#/reusable_schemas/VolumeSnapshotClass'
        description: VolumeSnapshotClasses installed by the VAST CSI driver; wire snake_case

  VolumeSnapshotClass:
    type: object
    description: >-
      Kubernetes VolumeSnapshotClass installed by the VAST CSI driver on the tenant cluster.
      Cleaned up on cluster deletion (cluster-side teardown only).
    properties:
      name:
        type: string
      driver:
        type: string
        description: CSI driver name for this snapshot class (e.g. "csi.vastdata.com")
      deletion_policy:
        type: string
        description: "Retain or Delete; wire snake_case"
      is_default:
        type: boolean
        description: Whether this is the default VolumeSnapshotClass; wire snake_case

  Agent:
    type: object
    description: Infrastructure agent that can be provisioned to host cluster node sets.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/Metadata'
      state:
        type: string
        description: >-
          AGENT_STATE_AVAILABLE / AGENT_STATE_PROVISIONING / AGENT_STATE_PROVISIONED /
          AGENT_STATE_DEPROVISIONING / AGENT_STATE_UNAVAILABLE
      hardware_profile:
        type: string
        description: Hardware profile identifier (e.g. "baremetal-standard-48c-192g"); wire snake_case
      cluster_ref:
        type: string
        description: ID of the cluster this agent is assigned to; null if unassigned; wire snake_case
      inventory_backend:
        type: string
        description: Inventory backend name this agent is registered with; wire snake_case

  InventoryBackend:
    type: object
    description: External inventory system (e.g. Ansible Automation Platform inventory source).
    properties:
      id:
        type: string
      name:
        type: string
      status:
        type: string
        description: CONNECTED / DISCONNECTED
      endpoint_url:
        type: string
        description: wire snake_case; endpoint_url
      last_sync_time:
        type: string
        format: date-time
        description: wire snake_case; last_sync_time

  StorageTier:
    type: object
    description: VAST storage tier definition for cluster persistent storage.
    properties:
      id:
        type: string
      name:
        type: string
      qos_class:
        type: string
        description: QoS policy class name; wire snake_case
      vip_pool:
        type: string
        description: VAST VIP pool name for this tier; wire snake_case
      storage_class_name:
        type: string
        description: Kubernetes StorageClass name generated from this tier; wire snake_case
      available:
        type: boolean
        description: Whether this tier is globally available for cluster provisioning
      available_tenant_ids:
        type: array
        items:
          type: string
        description: >-
          Tenant IDs for which this tier is currently enabled. Provider admin configures
          which tenants have access per tier. When empty and available is true, the tier
          is available to all tenants; wire snake_case

  ClusterCondition:
    type: object
    properties:
      type:
        type: string
        description: CLUSTER_CONDITION_TYPE_* enum string; humanize by stripping prefix for display
      status:
        type: string
        description: CONDITION_STATUS_TRUE / CONDITION_STATUS_FALSE / CONDITION_STATUS_UNKNOWN
      last_transition_time:
        type: string
        format: date-time
      reason:
        type: string
      message:
        type: string

  Cluster:
    type: object
    description: >-
      Wire JSON from fulfillment uses snake_case keys and CLUSTER_STATE_* enum strings. UI model (after
      normalizeCluster) uses camelCase. ClusterSpec.pull_secret is write-only: redacted as "***" in GET.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/Metadata'
      spec:
        type: object
        properties:
          template:
            type: string
            description: Mutually exclusive with catalog_item
          catalog_item:
            type: string
            description: >-
              Wire field; references a ClusterCatalogItem id. Mutually exclusive with template.
              UI model field: catalogItem after normalize.
          template_parameters:
            type: object
            description: Map of protobuf Any values; rarely set by tenant users
          node_sets:
            type: object
            additionalProperties:
              $ref: '#/reusable_schemas/ClusterNodeSet'
            description: Map keyed by node set id (e.g. "workers"); wire and UI both use the same map structure
          pull_secret:
            type: string
            description: Write-only; redacted as "***" in GET responses
          ssh_public_key:
            type: string
          release_image:
            type: string
          network:
            $ref: '#/reusable_schemas/ClusterNetwork'
      status:
        type: object
        properties:
          state:
            type: string
            description: >-
              Wire CLUSTER_STATE_* enum; UI maps to ClusterState:
                CLUSTER_STATE_PROGRESSING â†’ "Provisioning" (blue + spinner)
                CLUSTER_STATE_READY â†’ "Ready" (green)
                CLUSTER_STATE_FAILED â†’ "Failed" (red)
                CLUSTER_STATE_UPGRADING â†’ "Upgrading" (blue + spinner)
                CLUSTER_STATE_UPGRADE_FAILED â†’ "Upgrade Failed" (red)
                CLUSTER_STATE_UNSPECIFIED â†’ "Unknown" (grey)
          conditions:
            type: array
            items:
              $ref: '#/reusable_schemas/ClusterCondition'
          api_url:
            type: string
            description: Wire snake_case; UI model field: apiUrl after normalize
          console_url:
            type: string
            description: Wire snake_case; UI model field: consoleUrl after normalize
          node_sets:
            type: object
            additionalProperties:
              $ref: '#/reusable_schemas/ClusterNodeSet'
            description: Current node set sizes from the system; may differ from spec.node_sets during scaling
          version:
            type: string
            description: Current OCP version string (e.g. "4.17.3"); populated after provisioning
          upgrade_state:
            type: string
            description: Details of the current or last upgrade operation; wire snake_case
          storage_ready:
            type: boolean
            description: Whether VAST CSI driver and StorageClasses are provisioned and healthy; wire snake_case
          storage:
            $ref: '#/reusable_schemas/ClusterStorageStatus'
          network:
            $ref: '#/reusable_schemas/ClusterNetworkStatus'
            description: Runtime networking IPs and DNS records; populated by controller post-provision

  FieldDefinition:
    type: object
    description: Defines a user-configurable field for a catalog item (clusters or compute instances).
    properties:
      path:
        type: string
        description: Dot-notation path referencing a field in the resource spec (e.g. "spec.node_sets.workers.size")
      display_name:
        type: string
      editable:
        type: boolean
        description: If false, user cannot change this field; it is pre-filled from the default value
      default:
        type: object
        description: >-
          protobuf Value; for JSON may appear as primitive or as { "@type": "...", "value": ... } for wrapper types
      validation_schema:
        type: string
        description: JSON Schema (draft 2020-12) string for validating editable fields

  ClusterCatalogItem:
    type: object
    description: A curated infrastructure offering that tenants select when creating clusters.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/Metadata'
      title:
        type: string
      description:
        type: string
        description: Markdown-formatted long description
      template:
        type: string
        description: Underlying cluster template id
      published:
        type: boolean
        description: Only published items are shown to tenant users
      allowed_versions:
        type: array
        items:
          type: string
        description: >-
          Semver OCP version strings permitted for upgrade (e.g. ["4.17.3", "4.18.0"]).
          UI shows only versions strictly greater than current cluster version; wire snake_case.
      field_definitions:
        type: array
        items:
          $ref: '#/reusable_schemas/FieldDefinition'

  ClusterTemplateSummary:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      description:
        type: string
  ClusterTemplate:
    allOf:
      - $ref: '#/reusable_schemas/ClusterTemplateSummary'
      - type: object
        properties:
          metadata:
            $ref: '#/reusable_schemas/Metadata'
          spec:
            type: object
          status:
            type: object
  ComputeInstance:
    type: object
    description: >-
      UI-facing shape after normalization. Wire responses use snake_case keys (memory_gib, boot_disk, ip_address, â€¦)
      and proto enum strings for state; see compute_instances_wire_format_and_ui.
    properties:
      id:
        type: string
      metadata:
        $ref: '#/reusable_schemas/Metadata'
      spec:
        type: object
        properties:
          template:
            type: string
          templateParameters:
            type: object
            additionalProperties: true
          template_parameters:
            type: object
            description: Wire alias for templateParameters
            additionalProperties: true
          cores:
            type: integer
          memoryGib:
            type: integer
          memory_gib:
            type: integer
            description: Wire alias mapped to memoryGib
          image:
            type: object
          bootDisk:
            type: object
          boot_disk:
            type: object
            description: Wire alias mapped to bootDisk (e.g. { size_gib })
          additionalDisks:
            type: array
            items:
              type: object
          additional_disks:
            type: array
            items:
              type: object
          runStrategy:
            type: string
            description: After normalize, **Always** or **Halted** for fulfillment REST create/list
          run_strategy:
            type: string
            description: Wire alias; values **Always** | **Halted** on REST (legacy RUN_STRATEGY_* normalized on read)
          sshKey:
            type: string
          userData:
            type: string
          subnet:
            type: string
          securityGroups:
            type: array
            items:
              type: string
          security_groups:
            type: array
            items:
              type: string
          restartRequestedAt:
            type: string
            format: date-time
      status:
        type: object
        properties:
          state:
            type: string
            description: VmPowerState after normalize; wire carries COMPUTE_INSTANCE_STATE_*
          conditions:
            type: array
            items:
              type: object
              properties:
                type: { type: string }
                status: { type: string }
                reason: { type: string }
                message: { type: string }
                last_transition_time: { type: string, format: date-time }
          ipAddress:
            type: string
          ip_address:
            type: string
            description: Wire alias mapped to ipAddress
          lastRestartedAt:
            type: string
            format: date-time

apis:
  - name: capabilities_get
    description: Server authn capabilities including trusted token issuers (pre-login).
    endpoint: /api/fulfillment/v1/capabilities
    method: GET
    auth:
      required: false
      roles_allowed: []
    request:
      schema:
        type: object
        properties: {}
    response:
      success:
        status: 200
        schema:
          type: object
          properties:
            authn:
              type: object
      errors:
        - code: 500_INTERNAL
          description: Transient server failure
    example_requests:
      - |
        curl -sS https://fulfillment.example/api/fulfillment/v1/capabilities
    example_responses:
      - |
        { "authn": { "trustedTokenIssuers": [ { "issuerUrl": "https://idp.example/realms/osac" } ] } }

  - name: cluster_templates_list
    description: List VM/cluster templates visible to the caller.
    endpoint: /api/fulfillment/v1/cluster_templates
    method: GET
    auth:
      required: true
      roles_allowed: [tenant_user, tenant_admin, provider_admin, viewer]
    request:
      schema:

# Backend API specification for OSAC demo â†” fulfillment-service alignment
# Source repo: https://github.com/osac-project/fulfillment-service
# Proto revision basis: main branch (analyzed 2026-04-17). Open PRs may extend contracts.

agent:
  name: backend-spec-generator
  version: 1.0
  description: >
    Generate production-ready backend API specifications based on product flows,
    UI components, and business requirements. Output must be deterministic,
    structured, and aligned with frontend contracts.

context:
  product:
    name: OSAC fulfillment service (demo consumer)
    domain: Cloud-in-a-box / edge VM and cluster provisioning
    description: >
      Go service exposing gRPC (osac.public.v1 / osac.private.v1) and a gRPC-Gateway
      REST surface under /api/fulfillment/v1 (public) plus /api/private/v1 (private).
      PostgreSQL persistence; OpenShift deployment uses Bearer tokens (Kubernetes SA JWT).

  source_repository:
    url: https://github.com/osac-project/fulfillment-service
    license: Apache-2.0
    primary_languages:
      - Go

  architecture:
    style: modular monolith (single deployable; gRPC + REST gateway + controller)
    api_style: REST (JSON via grpc-gateway) + gRPC (internal / advanced clients)
    rest_base_paths:
      public: /api/fulfillment/v1
      capabilities: /api/fulfillment/v1/capabilities
      events_watch: /api/events/v1/events
      console_access: /api/osac/public/v1/console
      private: /api/private/v1
    auth:
      type: OAuth2 / Bearer JWT (Keycloak / Authorino in cluster integrations)
      roles:
        - system
        - provider_admin
        - tenant_admin
        - tenant_user
        - viewer
    json_conventions:
      documentation_and_ui_model: >-
        Internal TypeScript types and OpenAPI-like snippets in this file may use camelCase for readability.
      fulfillment_gateway_wire: >-
        Public REST JSON from fulfillment gRPC-Gateway follows PROTO_JSON: **snake_case** field names
        (e.g. `memory_gib`, `creation_timestamp`, `boot_disk`, `ip_address`) and **ENUM_STRING** values
        (e.g. `COMPUTE_INSTANCE_STATE_RUNNING`). Well-known protobuf types may appear as expanded JSON objects
        (e.g. `google.protobuf.StringValue` with `@type` + `value`). UI code MUST normalize wire payloads at the
        API client boundary before passing `ComputeInstance` into React components.
      enums: PROTO_JSON string enums on the wire (e.g. COMPUTE_INSTANCE_STATE_RUNNING)
      well_known_types: google.protobuf wrappers as documented in compute_instance_type.proto

  osac_bff_runtime_modes:
    description: >
      Projects/osac BFF (apps/app-backend) + SPA: how tenant dashboard "Recent activities"
      (DashboardUtilizationSection sidebar) and the full-page recent-activities flow obtain data.
    mock:
      OSAC_API_MODE: mock
      dashboard_recent_activities:
        allowed_sources:
          - Client-side derivation from GET /api/fulfillment/v1/compute_instances (buildRecentActivities)
          - BFF mock GET /api/events/v1/events (static paginated JSON; not fulfillment-shaped stream)
    dev:
      OSAC_API_MODE: dev
      dashboard_recent_activities:
        required_api: GET /api/events/v1/events
        upstream: fulfillment-service osac.public.v1.Events.Watch via gRPC-Gateway
        bff_behavior: >
          Proxy /api/events/v1/* to the fulfillment REST gateway with the same Authorization
          Bearer passthrough used for /api/fulfillment/v1/*. Do not serve the mock static JSON
          array for this path in dev mode.
          **As-implemented note:** the BFF currently buffers the full upstream body before replying
          (Undici + Fastify workaround); long-lived watch still works for many gateways but is not
          true byte streaming â€” see `bff_proxy_matrix_dev.implementation_notes` in this file.
        client_behavior: >
          Open the long-lived watch (SSE or chunked JSON per gateway deployment); apply optional
          CEL filter query param; buffer the latest N events for the sidebar; reconnect with
          exponential backoff. Combine with GET /api/fulfillment/v1/compute_instances only for
          hydration or reconciliation when event.relatedObjectRefs require fresh object state â€”
          not as the sole source of the activity timeline in dev mode.
        auth: Bearer JWT required (same as other protected fulfillment routes)

  # ---------------------------------------------------------------------------
  # Networking API â€” wire contract and UI integration notes
  # ---------------------------------------------------------------------------
  networking_api:
    description: >
      Documents the Networking API integration for osac-ui. The fulfillment service exposes
      full CRUD for VirtualNetwork, Subnet, SecurityGroup, PublicIP, and read-only
      NetworkClass. UI pages are scoped by role: tenant admin manages VNs/Subnets/SGs/PublicIPs;
      provider admin reads NetworkClasses.

    resource_hierarchy:
      - NetworkClass (system-provided, read-only)
      - VirtualNetwork (tenant-owned; references NetworkClass)
      - Subnet (owned by VirtualNetwork; 1:1 in v0.1)
      - SecurityGroup (owned by VirtualNetwork; scoped to one VN)
      - PublicIP (tenant-owned; attached to ComputeInstance)

    wire_fields:
      VirtualNetwork:
        - id, metadata.name, spec.network_class, spec.ipv4_cidr, spec.ipv6_cidr
        - spec.capabilities.enable_ipv4, enable_ipv6, enable_dual_stack
        - status.state (PENDING/READY/FAILED), status.message
      Subnet:
        - id, metadata.name, spec.virtual_network (parent VN ID)
        - spec.ipv4_cidr, spec.ipv6_cidr
        - status.state, status.message
      SecurityGroup:
        - id, metadata.name, spec.virtual_network
        - spec.ingress[], spec.egress[] (SecurityRule: protocol, port_from, port_to, ipv4_cidr, ipv6_cidr)
        - status.state, status.message
      NetworkClass:
        - id, metadata.name, title, description
        - capabilities.supports_ipv4, supports_ipv6, supports_dual_stack
        - status.state, is_default
      PublicIP:
        - id, metadata.name, spec.pool, spec.compute_instance (nullable)
        - status.state (PENDING/ALLOCATED/ATTACHING/ATTACHED/RELEASING/FAILED)
        - status.address (populated from ALLOCATED onward), status.pool

    normalization_notes:
      - All wire fields are snake_case; UI model is camelCase after normalizeXxx functions.
      - VirtualNetwork.spec.networkClass (camelCase) maps to wire spec.network_class.
      - Subnet.spec.virtualNetwork maps to wire spec.virtual_network.
      - SecurityGroup.spec.virtualNetwork maps to wire spec.virtual_network.
      - PublicIP.spec.computeInstance maps to wire spec.compute_instance.

    mock_behavior:
      - GET list endpoints return DEMO_VIRTUAL_NETWORKS, DEMO_SUBNETS, DEMO_SECURITY_GROUPS,
        DEMO_NETWORK_CLASSES, DEMO_PUBLIC_IPS from mock-data.ts.
      - Subnets list supports ?virtual_network_id= filter.
      - POST creates and appends to in-memory store; returns 201 with generated id.
      - DELETE removes from in-memory store; returns 204.
      - PATCH (PublicIP) updates spec.compute_instance and transitions state synchronously
        in mock (ALLOCATED â†’ ATTACHED or ATTACHED â†’ ALLOCATED).

    v1_constraints:
      - SecurityGroup rule editing is out of scope for v1 UI (rules are set via API/CLI).
      - PublicIPPool admin UI is out of scope; only pool listing for the allocate modal.
      - NetworkClass is fully read-only from the UI; operator manages lifecycle.
      - VirtualNetwork and Subnet CIDR fields are immutable after creation per proto.

  # ---------------------------------------------------------------------------
  # CaaS Tenant Storage Setup â€” backend behavior and wire contract
  # ---------------------------------------------------------------------------
  caas_storage_setup:
    description: >
      Documents how storage is automatically provisioned on CaaS tenant clusters and how
      its readiness is tracked on the ClusterOrder CR (surfaced as status.storage_ready on
      the Cluster resource). This section describes controller-side behavior; the UI spec
      (cluster-service-catalog.yaml) describes how the SPA consumes this data.
    trigger: >
      When a CaaS cluster reaches ClusterOrderPhaseReady, the storage controller:
        1. Queries the Tier API (Get/List) to determine which StorageTiers are available
           for the tenant (filtered by available_tenant_ids on each StorageTier record).
        2. Retrieves StorageProvider connection details from K8s secrets and the VAST VMS API.
        3. Installs the VAST CSI driver on the target cluster.
        4. Creates one StorageClass per available tier for the tenant, each referencing the
           tier's QoS class and VIP pool.
        5. Creates VolumeSnapshotClasses for snapshot support.
        6. Sets status.storage_ready = true on the ClusterOrder CR once all resources are healthy.
    v0_1_constraints:
      - Networked storage only for application data; etcd and control-plane nodes use local storage.
      - StorageClasses are per-tenant and per-tier; tenants cannot mix tiers in a single PVC.
    teardown: >
      On cluster deletion the controller removes cluster-side resources: StorageClasses,
      VolumeSnapshotClasses, and the CSI Secret. Backend resources (VAST tenant, views, quotas)
      and the per-tenant K8s Secret are preserved so other clusters sharing the same tenant
      can continue using storage without reconfiguration.
    wire_fields:
      storage_ready: >-
        status.storage_ready (boolean) on the Cluster wire response. Null/absent = not yet
        triggered; false = CSI install in progress; true = all StorageClasses healthy.
      storage: >-
        status.storage (ClusterStorageStatus) populated once CSI setup completes. Contains
        csi_driver string, storage_classes array (each with name, tier, is_default, parameters),
        and volume_snapshot_classes array (each with name, driver, deletion_policy, is_default).
    mock_behavior: >
      In OSAC_API_MODE=mock the BFF mock store sets storage_ready: false on READY clusters
      immediately and transitions to storage_ready: true after 30s to simulate the CSI
      provisioning window. storage.storage_classes is populated with one entry per demo tier
      (fast, standard) at that point. volume_snapshot_classes is populated with a single
      default snapshot class.


  # ---------------------------------------------------------------------------
  # Non-mock (â€śreal fulfillmentâ€ť) integration target â€” mock mode stays as-is
  # ---------------------------------------------------------------------------
  osac_real_api_integration:
    purpose: >
      When OSAC runs against real fulfillment-service (typically OSAC_API_MODE=dev with
      FULFILLMENT_API_URL and a working IdP), the SPA + BFF MUST satisfy this contract.
      **OSAC_API_MODE=mock is unchanged:** BFF continues to serve fixtures; the SPA MAY keep
      using libs/api-contracts DEMO_*, VM_TEMPLATES, buildRecentActivities(vm list), and
      synthetic utilization charts exactly as today. Real-mode behavior MUST be gated
      (env, build flag, or runtime branch) so mock demos do not regress.
    mock_mode_invariant: >
      No obligation to wire OIDC, proxy non-fulfillment paths, or remove DEMO_* / VM_TEMPLATES
      when mock mode is active. Tests and local demos default to mock unless explicitly
      configured for dev/real.
    integration_scope:
      active_modes: [dev]
      disabled_modes: [mock]
      enforcement: >
        Requirements below are mandatory only when OSAC_API_MODE=dev. In OSAC_API_MODE=mock,
        preserve current fixture-first behavior and session personas.

    bff_dev_startup:
      active_modes: [dev]
      description: Fail-fast configuration before the BFF listens â€” avoids half-configured dev mode.
      implementation:
        - apps/app-backend/src/index.ts calls assertFulfillmentDevReady(OSAC_API_MODE, FULFILLMENT_API_URL).
        - apps/app-backend/src/startupConfig.ts â€” Vitest: startupConfig.test.ts
      rules:
        - When OSAC_API_MODE=dev, FULFILLMENT_API_URL MUST be non-empty and parse as http: or https:; otherwise the process exits with an error (stderr + exit code 1).
        - When OSAC_API_MODE=mock, FULFILLMENT_API_URL is ignored (upstream not contacted by proxy routes).

    bff_health_endpoints:
      active_modes: [mock, dev]
      routes:
        - GET /health â†’ JSON includes application mode (e.g. `{ status, mode }` echoing OSAC_API_MODE).
        - GET /ready â†’ readiness JSON for probes.

    bff_cors_and_local_dev_proxy:
      description: >
        Local SPA (Vite) talks same-origin `/api` via dev-server proxy to the BFF; browser does not need CORS
        to the cluster for fulfillment paths. CORS on the BFF remains relevant for alternate dev layouts.
      implementation:
        - apps/app-backend/src/app.ts â€” @fastify/cors with origin disabled in production; in non-production,
          permissive origin with credentials (tighten to an allowlist when hosting is fixed â€” OSAC_WORKAROUND_REMOVE(cors-refine)).
        - apps/app-frontend/vite.config.ts â€” dev server proxy `/api`, `/health`, `/ready` â†’ BFF (default localhost:3001).

    fulfillment_upstream_tls:
      active_modes: [dev]
      description: >
        BFF â†’ fulfillment HTTP client uses Node Undici when custom TLS trust is required; otherwise
        global fetch. Scoped to fulfillment upstream only (not global NODE_TLS_REJECT_UNAUTHORIZED).
      implementation:
        - apps/app-backend/src/fulfillmentUpstream.ts (createFulfillmentUpstream); Vitest: fulfillmentUpstream.test.ts
        - Wired from buildApp via FulfillmentProxyRouteConfig.fulfillmentFetch (routes/fulfillmentProxyConfig.ts).
      environment:
        FULFILLMENT_TLS_CA_FILE:
          optional: true
          behavior: PEM bundle read into Undici Agent connect.ca (prefer full chain). Prefer over NODE_EXTRA_CA_CERTS for Undici reliability.
        TEMP_FULFILLMENT_TLS_INSECURE:
          optional: true
          values: Set to "1" for dev-only upstream TLS verification off (curl -k equivalent).
          production_rule: MUST refuse when NODE_ENV=production (throws at createFulfillmentUpstream).
      teardown: fulfillmentUpstream.close() registered on Fastify onClose.

    authentication_oidc:
      active_modes: [dev]
      description: Wire capabilities discovery to interactive login and Bearer tokens.
      steps:
        - >-
          On InstitutionalSignIn (or app bootstrap before protected routes), call
          GET /api/fulfillment/v1/capabilities **without** Authorization; parse authn.trustedTokenIssuers.
        - >-
          Run OAuth 2.0 Authorization Code flow with **PKCE** (or org-mandated equivalent)
          against the chosen issuer; obtain access_token (JWT) and optional refresh_token.
        - >-
          Store tokens per browser security guidance (memory + refresh, or httpOnly cookies if BFF participates).
        - >-
          Attach Authorization: Bearer with the access_token JWT on every SPAâ†’BFF request that
          forwards to fulfillment; BFF passes the header through unchanged for proxied paths.
        - Document logout (revoke or drop session) and token refresh failure UX.

    compute_instances_wire_format_and_ui:
      active_modes: [mock, dev]
      description: >-
        Align tenant dashboard KPI cards, My VMs cards/table, and VM detail views with real fulfillment
        `GET /api/fulfillment/v1/compute_instances` (and GET by id) wire JSON. Reference capture (2026-05):
        page envelope `{ size, total, items[] }`; each item uses snake_case fields and PROTO_JSON enums.
      wire_example_summary:
        metadata:
          - name (string)
          - creation_timestamp (RFC3339 string)
          - creators (string array; e.g. ["system"])
          - tenants (string array; tenancy scope from upstream)
          - version (integer; optimistic concurrency when present)
          - labels (object, optional)
        spec:
          - template (string; e.g. template ref id)
          - template_parameters (object; may contain protobuf Struct / wrapper shapes with "@type" + fields)
          - image.source_type, image.source_ref (registry URI or similar)
          - cores (integer), memory_gib (integer)
          - boot_disk.size_gib (integer); additional_disks optional
          - run_strategy â€” REST create/list uses string values **Always** | **Halted**; legacy proto-style
            **RUN_STRATEGY_*** strings may still appear on older wire and SHOULD normalize to those labels on read
          - subnet (string UUID); security_groups optional array
        status:
          - state â€” ENUM string such as COMPUTE_INSTANCE_STATE_RUNNING
          - conditions â€” array of { type, status, last_transition_time?, reason?, message? } using CONDITION_* enums on the wire
          - ip_address (string when assigned)
      normalization_layer:
        location: >-
          Implement once in **libs/api-contracts** and/or **apps/app-frontend/src/api** â€” e.g.
          `normalizeComputeInstance(raw)` + `normalizeComputeInstanceList(page)` â€” invoked from list/get/patch/create
          responses so all UI consumes **`ComputeInstance`** (`VmPowerState`, camelCase fields in TS types).
        accepts:
          - Fulfillment wire (snake_case + proto enum strings)
          - Legacy mock JSON (camelCase) during migration â€” normalize both paths to the same UI model.
        status_state_mapping:
          description: Map `status.state` wire enum â†’ `VmPowerState` for filters, VmStatusLabel, and dashboard buckets.
          rules:
            - COMPUTE_INSTANCE_STATE_RUNNING â†’ running
            - COMPUTE_INSTANCE_STATE_STOPPED â†’ stopped
            - COMPUTE_INSTANCE_STATE_PAUSED â†’ paused
            - COMPUTE_INSTANCE_STATE_STARTING â†’ starting
            - COMPUTE_INSTANCE_STATE_STOPPING â†’ stopping
            - COMPUTE_INSTANCE_STATE_DELETING â†’ deleting
            - COMPUTE_INSTANCE_STATE_ERROR â†’ error
            - Unknown / unmappable â†’ error (surface distinctly in UI if needed)
      tenant_user_dashboard_kpis:
        flow_ref: docs/specs/ui-flows/tenant-user-dashboard.yaml
        rules:
          - >-
            **All VMs** count MUST equal `items.length` from the tenant-visible list response (after client-side tenant filter
            if applicable), plus any demo-only synthetic rows only in mock mode if product keeps wizard clones â€” prefer **single source from API**.
          - >-
            **Running / Paused / Stopped** counts MUST be derived by aggregating normalized `VmPowerState` over that same list.
            Do not use static `DEMO_VM_POWER_COUNTS` when real data is loaded from `useComputeInstances` / TanStack Query.
          - >-
            Instances in **starting**, **deleting**, or **error** increment **All VMs** but do **not** increment Running/Paused/Stopped
            unless mapped above; optional future KPI row for â€śPending / Otherâ€ť is out of scope unless added to ui-flow.
          - Stat card navigation (`/vms?power=â€¦`) MUST filter My VMs using the same normalized state values.
      my_vms_surfaces:
        flow_ref: docs/specs/ui-flows/manage-virtual-machines.yaml
        list_cards_and_table:
          title: metadata.name
          status_badge: VmStatusLabel from normalized VmPowerState
          resources_row:
            - vCPU â€” spec.cores
            - Memory â€” spec.memory_gib formatted as â€śN GiBâ€ť (TS field memoryGib after normalize)
            - Storage â€” boot_disk.size_gib (+ sum additional_disks.size_gib when present); show numeric GiB not only â€śConfigured (n disk(s))â€ť when data exists
          secondary_rows:
            - IP â€” status.ip_address
            - Created â€” metadata.creation_timestamp (formatted); TS metadata.createdAt after normalize
          os_icon_chip:
            heuristic: >-
              Derive guest OS family from spec.image.source_ref / template until proto exposes a dedicated display field:
              e.g. fedora/ubuntu â†’ linux generic icon; `rhel`/`ubi` in ref â†’ rhel; windows in ref â†’ windows.
          description:
            note: >-
              Upstream may omit demo-only `description`; omit card/description line or show â€śâ€”â€ť when absent.
        detail_drawer:
          overview: >-
            Mirror list fields; include run_strategy, template id, and tenants/creators/version when useful for ops.
          networking:
            subnet: >-
              Wire `spec.subnet` is UUID â€” display short id and/or resolve friendly name via cached GET virtual_networks/subnets when available.
          conditions_tab:
            columns:
              - type (humanize enum suffix optional)
              - status (CONDITION_STATUS_* mapped to True/False/Unknown for display)
              - reason, message
              - last_transition_time (formatted)
          power_actions:
            api: PATCH /api/fulfillment/v1/compute_instances/{id}
            stop:
              wire: >-
                Prefer `spec.run_strategy: Halted` and `status.state: COMPUTE_INSTANCE_STATE_STOPPED` in one PATCH
                (see compute_instances_update example_requests).
            start:
              wire: >-
                `spec.run_strategy: Always` and `status.state: COMPUTE_INSTANCE_STATE_RUNNING` (or upstream-accepted starting state).
            restart:
              orchestration: >-
                **Not** a single `restart_requested_at` PATCH. **PATCH stop** on click; pending **Restarting** until list shows
                **stopped** (ignore stale **running**). Then pending **Starting**, **PATCH start**, until list shows **running** or **error**.
            spa:
              client: patchComputeInstancePower(id, 'start' | 'stop') â€” serializeComputeInstancePowerPatch in @osac/api-contracts
              hook: usePatchVm â€” non-power PATCH upserts list cache + refetch; **powerAction** PATCH does neither (pending UI + polled list)
              restart: useVmPowerActionDisplay + vmPowerPendingStore â€” Restarting until stopped, then Starting until running|error
              pending_display: useVmPowerActionDisplay â€” session Map vmId â†’ starting|stopping|restarting; list GET every 10s while pending
              create_pending: usePendingVmCreations + postCreateWatchStore â€” placeholder Creating, then Starting until startingâ†’running
              delete_pending: usePendingVmDeletes â€” Deleting from confirm until VM absent from list GET
              list_cache: refetchOnMount always for compute_instances; PENDING_VM_LIST_POLL_MS = 10_000
          unsupported_actions:
            clone:
              status: not_implemented
              note: >-
                VmActionsMenu Clone item and list/detail onClone handlers are commented (RESTORE markers).
                Wizard clone path remains spec-only; BFF rejects clone_drawer entry until wired.
            migrate:
              status: not_implemented
              note: VmActionsMenu Migrate item commented; no fulfillment migrate API in scope.
          delete_action:
            api: DELETE /api/fulfillment/v1/compute_instances/{id}
            prerequisite: >-
              VM MUST be stopped before DELETE. If the UI shows running or paused, the SPA issues **PATCH stop** first,
              then DELETE on success (same confirm modal; user sees combined progress).
            enablement: >-
              Actions menu Delete available when VM is not **deleting** (running/paused/stopped); stop-then-delete is automatic.
            ux: >-
              Confirm in a modal naming the VM; on confirm show **Deleting** immediately (`usePendingVmDeletes`);
              refetch list on DELETE success; remove card when GET list omits id.
            modes:
              mock: BFF removes id from vmStore; 404 when unknown id.
              dev: BFF proxies DELETE to FULFILLMENT_API_URL with same path and Authorization rules as other fulfillment CRUD.
            empty_state: >-
              When conditions array empty or missing, keep â€śNo conditions reported.â€ť
      mock_mode_alignment:
        description: >-
          **OSAC_API_MODE=mock** BFF handlers and **libs/api-contracts** fixture builders MUST emit payloads that
          normalize into the same **`ComputeInstance`** shape as dev mode, **or** emit snake_case + proto enum strings
          identical to fulfillment wire so the normalization layer is exercised identically in CI.
        implementation_options:
          - >-
            Preferred: extend `buildVm` / vmStore paths to set `status.state` to proto-style enums and snake_case keys
            in JSON responses (Fastify serializes object keys as returned).
          - >-
            Acceptable interim: keep camelCase mock objects but ensure **normalizeComputeInstance** maps them to the canonical UI model.
        demo_persona_tenants:
          note: >-
            Real items include `metadata.tenants` (e.g. ["shared"]). Mock fixtures may keep demo tenant ids for UX;
            document filtering rule when mixing provider vs tenant scope (dashboard VM list may need filter by selected persona tenant).

    bff_proxy_matrix_dev:
      active_modes: [dev]
      description: When OSAC_API_MODE=dev, forward these prefixes to the fulfillment REST gateway (FULFILLMENT_API_URL).
      paths:
        - prefix: /api/fulfillment/v1
          note: Existing public fulfillment CRUD + capabilities (capabilities may be called without Bearer from browser if same-origin allows).
        - prefix: /api/events/v1
          note: Events.Watch â€” **stream**; BFF MUST NOT replace with mock JSON; forward streaming body and status headers.
        - prefix: /api/osac/public/v1
          note: Console.GetAccess and related public paths; forward Authorization.
      implementation_notes:
        - >-
          **Target:** avoid forcing JSON parse on proxied responses; support non-JSON bodies and
          chunked/event streams via proper streaming passthrough when the stack allows.
        - >-
          **Current implementation (apps/app-backend/src/routes/upstreamProxy.ts):** upstream responses
          are read fully with `arrayBuffer()` then sent to the client (buffered passthrough). Hop-by-hop
          headers are stripped on the reply; upstream status and remaining headers are forwarded.
          This is a documented workaround for Undici + Fastify streaming edge cases (search codebase
          for OSAC_WORKAROUND_REMOVE(proxy-buffer-body)); revisit for true SSE/chunked forwarding for
          GET /api/events/v1/events when verified.
        - Register dev proxy routes **before** or **instead of** mock handlers for the same paths.
        - Do not proxy these paths in OSAC_API_MODE=mock.
        - >-
          **TEMP dev Authorization (until SPA OIDC always sends a user JWT):** optional
          TEMP_FULFILLMENT_STATIC_BEARER on the BFF injects `Authorization: Bearer <token>` upstream
          only when the incoming request has **no non-empty Bearer** (malformed `Bearer` / `Bearer `
          counts as absent). It is **never** applied to `GET /api/fulfillment/v1/capabilities` so
          capabilities matches unauthenticated discovery. TEMP_FULFILLMENT_STATIC_BEARER_FORCE=1
          (dev only, NODE_ENVâ‰ production) replaces Authorization on other proxied routes â€” used when
          the browser holds an expired JWT in sessionStorage. SPA: when sessionStorage has no token,
          `VITE_DEV_BEARER_TOKEN` may supply a Bearer in dev only (apps/app-frontend/src/api/authToken.ts).
          Mark all with OSAC_WORKAROUND_REMOVE in code; remove when OIDC/session flow is complete.

    bff_test_harness:
      active_modes: [mock, dev]
      description: >
        Vitest + Fastify inject() lock the BFF integration contract in apps/app-backend.
        `buildApp()` composes the same route registration as production without listening.
      locations:
        - apps/app-backend/src/app.ts
        - apps/app-backend/src/index.ts
        - apps/app-backend/src/startupConfig.ts
        - apps/app-backend/src/fulfillmentUpstream.ts
        - apps/app-backend/src/routes/fulfillmentProxyConfig.ts
        - apps/app-backend/src/routes/upstreamProxy.ts
        - apps/app-backend/src/bff-contract.mock.test.ts
        - apps/app-backend/src/bff-contract.proxy.test.ts
        - apps/app-backend/src/startupConfig.test.ts
        - apps/app-backend/src/fulfillmentUpstream.test.ts
        - apps/app-backend/vitest.config.ts
      mock_mode_coverage:
        - GET /health mode echo
        - GET /api/fulfillment/v1/capabilities stub shape
        - GET /api/fulfillment/v1/cluster_templates page envelope
        - >-
          GET /api/fulfillment/v1/compute_instance_templates page envelope â€” required once catalog + wizard
          alignment ships (see template-catalog-wizard-api-alignment.yaml); extend mock contract tests accordingly.
        - >-
          DELETE /api/fulfillment/v1/compute_instances/{id} â€” removes mock vmStore entry; 404 when missing;
          empty object body on success (200).
        - >-
          PATCH /api/fulfillment/v1/compute_instances/{id} â€” power actions update vmStore; returns { object };
          stop sets run_strategy Halted + COMPUTE_INSTANCE_STATE_STOPPED.
        - GET /api/events/v1/events mock pagination
        - GET /api/osac/public/v1/console/.../access envelope
        - >-
          GET /api/fulfillment/v1/clusters â€” returns page envelope with demo clusterStore fixtures;
          wire format uses CLUSTER_STATE_* enums and snake_case field names. Tenant-scoped: filter
          by tenants array matching signed-in persona (northstar or evergreen).
        - >-
          GET /api/fulfillment/v1/clusters/{id} â€” returns single cluster from clusterStore; 404 when missing.
        - >-
          POST /api/fulfillment/v1/clusters â€” mock BFF appends to clusterStore with CLUSTER_STATE_PROGRESSING;
          returns new Cluster object. Validates metadata.name (non-empty, unique in store); 409 on duplicate.
        - >-
          PATCH /api/fulfillment/v1/clusters/{id} â€” updates spec.node_sets in clusterStore; returns updated
          Cluster. 400 if node count < 1; 404 when id missing.
        - >-
          DELETE /api/fulfillment/v1/clusters/{id} â€” removes from clusterStore; 404 when missing; 409 when
          state is CLUSTER_STATE_PROGRESSING (fulfillment policy enforced in mock).
        - >-
          GET /api/fulfillment/v1/cluster_catalog_items â€” returns page envelope with two demo catalog items
          (ocp-standard, ocp-gpu); both published: true. Wire format uses snake_case keys.
        - >-
          GET /api/fulfillment/v1/cluster_catalog_items/{id} â€” returns single catalog item; 404 when missing.
      dev_proxy_coverage:
        - Upstream URL joins FULFILLMENT_API_URL with request path for fulfillment, events, and osac public prefixes
        - DELETE /api/fulfillment/v1/compute_instances/{id} forwarded with method, path, and Authorization (same as GET/PATCH)
        - PATCH /api/fulfillment/v1/compute_instances/{id} forwarded for Start/Stop/Restart power actions
        - Authorization forwarded from client when present (global fetch mocked)
        - TEMP_FULFILLMENT_STATIC_BEARER fills Authorization when client omits token (except GET capabilities); FORCE replaces on non-capabilities routes when env set
        - Empty/malformed Bearer allows static bearer merge on non-capabilities routes
        - Response status and content-type passthrough; non-JSON upstream body preserved via buffered passthrough (tests assert text/plain survives)
      limitations:
        - Tests use inject() + mocked fetch; they assert wiring and headers rather than production SSE chunk timing. Full streaming proxy behavior remains a follow-up per bff_proxy_matrix_dev.implementation_notes.

    jwt_claims_and_authorino_alignment:
      active_modes: [dev]
      description: Ensure JWT claims, IdP setup, and Authorino policy produce expected x-subject.
      requirements:
        - >-
          Keycloak (or chosen OIDC provider) MUST issue JWTs with claims required by Authorino
          policy (`username` and tenant-bearing `groups`, or documented mapped equivalents).
        - >-
          `authn.trustedTokenIssuers[].issuerUrl` served by capabilities MUST match the JWT
          issuer configured in Authorino AuthConfig.
        - >-
          In successful authorized requests, Authorino MUST produce x-subject with
          `{ user, tenants }`; JWT users map tenants from groups, and admin identities map
          to universal tenant scope (`["*"]`) per policy.
      mock_mode_behavior: >
        In OSAC_API_MODE=mock, no real IdP/JWT claim validation is required and x-subject
        verification is not part of acceptance.

    role_model_alignment:
      active_modes: [dev]
      description: Align SPA persona model with fulfillment authorization semantics.
      options:
        - id: A
          label: UI-only tenantAdmin vs tenantUser split
          detail: >
            Keep both personas mapped to backend "client" permissions; differences remain
            UX/navigation-level only.
        - id: B
          label: Backend-distinct tenantAdmin and tenantUser
          detail: >
            Extend Authorino/service policy so tenantAdmin and tenantUser have distinct
            backend-authorized operations.
        - id: C
          label: Backend-driven role bindings
          detail: >
            Drive SPA authorization from fulfillment Roles/RoleBindings APIs and treat welcome
            personas as entry hints, not the source of truth.
      constraints:
        - Selected option MUST be documented in README/runbook before enabling dev mode by default.
        - OSAC_API_MODE=mock continues using local demo personas regardless of selected dev option.

    client_and_hooks_expansion:
      active_modes: [dev]
      description: apps/app-frontend MUST extend api/client.ts (or generated SDK) and hooks.ts (TanStack Query).
      minimum_operations:
        - method: GET
          path: /api/fulfillment/v1/capabilities
          auth: false
        - method: GET
          path: /api/fulfillment/v1/organizations
          hooks: [listOrganizations, useOrganizations]
        - method: GET
          path: /api/fulfillment/v1/organizations/{id}
          hooks: [getOrganization, useOrganization]
        - method: GET
          path: /api/fulfillment/v1/users
          hooks: [listUsers, useUsers]
        - method: GET
          path: /api/fulfillment/v1/virtual_networks
          hooks: [listVirtualNetworks, useVirtualNetworks]
        - method: GET
          path: /api/fulfillment/v1/subnets
          hooks: [listSubnets, useSubnets]
        - method: GET
          path: /api/fulfillment/v1/security_groups
          hooks: [listSecurityGroups, useSecurityGroups]
        - method: GET
          path: /api/events/v1/events
          note: Stream consumer â€” useEventStream / useEventsWatch; not plain fetch().json()
        - method: GET
          path: /api/fulfillment/v1/compute_instance_templates
          note: Wizard + catalog alignment with fulfillment VM templates
        - method: GET
          path: /api/fulfillment/v1/compute_instance_templates/{id}
        - method: GET
          path: /api/fulfillment/v1/clusters
          hooks: [listClusters, useClusters]
          note: Poll every 15s while any cluster in PROGRESSING state; stop when all READY or FAILED
        - method: GET
          path: /api/fulfillment/v1/clusters/{id}
          hooks: [getCluster, useCluster]
        - method: POST
          path: /api/fulfillment/v1/clusters
          hooks: [createCluster, useCreateCluster]
          note: Mock BFF only; dev mode requires platform token â€” see contract_note_cluster_create
        - method: PATCH
          path: /api/fulfillment/v1/clusters/{id}
          hooks: [patchCluster, usePatchCluster]
          note: Used for node set scaling; send spec.node_sets map with updated size
        - method: DELETE
          path: /api/fulfillment/v1/clusters/{id}
          hooks: [deleteCluster, useDeleteCluster]
        - method: GET
          path: /api/fulfillment/v1/cluster_catalog_items
          hooks: [listClusterCatalogItems, useClusterCatalogItems]
          note: UI filters client-side on published:true; or pass filter param to server
        - method: GET
          path: /api/fulfillment/v1/cluster_catalog_items/{id}
          hooks: [getClusterCatalogItem, useClusterCatalogItem]
      existing_operations_to_fix:
        - >-
          POST /api/fulfillment/v1/compute_instances: HTTP+JSON unmarshaler expects **ComputeInstance** at the JSON
          **root** (unknown field `"object"` if wrapped as ComputeInstancesCreateRequest). SPA uses
          `serializeComputeInstanceForCreate()` from `@osac/api-contracts` (proto JSON / snake_case). Mock BFF may also
          accept legacy `{ "object": â€¦ }`.
        - >-
          PATCH bodies MUST match fulfillment implicit FieldMask semantics (present fields only).
        - Wire GET/PATCH/DELETE compute instance and GET cluster_template by id where UI needs them.

    replace_mock_data_sources:
      description: In dev/real mode, stop sourcing these screens from libs/api-contracts fixtures.
      mappings:
        - screen_or_component: CreateVmWizard / TemplateStep / ReviewStep
          remove: VM_TEMPLATES from @osac/api-contracts as the **only** source for template-path picker lists in dev/real
          use: >-
            **Same** fulfillment API and client cache as vm-template-catalog â€” GET /api/fulfillment/v1/compute_instance_templates
            (+ GET /api/fulfillment/v1/compute_instance_templates/{id} when detail needed). Normative detail:
            docs/specs/template-catalog-wizard-api-alignment.yaml.
        - screen_or_component: CatalogPage / provider global templates
          remove: Primary reliance on GET /api/fulfillment/v1/cluster_templates for VM template catalog when compute_instance_templates is the VM catalog API upstream
          use: >-
            GET /api/fulfillment/v1/compute_instance_templates (+ optional GET by id). Must match wizard template step source
            (template-catalog-wizard-api-alignment.yaml). cluster_templates remains valid for non-VM cluster-template surfaces if product retains both APIs.
        - screen_or_component: ProviderTenantOrgsPage / ProviderAdminDashboard org counts
          remove: DEMO_ORGANIZATIONS
          use: useOrganizations (GET /api/fulfillment/v1/organizations)
        - screen_or_component: AdminUsersPage
          remove: NORTHSTAR_USERS, EVERGREEN_USERS
          use: useUsers with CEL filter or org scope per RBAC
        - screen_or_component: AdminNetworksPage / topology
          remove: VM-only inference where product expects VN/subnet APIs
          use: useVirtualNetworks, useSubnets, useSecurityGroups + compute_instances for VM placement
        - screen_or_component: DashboardVmUtilizationSection sidebar + RecentActivitiesPage
          remove: buildRecentActivities(vm list) as sole source in dev mode
          use: events stream per osac_bff_runtime_modes.dev
        - screen_or_component: DashboardPage stat cards
          remove: DEMO_VM_POWER_COUNTS as primary source in dev mode
          use: Aggregate counts from GET compute_instances (fulfillment state) or future summary API
        - screen_or_component: DashboardQuotaSection / AdminQuotaPage
          remove: DEMO_QUOTA as â€śrealâ€ť data in dev mode
          use: SPEC_GAP â€” no standard public quota resource in analyzed fulfillment surface;
            document empty/placeholder UI, product-approved private proxy via BFF only, or wait for upstream quota API

    utilization_metrics_charts:
      status: spec_gap_accepted
      description: >
        DashboardUtilizationSection CPU/memory/GPU/storage line charts have no fulfillment
        public time-series metrics API in the analyzed contract. Until product adds one:
      options:
        - id: A
          label: Explicit prototype gap
          detail: Keep deterministic/synthetic series in **both** modes OR show â€śdemo dataâ€ť in real mode with PatternFly inline alert.
        - id: B
          label: New fulfillment API
          detail: Add tenant metrics endpoint; update this spec with path, query (window, step), and schema.
        - id: C
          label: External observability
          detail: BFF aggregates Prometheus/Grafana or similar; document separate OpenAPI for /api/osac/metrics/* if used.

    typescript_models:
      description: Align TypeScript with fulfillment proto-JSON, not hand-written demo shapes.
      policy:
        - >-
          **Preferred:** Consume OpenAPI published by fulfillment-service (CI artifact or repo)
          and codegen into libs/api-contracts or libs/fulfillment-sdk (openapi-typescript, hey-api/openapi-ts, etc.).
        - >-
          **Minimum:** Runtime validators (Zod) generated from the same OpenAPI; map proto-JSON
          to view models in a thin adapter layer.
        - >-
          Keep existing demo types (ComputeInstance, ClusterTemplate, PageOfT) for **mock mode only**
          or as aliases of generated types after proving equivalence.
      fields_to_reconcile:
        - Nested metadata, spec, status per proto; enum PROTO_JSON strings; google.protobuf.Any in template parameters.

    rbac_tenant_scoping:
      description: Tenant isolation comes from fulfillment authz on the JWT; SPA does not invent parallel tenant headers unless product mandates.
      notes:
        - Document which JWT claims map to tenant/org for support and debugging.
        - Provider-admin views use broader list filters; fulfillment enforces scope.


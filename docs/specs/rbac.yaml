version: 1
id: osac-rbac
title: OSAC Role and Permission Definitions

roles:
  - id: providerAdmin
    label: Provider Admin
    description: Manages platform services, tenant organizations, and provider-wide policies in the Vertexa context.
    inherits: []
  - id: tenantAdmin
    label: Tenant Admin
    description: Manages users, quota, network topology, and tenant-scoped workspace operations.
    inherits:
      - tenantUser
  - id: tenantUser
    label: Tenant User
    description: Operates VM workload lifecycle within a single tenant organization workspace.
    inherits: []

permissions:
  - id: choose_persona
    label: Choose entry persona on welcome landing
    risk: low
    flows:
      - welcome-and-role-selection
  - id: use_theme_toggle
    label: Toggle UI theme
    risk: low
    flows:
      - welcome-and-role-selection
      - application-shell-session
  - id: submit_sign_in
    label: Submit institutional sign-in
    risk: medium
    flows:
      - institutional-sign-in
  - id: switch_institution
    label: Return to institution chooser before sign-in
    risk: low
    flows:
      - institutional-sign-in
  - id: view_shell
    label: View authenticated application shell
    risk: low
    flows:
      - application-shell-session
  - id: navigate_shell_sections
    label: Navigate sidebar shell sections
    risk: low
    flows:
      - application-shell-session
  - id: logout
    label: Log out to welcome landing
    risk: medium
    flows:
      - application-shell-session
  - id: view_recent_activities
    label: View recent activity feed
    risk: low
    flows:
      - application-shell-session
      - recent-activities
  - id: view_dashboard
    label: View tenant user dashboard
    risk: low
    flows:
      - tenant-user-dashboard
  - id: open_create_vm
    label: Open create virtual machine workflow
    risk: high
    flows:
      - tenant-user-dashboard
      - create-virtual-machine-wizard
  - id: view_catalog
    label: View VM template catalog
    risk: low
    flows:
      - vm-template-catalog
  - id: create_from_template
    label: Start create VM from selected template
    risk: high
    flows:
      - vm-template-catalog
      - create-virtual-machine-wizard
  - id: use_vm_wizard
    label: Complete VM creation wizard steps
    risk: high
    flows:
      - create-virtual-machine-wizard
  - id: provision_vm
    label: Provision a virtual machine
    risk: high
    flows:
      - create-virtual-machine-wizard
  - id: view_my_vms
    label: View virtual machine list and details
    risk: low
    flows:
      - manage-virtual-machines
  - id: operate_vm_power
    label: Start, stop, or restart virtual machines
    risk: high
    flows:
      - manage-virtual-machines
  - id: clone_vm
    label: Clone virtual machine into new workload
    risk: high
    flows:
      - manage-virtual-machines
      - create-virtual-machine-wizard
  - id: launch_console
    label: Launch VM console demo from running VM
    risk: medium
    flows:
      - manage-virtual-machines
      - vm-console-standalone-demo
  - id: view_tenant_admin_dashboard
    label: View tenant administration dashboard
    risk: low
    flows:
      - tenant-administration
  - id: manage_users
    label: Manage tenant users
    risk: high
    flows:
      - tenant-administration
  - id: view_quota
    label: View tenant quota
    risk: medium
    flows:
      - tenant-administration
  - id: view_topology
    label: View tenant or provider network topology
    risk: medium
    flows:
      - tenant-administration
      - provider-administration
  - id: open_vm_from_topology
    label: Open VM detail handoff from tenant topology
    risk: medium
    flows:
      - tenant-administration
      - manage-virtual-machines
  - id: view_provider_dashboard
    label: View provider administration dashboard
    risk: low
    flows:
      - provider-administration
  - id: manage_tenants
    label: Manage tenant organizations
    risk: high
    flows:
      - provider-administration
  - id: manage_resource_allocation
    label: Manage provider resource allocation policy
    risk: high
    flows:
      - provider-administration
  - id: manage_global_templates
    label: Manage provider global templates
    risk: high
    flows:
      - provider-administration
  - id: view_infrastructure
    label: View provider infrastructure pages
    risk: medium
    flows:
      - provider-administration
  - id: view_clusters
    label: View cluster list and details
    risk: low
    flows:
      - cluster-service-catalog
  - id: open_create_cluster
    label: Open create cluster workflow and submit
    risk: high
    flows:
      - cluster-service-catalog
  - id: view_cluster_catalog_items
    label: Browse cluster catalog items for provisioning
    risk: low
    flows:
      - cluster-service-catalog
  - id: scale_cluster_nodes
    label: Scale worker node count on an existing cluster
    risk: high
    flows:
      - cluster-service-catalog
  - id: delete_cluster
    label: Delete a cluster
    risk: high
    flows:
      - cluster-service-catalog

role_permission_matrix:
  providerAdmin:
    grants:
      - choose_persona
      - use_theme_toggle
      - submit_sign_in
      - switch_institution
      - view_shell
      - navigate_shell_sections
      - logout
      - view_recent_activities
      - view_provider_dashboard
      - manage_tenants
      - manage_resource_allocation
      - manage_global_templates
      - view_infrastructure
      - view_topology
  tenantAdmin:
    grants:
      - choose_persona
      - use_theme_toggle
      - submit_sign_in
      - switch_institution
      - view_shell
      - navigate_shell_sections
      - logout
      - view_recent_activities
      - view_dashboard
      - open_create_vm
      - view_catalog
      - create_from_template
      - use_vm_wizard
      - provision_vm
      - view_my_vms
      - operate_vm_power
      - clone_vm
      - launch_console
      - view_tenant_admin_dashboard
      - manage_users
      - view_quota
      - view_topology
      - open_vm_from_topology
  tenantUser:
    grants:
      - choose_persona
      - use_theme_toggle
      - submit_sign_in
      - switch_institution
      - view_shell
      - navigate_shell_sections
      - logout
      - view_recent_activities
      - view_dashboard
      - open_create_vm
      - view_catalog
      - create_from_template
      - use_vm_wizard
      - provision_vm
      - view_my_vms
      - operate_vm_power
      - clone_vm
      - launch_console
      - view_clusters
      - open_create_cluster
      - view_cluster_catalog_items
      - scale_cluster_nodes
      - delete_cluster

ai-hints:
  summary: >-
    Canonical RBAC for OSAC. Three roles (providerAdmin, tenantAdmin, tenantUser) are
    sourced from welcome-and-role-selection routing_matrix. Each listed permission maps to
    one or more flow ids from FLOW-INDEX.yaml and ui-flows/*.yaml. XState guards should use
    can(role, permissionId) against this manifest.
  constraints:
    - tenantAdmin inherits all tenantUser permissions
    - providerAdmin does not manage individual virtual machines in this demo baseline
    - vm lifecycle actions must remain tenant-scoped and must not cross tenant boundaries
  integration_modes:
    dev: >-
      With OSAC_API_MODE=dev, this manifest must be reconciled with
      backend-fulfillment.yaml context.osac_real_api_integration.role_model_alignment and
      jwt_claims_and_authorino_alignment. SPA personas are valid only if they map to
      backend-enforced permissions and tenant scope from JWT/Authorino.
    mock: >-
      With OSAC_API_MODE=mock, this manifest continues to drive local demo navigation and
      guards without requiring real IdP tokens, Authorino checks, or fulfillment RoleBindings.

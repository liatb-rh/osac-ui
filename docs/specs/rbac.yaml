# OSAC UI — Role and Permission Definitions
# Extracted from: shellNav.ts (nav gating), SessionContext.tsx (role enum),
#   AppShell.tsx (route gating), VmsPage.tsx (Create VM button), StorageTiersPage.tsx (CRUD gating)
# Generated: 2026-06-18  Blueprint Extraction Agent v1

version: 2
id: osac-ui-rbac
title: OSAC UI Role and Permission Definitions
permission_model: role-based-ui-demo

ai-hints:
  summary: >-
    Three roles (providerAdmin, tenantAdmin, tenantUser).  Role is set at persona selection
    on the welcome page and stored in SessionContext (no JWT in demo mode).  Nav visibility
    is filtered by shellNav.navRowsForRole(role).  There are no checkPermissions() /
    canEdit / canDelete props in this codebase — all gating is role comparison in component
    render logic (e.g. role === 'tenantUser' to show Create VM button).
  integration_modes:
    demo: >-
      Session role is a client-side enum (providerAdmin | tenantAdmin | tenantUser).
      No Authorino, no JWT verification — all gating is presentational.
    production_intent: >-
      A production deployment would replace SessionContext role with a JWT claim and enforce
      resource-level RBAC server-side.  See backend-api.yaml for intended role alignment.

# ---------------------------------------------------------------------------
# Roles
# ---------------------------------------------------------------------------

roles:
  - id: providerAdmin
    label: Provider Admin
    description: >-
      Manages the OSAC platform — tenants, agents, storage backends, global network
      templates, public IP pools, network classes, and cluster offerings CRUD.
      Persona: Vertexa employee.
    default_route: /agents
    nav_sections: [Resources, Roadmap Preview]
    inherits: []

  - id: tenantAdmin
    label: Tenant Admin
    description: >-
      Manages a single tenant organisation — networks (VNs/Subnets/SGs), public IPs,
      catalog items, cluster offerings (enable/disable per org), storage volumes.
      Also has all tenantUser VM/cluster/baremetal workload capabilities.
      Persona: tenant organisation administrator.
    default_route: /admin/dashboard   # → SparsePlaceholderPage (no dashboard route yet)
    nav_sections: [Services, Resources, Roadmap Preview]
    inherits:
      - tenantUser

  - id: tenantUser
    label: Tenant User
    description: >-
      Operates VM/cluster/baremetal workloads within a tenant organisation — catalog browse,
      create/power/delete VMs, manage clusters, request baremetal, view storage tiers and
      volumes, and view recent activities.
      Persona: tenant engineer.
    default_route: /catalog-items
    nav_sections: [Services, Account]
    inherits: []

# ---------------------------------------------------------------------------
# Permissions
# Semantic IDs (agent-friendly).  Each maps to one or more flows and
# notes the UI affordance when denied (hidden | disabled | redirect | n/a).
# ---------------------------------------------------------------------------

permissions:
  # -- Auth --
  - id: select_persona
    label: Choose entry persona on welcome landing
    risk: low
    flows: [welcome-and-role-selection]
    ui_affordance: n/a
    notes: All unauthenticated visitors can select a persona.

  - id: submit_sign_in
    label: Submit institutional sign-in form
    risk: medium
    flows: [institutional-sign-in]
    ui_affordance: n/a
    notes: Any persona can attempt sign-in; email/password not validated in demo.

  # -- Shell --
  - id: view_shell
    label: View authenticated application shell
    risk: low
    flows: [application-shell-session]
    ui_affordance: redirect
    notes: Unauthenticated users are redirected to WelcomePage.

  - id: navigate_sidebar
    label: Navigate sidebar sections and items
    risk: low
    flows: [application-shell-session]
    ui_affordance: hidden
    notes: Nav items with roles[] gate visibility via navRowsForRole.

  - id: toggle_theme
    label: Toggle light/dark theme
    risk: low
    flows: [application-shell-session, welcome-and-role-selection]
    ui_affordance: n/a
    notes: Available to all authenticated users and welcome page.

  - id: logout
    label: Log out to welcome landing
    risk: medium
    flows: [application-shell-session]
    ui_affordance: n/a

  - id: view_recent_activities
    label: View full-page activity feed
    risk: low
    flows: [application-shell-session, recent-activities]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser only (shellNav).

  # -- VM workloads --
  - id: view_catalog
    label: Browse tenant catalog items
    risk: low
    flows: [tenant-catalog]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser only.

  - id: create_vm_from_catalog
    label: Launch create-VM wizard from catalog item
    risk: high
    flows: [tenant-catalog, create-virtual-machine-wizard]
    ui_affordance: hidden
    notes: Card click navigates to /vms?catalogItem=<id> which opens wizard.

  - id: view_vms
    label: View virtual machine list and detail
    risk: low
    flows: [manage-virtual-machines]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser only; tenantAdmin accesses via role=tenantAdmin.

  - id: create_vm
    label: Create a virtual machine
    risk: high
    flows: [manage-virtual-machines, create-virtual-machine-wizard]
    ui_affordance: hidden
    notes: >-
      "Create VM" button rendered only when role === 'tenantUser'
      (VmsPage.tsx line ~271).

  - id: operate_vm_power
    label: Start, stop, or restart a virtual machine
    risk: high
    flows: [manage-virtual-machines]
    ui_affordance: disabled
    notes: Power buttons disabled when wrong state or action pending.

  - id: delete_vm
    label: Delete a virtual machine
    risk: high
    flows: [manage-virtual-machines]
    ui_affordance: hidden
    notes: >-
      Actions row renders delete option; confirm modal warns about auto-stop
      if VM is running.

  - id: open_vm_console
    label: Open VM console demo (new tab)
    risk: medium
    flows: [manage-virtual-machines, vm-console-demo]
    ui_affordance: disabled
    notes: Disabled in ActionsColumn when VM is not in running state.

  # -- Clusters --
  - id: view_clusters
    label: View cluster list and detail
    risk: low
    flows: [manage-clusters]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser.

  - id: create_cluster
    label: Create a cluster via CreateClusterModal
    risk: high
    flows: [manage-clusters]
    ui_affordance: hidden

  - id: upgrade_cluster
    label: Upgrade cluster to a new OCP version
    risk: high
    flows: [manage-clusters]
    ui_affordance: disabled
    notes: Menu item disabled when cluster not READY.

  - id: delete_cluster
    label: Delete a cluster
    risk: high
    flows: [manage-clusters]
    ui_affordance: hidden

  - id: download_kubeconfig
    label: Download cluster kubeconfig YAML
    risk: medium
    flows: [manage-clusters]
    ui_affordance: disabled
    notes: Disabled when cluster not READY.

  # -- Baremetal (tenant) --
  - id: view_baremetal
    label: View tenant baremetal instance list and detail
    risk: low
    flows: [manage-baremetal]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser.

  - id: request_baremetal
    label: Request a baremetal instance via wizard
    risk: high
    flows: [manage-baremetal]
    ui_affordance: hidden

  # -- Tenant admin resources --
  - id: manage_networks
    label: Manage tenant virtual networks, subnets, and security groups
    risk: high
    flows: [manage-networks]
    ui_affordance: hidden
    notes: Nav item visible to tenantAdmin only.

  - id: manage_public_ips
    label: Allocate, attach, detach, and delete tenant public IPs
    risk: high
    flows: [manage-public-ips]
    ui_affordance: hidden
    notes: Nav item (admin-public-ips) visible to tenantAdmin only.

  - id: manage_catalog_items
    label: Create, edit, and toggle catalog items (tenantAdmin studio)
    risk: high
    flows: [manage-catalog-items]
    ui_affordance: hidden
    notes: Nav item admin-catalog-items visible to tenantAdmin.

  - id: manage_storage_volumes
    label: Create, view, and delete storage volumes and snapshots
    risk: high
    flows: [manage-storage-volumes]
    ui_affordance: hidden
    notes: Nav item visible to tenantUser and tenantAdmin.

  - id: view_storage_tiers
    label: View storage tier definitions (read-only for tenant roles)
    risk: low
    flows: [manage-storage-tiers]
    ui_affordance: hidden
    notes: Nav item platform-storage-tiers-readonly visible to tenantUser and tenantAdmin.

  - id: manage_cluster_offerings_tenant
    label: Enable/disable cluster offerings per org (tenantAdmin)
    risk: high
    flows: [manage-cluster-offerings]
    ui_affordance: hidden
    notes: Nav item cluster-offerings visible to tenantAdmin.

  # -- Provider admin resources --
  - id: manage_storage_tiers
    label: Create, edit, and toggle storage tier availability (providerAdmin)
    risk: high
    flows: [manage-storage-tiers]
    ui_affordance: hidden
    notes: Create/edit/toggle affordances rendered only for providerAdmin in StorageTiersPage.

  - id: manage_storage_backends
    label: Register and view storage backends (providerAdmin)
    risk: high
    flows: [manage-storage-backends]
    ui_affordance: hidden
    notes: Nav items platform-storage-overview, platform-storage-backends visible to providerAdmin.

  - id: manage_agents
    label: Provision and deprovision infrastructure agents
    risk: high
    flows: [manage-agents]
    ui_affordance: hidden
    notes: Nav item platform-agents visible to providerAdmin.

  - id: manage_global_templates
    label: Manage provider global network templates
    risk: high
    flows: [manage-global-templates]
    ui_affordance: hidden
    notes: Nav item platform-templates visible to providerAdmin.

  - id: manage_provider_public_ip_pools
    label: Manage provider public IP pools
    risk: high
    flows: [manage-provider-public-ip-pools]
    ui_affordance: hidden
    notes: Nav item platform-public-ip-pools visible to providerAdmin.

  - id: manage_network_classes
    label: View provider network classes (roadmap preview)
    risk: low
    flows: [manage-network-classes]
    ui_affordance: hidden
    notes: Nav item provider-net-classes visible to providerAdmin.

  - id: manage_cluster_offerings_provider
    label: CRUD on cluster catalog items (providerAdmin)
    risk: high
    flows: [manage-cluster-offerings]
    ui_affordance: hidden
    notes: Nav item cluster-offerings visible to providerAdmin.

  - id: manage_baremetal_inventory
    label: View provider baremetal host inventory
    risk: medium
    flows: [manage-baremetal-inventory]
    ui_affordance: hidden
    notes: Nav item provider-baremetal visible to providerAdmin.

# ---------------------------------------------------------------------------
# Role-permission matrix
# ---------------------------------------------------------------------------


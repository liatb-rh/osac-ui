      - submit_sign_in
      - view_shell
      - navigate_sidebar
      - toggle_theme
      - logout
      - view_recent_activities
      - view_catalog
      - create_vm_from_catalog
      - view_vms
      - create_vm
      - operate_vm_power
      - delete_vm
      - open_vm_console
      - view_clusters
      - create_cluster
      - upgrade_cluster
      - delete_cluster
      - download_kubeconfig
      - view_baremetal
      - request_baremetal
      - manage_networks
      - manage_public_ips
      - manage_catalog_items
      - manage_storage_volumes
      - view_storage_tiers
      - manage_cluster_offerings_tenant

  tenantUser:
    grants:
      - select_persona
      - submit_sign_in
      - view_shell
      - navigate_sidebar
      - toggle_theme
      - logout
      - view_recent_activities
      - view_catalog
      - create_vm_from_catalog
      - view_vms
      - create_vm
      - operate_vm_power
      - delete_vm
      - open_vm_console
      - view_clusters
      - create_cluster
      - upgrade_cluster
      - delete_cluster
      - download_kubeconfig
      - view_baremetal
      - request_baremetal
      - manage_storage_volumes
      - view_storage_tiers

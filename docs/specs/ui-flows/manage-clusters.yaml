# ui-flow: manage-clusters
# statechart_ref: ../statecharts/manage-clusters.statechart.yaml
# Generated: 2026-06-18

flow: manage-clusters
title: Manage Clusters (CaaS)
summary: >-
  Cluster lifecycle for tenantUser — list with search/state filter, create modal,
  upgrade modal, detail page with tabs, kubeconfig download.
statechart_ref: ../statecharts/manage-clusters.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    csc_clusters_list:
      view_list: view_clusters
      create: create_cluster
      upgrade: upgrade_cluster
      delete: delete_cluster
      download_kubeconfig: download_kubeconfig
    csc_cluster_detail_page:
      view: view_clusters
    csc_create_cluster_modal:
      submit: create_cluster
    csc_upgrade_cluster_modal:
      submit: upgrade_cluster

steps:
  - id: csc_clusters_list
    title: Clusters list
    goal: Browse tenant clusters; create, upgrade, delete, download kubeconfig.
    route: /clusters
    ui:
      components:
        - PageSection
        - PageHeader (title="Clusters")
        - SearchInput
        - FormSelect (state filter: all / READY / PROGRESSING / UPGRADING / FAILED)
        - Button "Create cluster" (primary)
        - ObjectsTable (Name, Status, Version, API URL, Actions)
        - ClusterStatusLabel
        - ClusterActionsMenu (Scale nodes, Upgrade, Download kubeconfig, Delete)
        - CreateClusterModal
        - UpgradeClusterModal
        - Alert danger (delete error)
    states:
      loading: { description: useClustersList isLoading=true; Spinner. }
      empty: { description: No clusters; empty content message. }
      populated: { description: Table with paginated cluster rows. }
      creating: { description: CreateClusterModal open. }
      upgrading: { description: UpgradeClusterModal open. }
    interactions:
      - "Search filters by cluster name (client-side)."
      - "State filter selects from ClusterState enum values."
      - "Name link navigates to /clusters/:id."
      - "ClusterActionsMenu: Scale opens inline node-count editor (PATCH clusters/:id).
         Upgrade opens UpgradeClusterModal.  Download kubeconfig calls GET clusters/:id/kubeconfig
         and triggers browser download.  Delete confirms then calls DELETE clusters/:id."
    validation_rules:
      - Upgrade button disabled if cluster state !== CLUSTER_STATE_READY.
      - Kubeconfig download disabled if cluster state !== CLUSTER_STATE_READY.

  - id: csc_cluster_detail_page
    title: Cluster detail
    goal: Full-page detail with tabs (Overview, Networking, Storage, Conditions).
    route: /clusters/:id
    ui:
      components:
        - Breadcrumb
        - PageHeader (title=cluster.metadata.name, state badge)
        - Tabs: ClusterOverviewTab, ClusterNetworkingTab, ClusterStorageTab, conditions tab
    states:
      loading: { description: Spinner while cluster data loads. }
      not_found: { description: EmptyState if cluster not in list. }
      ready: { description: Tabs rendered with cluster data. }

  - id: csc_create_cluster_modal
    title: Create cluster modal
    goal: Select catalog item and networking params; submit cluster creation.
    ui:
      components:
        - Modal
        - FormSelect (cluster catalog item picker)
        - TextInput (cluster name)
        - Networking section: VNet, Subnet, SecurityGroup selects
        - Button "Create" (isLoading while pending)
        - Alert error (submission failure)
    states:
      idle: { description: Form empty, waiting for user input. }
      submitting: { description: POST clusters in flight; Create button spinner. }
      error: { description: Alert with error message. }
    interactions:
      - "Submit calls POST /api/fulfillment/v1/clusters."
      - "On success modal closes; cluster list refetches."
    validation_rules:
      - Cluster name required.
      - Catalog item required.

  - id: csc_upgrade_cluster_modal
    title: Upgrade cluster modal
    goal: Select target version and submit upgrade.
    ui:
      components:
        - Modal
        - FormSelect (allowed versions from catalog item)
        - Button "Upgrade" (isLoading while pending)
    states:
      idle: { description: Version select shown. }
      submitting: { description: POST clusters/:id/upgrade in flight. }
    validation_rules:
      - Target version required.

transitions:
  - from: csc_clusters_list
    to: csc_cluster_detail_page
    event: CLICK_CLUSTER_ROW
    mechanism: navigate('/clusters/:id')

  - from: csc_clusters_list
    to: csc_create_cluster_modal
    event: CLICK_CREATE_CLUSTER
    guard: can(role, "create_cluster")

  - from: csc_clusters_list
    to: csc_upgrade_cluster_modal
    event: CLICK_UPGRADE_CLUSTER
    guard: can(role, "upgrade_cluster")

  - from: csc_cluster_detail_page
    to: csc_clusters_list
    event: CLICK_BACK_BREADCRUMB

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/services/clusters/ClustersPage.tsx
    - apps/app-frontend/src/pages/services/clusters/ClusterDetailPage.tsx
    - apps/app-frontend/src/components/clusters/CreateClusterModal.tsx
    - apps/app-frontend/src/components/clusters/UpgradeClusterModal.tsx
    - apps/app-frontend/src/components/clusters/ClusterActionsMenu.tsx
  deployment_variants: [standalone]

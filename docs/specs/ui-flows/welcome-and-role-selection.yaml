# ui-flow: welcome-and-role-selection
# statechart_ref: ../statecharts/welcome-and-role-selection.statechart.yaml
# Generated: 2026-06-18  Blueprint Extraction Agent v1

flow: welcome-and-role-selection
title: Welcome and Role Selection
summary: >-
  Pre-auth landing.  Four persona cards select tenant + role into SessionContext,
  then navigate to institutional sign-in.  Supports ?osac-entry deep link.
statechart_ref: ../statecharts/welcome-and-role-selection.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    wrs_welcome_landing:
      select_persona: select_persona  # no role required — unauthenticated

steps:
  - id: wrs_welcome_landing
    title: Welcome landing
    goal: Display persona cards; user selects entry point.
    route: /welcome (pre-auth, before AppShell)
    ui:
      components:
        - Page layout (unauthenticated, no sidebar)
        - Title "Red Hat OSAC Prototypes"
        - LightDarkToggle (top-right)
        - CardActive (per persona, 4 cards total)
    personas:
      - badge: Vertexa
        orgName: Vertexa
        role: providerAdmin
        tone: neutral
        description: Cloud provider administrator persona.
      - badge: Serve Robotics
        orgName: Serve Robotics (northstar tenant)
        role: tenantUser
        tone: blue
        logo: serve-robotics-logo.png
      - badge: Serve Robotics Admin
        orgName: Serve Robotics (northstar tenant)
        role: tenantAdmin
        tone: blue
      - badge: T-Mobile
        orgName: T-Mobile (evergreen tenant)
        role: tenantUser
        tone: magenta
        logo: tmobile-logo.png
      - badge: T-Mobile Admin
        orgName: T-Mobile (evergreen tenant)
        role: tenantAdmin
        tone: magenta
    states:
      idle: { description: Welcome page rendered; no persona selected yet. }
      deep_link_auto_redirect:
        description: >-
          If ?osac-entry=<key> present on cold load, readOsacEntry() pre-sets
          tenant/role.  consumeInitialOsacEntryDeepLinkRedirect() redirects
          straight to sign-in on first render.
    interactions:
      - "Selecting any tenant card calls selectTenantPersona(tenant, role) or selectProviderAdmin()."
      - "After selection, navigate to institutional sign-in page."
      - "?osac-entry query param consumed once; history.replaceState removes it."
    validation_rules: []

  - id: wrs_persona_selected_pre_auth
    title: Persona selected (pre-sign-in)
    goal: Session tenant+role are set; navigating to sign-in.
    ui:
      components: []  # transient state
    states:
      transitioning: { description: SessionContext updated; navigation in progress. }
    interactions:
      - "Navigation to sign-in page happens synchronously after card click."
    validation_rules: []

transitions:
  - from: wrs_welcome_landing
    to: wrs_persona_selected_pre_auth
    event: SELECT_PERSONA

  - from: wrs_persona_selected_pre_auth
    to: auth_sign_in_form
    event: AUTO_NAVIGATE

  - from: auth_sign_in_form
    to: wrs_welcome_landing
    event: CLICK_BACK_TO_WELCOME
    notes: Back link on sign-in page.

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/auth/WelcomePage.tsx
    - apps/app-frontend/src/contexts/SessionContext.tsx
  deployment_variants: [standalone]

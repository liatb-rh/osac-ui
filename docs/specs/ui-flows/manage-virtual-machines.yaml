# ui-flow: manage-virtual-machines
# statechart_ref: ../statecharts/manage-virtual-machines.statechart.yaml
# Generated: 2026-06-18  Blueprint Extraction Agent v1

flow: manage-virtual-machines
title: Manage Virtual Machines
summary: >-
  VM lifecycle management for tenantUser and tenantAdmin.  List view with search +
  status filter, per-row power/delete actions, full-page detail with tabs, and
  CreateVmWizard modal overlay.
statechart_ref: ../statecharts/manage-virtual-machines.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    mvm_list_view:
      view_list: view_vms
      open_create_wizard: create_vm        # Create VM button, tenantUser only
      start_vm: operate_vm_power
      stop_vm: operate_vm_power
      restart_vm: operate_vm_power
      open_console: open_vm_console        # disabled when not running
      delete_vm: delete_vm
    mvm_detail_page:
      view_detail: view_vms
      start_action: operate_vm_power
      stop_action: operate_vm_power
      restart_action: operate_vm_power
      delete_action: delete_vm
    mvm_delete_confirm_modal:
      confirm_delete: delete_vm

steps:
  - id: mvm_list_view
    title: Virtual Machine Instances list
    goal: >-
      Show all compute instances for the tenant with search and status filter.
      Allow power actions and VM creation without leaving the page.
    route: /vms
    ui:
      components:
        - PageLayout (title="Virtual Machine Instances", description="Operate workload lifecycle…")
        - SearchInput (placeholder="Filter by name")
        - ToggleGroup (All / Running / Stopped status filter)
        - ObjectsTable (columns: Name, Status, OS, vCPU, Memory, IP address, Actions)
        - VmStatusLabel (per row)
        - ActionsColumn (Start/Stop | Restart | Open console | Delete)
        - Button primary "Create VM" (hidden when role !== 'tenantUser')
        - CreateVmWizard (Modal overlay, ref-driven)
        - VmDeleteConfirmModal (Modal)
        - Spinner (loading state)
    states:
      loading:
        description: useComputeInstances() isLoading = true; Bullseye Spinner shown.
      empty:
        description: >-
          isLoading=false, filteredVms.length=0 and no filter active.
          Content paragraph: "No virtual machines yet. Create one to get started."
      empty_filtered:
        description: >-
          isLoading=false, filteredVms.length=0 with active search or status filter.
          Content paragraph: "No virtual machines match your filters."
      populated:
        description: ObjectsTable rendered with paginated rows (defaultPageSize=10).
      pending_create:
        description: >-
          After POST compute_instances, optimistic placeholder row added via
          usePendingVmCreations.  Row name link disabled (isPendingDelete equivalent
          pattern).  Row removed once API confirms or error.
      pending_delete:
        description: >-
          After delete confirmed, row kept but name link disabled; ActionsColumn hidden.
          usePendingVmDeletes tracks state.
      wizard_open:
        description: CreateVmWizard Modal rendered over list; list remains in DOM.
      delete_confirm_open:
        description: VmDeleteConfirmModal rendered over list.
    interactions:
      - "Search input filters vms by metadata.name (case-insensitive)."
      - "Status filter ToggleGroup filters vms by getDisplayState(vm) result."
      - "Clicking row or name link navigates to /vms/:id."
      - >-
        'Start/Stop/Restart' in ActionsColumn calls runPowerAction(vm, action) which
        patches PATCH /api/fulfillment/v1/compute_instances/:id.  Button disabled
        when isPowerActionPending(vm.id).
      - >-
        'Open console' opens a new tab via window.open with
        ?demo=vm-console&vm=<id>&name=<name>&os=<os>.  Disabled when state !== running.
      - >-
        'Delete' opens VmDeleteConfirmModal.  If VM is running, confirm modal warns
        "Stopping first…" and PATCHes stop before DELETE.
      - >-
        'Create VM' button (tenantUser) calls wizardRef.current.open().  If page was
        navigated to with ?catalogItem=<id>, useEffect calls
        wizardRef.current.openFromTemplate(catalogItemId) on mount.
    validation_rules:
      - Status filter values: 'all' | 'running' | 'stopped' (client-side only).

  - id: mvm_detail_page
    title: VM detail
    goal: >-
      Full-page view of a single VM with KPI bar, power action buttons, and tabs
      (Overview, Networking, Storage, Activity).
    route: /vms/:id
    ui:
      components:
        - Breadcrumb ("Virtual Machines" → vm.metadata.name)
        - PageHeader (title=vm.metadata.name, description=osLabel + template)
        - Flex with Button: Start (secondary), Stop (secondary), Restart (secondary), Delete (danger)
        - KpiHeader (Power state, vCPU, Memory, IP address)
        - Tabs (Overview, Networking, Storage, Activity)
        - VmOverviewTab, VmNetworkingTab, VmStorageTab, VmActivityTab
        - VmDeleteConfirmModal
        - Spinner (loading state)
        - EmptyState (not found state)
    states:
      loading:
        description: >-
          useComputeInstances() isLoading=true; full-height Bullseye Spinner.
      not_found:
        description: >-
          vm not in list after load (may have been deleted).
          EmptyState: "Virtual machine not found. Back to My VMs" link.
      running:
        description: Stop and Restart buttons enabled; Start disabled.
      stopped:
        description: Start button enabled; Stop and Restart disabled.
      transitioning:
        description: >-
          Power action pending (isPowerActionPending=true); all power buttons disabled.
    interactions:
      - "Breadcrumb 'Virtual Machines' navigates to /vms."
      - "Start/Stop/Restart call runPowerAction(vm, action)."
      - "Delete opens VmDeleteConfirmModal; on confirm DELETE + navigate('/vms')."
      - "Tabs: Overview shows spec summary. Networking shows subnet/SG attachments.
         Storage shows disk/volume attachments. Activity shows recent OsacEvent list."
    validation_rules: []

  - id: mvm_delete_confirm_modal
    title: Delete VM confirm modal
    goal: Ask user to confirm VM deletion; warn if VM must be stopped first.
    ui:
      components:
        - Modal (small)
        - Alert warning (if VM is running: "VM will be stopped first")
        - Button danger "Delete" (isLoading while pending)
        - Button link "Cancel"
    states:
      pending:
        description: isDeleting=true; Delete button shows spinner + disabled.
      error:
        description: >-
          patchVm.isError or deleteVm.isError: error message rendered in modal body.
      idle:
        description: Modal open, waiting for user action.
    interactions:
      - "Confirm calls handleConfirmDelete: PATCH stop (if running) then DELETE."
      - "Cancel closes modal and resets deleteVm/patchVm mutation state."
    validation_rules: []

transitions:
  - from: mvm_list_view
    to: mvm_detail_page
    event: CLICK_VM_ROW
    mechanism: navigate('/vms/:id')

  - from: mvm_list_view
    to: cvm_wizard_template
    event: CLICK_CREATE_VM
    guard: can(role, "create_vm")
    mechanism: wizardRef.current.open()

  - from: mvm_detail_page
    to: mvm_list_view
    event: CLICK_BACK_BREADCRUMB
    mechanism: navigate('/vms')

  - from: mvm_list_view
    to: vcd_console_page
    event: CLICK_OPEN_CONSOLE
    mechanism: window.open('?demo=vm-console&…', '_blank')


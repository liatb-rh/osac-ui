# ui-flow: manage-storage-tiers
# Generated: 2026-06-18

flow: manage-storage-tiers
title: Manage Storage Tiers
summary: >-
  StorageTier list and CRUD.  ProviderAdmin: full create/edit/availability toggle.
  TenantUser/TenantAdmin: read-only same route.
statechart_ref: ../statecharts/manage-storage-tiers.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    tier_list_view:
      view: view_storage_tiers
      create: manage_storage_tiers
      edit: manage_storage_tiers
      toggle_availability: manage_storage_tiers
    tier_detail_page:
      view: view_storage_tiers

steps:
  - id: tier_list_view
    title: Storage Tiers list
    goal: List storage tiers with availability toggle and CRUD (providerAdmin).
    route: /resources/storage/storage-tiers
    ui:
      components:
        - PageLayout (title="Storage Tiers")
        - CustomTableLink (per tier name)
        - Button "Create storage tier" (providerAdmin only)
        - Switch (availability toggle per tier, providerAdmin only)
        - StorageTier cards with metrics (qosClass, vipPool, storageClassName, protocol)
        - Modal (create wizard: name, protocol, QoS class, VIP pool, StorageClass, backend)
        - Modal (edit tier)
    states:
      loading: { description: Spinner while tiers load. }
      empty: { description: EmptyState. }
      populated: { description: Tier cards/table rendered. }
      readonly: { description: TenantUser/tenantAdmin view — no create/edit/toggle buttons. }
    interactions:
      - "Availability Switch calls PATCH storage_tiers/:id (providerAdmin)."
      - "Create opens wizard modal."
      - "Tier name link navigates to /resources/storage/storage-tiers/:id."
    validation_rules:
      - Create/edit affordances rendered only when role === 'providerAdmin'.

  - id: tier_detail_page
    title: Storage Tier detail
    goal: View tier configuration details.
    route: /resources/storage/storage-tiers/:id

  - id: tier_create_wizard
    title: Create storage tier wizard
    goal: Multi-step wizard to register a new storage tier.
    ui:
      components:
        - Modal
        - Wizard with steps (name/protocol, QoS/VIP, StorageClass, backend assignment)

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/storage/StorageTiersPage.tsx
    - apps/app-frontend/src/pages/resources/storage/StorageTierDetailPage.tsx
    - apps/app-frontend/src/pages/resources/storage/storageTierUtils.ts
  deployment_variants: [standalone]

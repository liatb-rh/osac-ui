# ui-flow: manage-storage-backends
# Generated: 2026-06-18

flow: manage-storage-backends
title: Manage Storage Backends (Provider)
summary: >-
  Provider storage overview (org readiness), StorageBackend registration and detail.
statechart_ref: ../statecharts/manage-storage-backends.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    sb_overview_page: { view: manage_storage_backends }
    sb_list_view: { view: manage_storage_backends, register: manage_storage_backends }
    sb_detail_page: { view: manage_storage_backends }

steps:
  - id: sb_overview_page
    title: Storage overview
    goal: Show per-org storage provisioning status (phase1/phase2 readiness).
    route: /resources/storage
    ui:
      components:
        - PageLayout (title="Storage")
        - Table (Org, Tier, phase1Ready, phase2Ready, conditions)

  - id: sb_list_view
    title: Storage Backends list
    goal: List registered VAST storage backends; register new.
    route: /resources/storage/storage-backends
    ui:
      components:
        - PageLayout (title="Storage Backends")
        - Button "Register backend"
        - ObjectsTable (Name, Provider, Endpoint, Status.ready, Conditions)
        - Modal (register: provider, deployment model, endpoint, credentials secret ref, VIP pool)

  - id: sb_register_form
    title: Register storage backend form
    goal: Register a new VAST storage backend.
    ui:
      components:
        - Modal
        - Form: provider select (vast), deployment model (ova/voc-aws/moc), endpoint,
          credentials secret ref, VIP pool
    states:
      submitting: { description: POST storage_backends in flight. }

  - id: sb_detail_page
    title: Storage Backend detail
    goal: View backend configuration, ready status, and conditions.
    route: /resources/storage/storage-backends/:id

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/storage/StoragePage.tsx
    - apps/app-frontend/src/pages/resources/storage/StorageBackendsPage.tsx
    - apps/app-frontend/src/pages/resources/storage/StorageBackendDetailPage.tsx
  deployment_variants: [standalone]

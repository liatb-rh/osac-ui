# ui-flow: manage-global-templates
# Generated: 2026-06-18

flow: manage-global-templates
title: Manage Global Network Templates (Provider)
summary: Provider global network template CRUD.
statechart_ref: ../statecharts/manage-global-templates.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    glt_list_view: { view: manage_global_templates, create: manage_global_templates }
    glt_detail_page: { view: manage_global_templates, edit: manage_global_templates }

steps:
  - id: glt_list_view
    title: Global Templates list
    goal: List and manage provider global network templates.
    route: /resources/network/global-templates
    ui:
      components:
        - PageLayout
        - Button "Create template"
        - ObjectsTable (Name, Description, Created)
        - ActionsColumn (Edit, Delete)

  - id: glt_detail_page
    title: Global Template detail/edit
    goal: View and edit template configuration.
    route: /resources/network/global-templates/:id
    ui:
      components:
        - Form (name, description, spec fields)
        - Button "Save"

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/network/templates/GlobalTemplatesPage.tsx
    - apps/app-frontend/src/pages/resources/network/templates/GlobalTemplateDetailPage.tsx
  deployment_variants: [standalone]

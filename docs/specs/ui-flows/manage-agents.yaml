# ui-flow: manage-agents
# Generated: 2026-06-18

flow: manage-agents
title: Manage Infrastructure Agents
summary: >-
  ProviderAdmin infrastructure agent lifecycle — provision and deprovision agents
  that back cluster node sets.
statechart_ref: ../statecharts/manage-agents.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    agt_list_view:
      view: manage_agents
      provision: manage_agents
      deprovision: manage_agents
    agt_detail_page:
      view: manage_agents

steps:
  - id: agt_list_view
    title: Infrastructure Agents list
    goal: List agents; provision available; deprovision provisioned.
    route: /agents
    ui:
      components:
        - PageLayout (title="Infrastructure Agents")
        - ObjectsTable (ID, State, Hardware Profile, Cluster Ref, Actions)
        - Label (state colour)
        - ActionsColumn (Provision / Deprovision depending on state)
    states:
      loading: { description: Spinner. }
      empty: { description: EmptyState. }
      populated: { description: Agent table. }
    interactions:
      - "Provision: POST agents/:id/provision (requires AGENT_STATE_AVAILABLE)."
      - "Deprovision: POST agents/:id/deprovision (requires AGENT_STATE_PROVISIONED)."
      - "State transitions: PROVISIONING→PROVISIONED in ~5s; DEPROVISIONING→AVAILABLE in ~5s."
    validation_rules:
      - Provision disabled when agent.state !== AGENT_STATE_AVAILABLE.
      - Deprovision disabled when agent.state !== AGENT_STATE_PROVISIONED.

  - id: agt_detail_page
    title: Agent detail
    goal: View agent metadata and current state.
    route: /agents/:id
    ui:
      components:
        - Breadcrumb
        - DescriptionList (state, hardware profile, cluster ref, inventory backend)

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/InfrastructureAgentsPage.tsx
    - apps/app-frontend/src/pages/resources/AgentDetailPage.tsx
    - apps/app-frontend/src/hooks/useAgents.ts
  deployment_variants: [standalone]

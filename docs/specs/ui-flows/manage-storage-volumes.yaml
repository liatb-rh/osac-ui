# ui-flow: manage-storage-volumes
# Generated: 2026-06-18

flow: manage-storage-volumes
title: Manage Storage Volumes
summary: >-
  PVC-analogue volume lifecycle for tenantUser and tenantAdmin — list, create wizard,
  detail page with snapshot management.
statechart_ref: ../statecharts/manage-storage-volumes.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    vol_list_view:
      view: manage_storage_volumes
      create: manage_storage_volumes
      delete: manage_storage_volumes
    vol_detail_page:
      view: manage_storage_volumes
      create_snapshot: manage_storage_volumes
      delete_snapshot: manage_storage_volumes
      restore_snapshot: manage_storage_volumes

steps:
  - id: vol_list_view
    title: Storage Volumes list
    goal: List volumes; create new; delete unattached.
    route: /resources/storage/storage-volumes
    ui:
      components:
        - PageLayout (title="Volumes")
        - Button "Create volume" (primary)
        - ObjectsTable (Name, Size GiB, Tier, Access Mode, Phase, State, Cluster, Actions)
        - Label (phase: Bound/Pending/Released/Failed, state: available/in-use/creating/error)
        - ActionsColumn (Delete — disabled if in-use)
        - Wizard modal (create)
    states:
      loading: { description: Spinner while volumes load. }
      empty: { description: EmptyState. }
      populated: { description: Table rendered. }
    interactions:
      - "Delete blocked (409) when volume state === in-use."
      - "Volume name navigates to detail page."
    validation_rules:
      - Delete disabled when status.state === 'in-use'.

  - id: vol_create_wizard
    title: Create volume wizard
    goal: Select tier, size, access mode, and cluster; submit creation.
    ui:
      components:
        - Modal
        - Wizard steps: (Tier select, Size + access mode, Cluster assignment, Review)
        - FormSelect (storage tier, cluster)
        - NumberInput (sizeGiB)
        - RadioGroup (ReadWriteOnce / ReadWriteMany)
    states:
      creating:
        description: POST storage_volumes in flight; phase transitions Pending→Bound after 2s.
    validation_rules:
      - tierId required.
      - sizeGiB > 0 required.

  - id: vol_detail_page
    title: Volume detail
    goal: View volume spec; manage snapshots (create, delete, restore).
    route: /resources/storage/storage-volumes/:id
    ui:
      components:
        - PageHeader (title=volume.metadata.name)
        - DescriptionList (tier, size, access mode, phase, cluster, attachments)
        - Snapshots section (table with state/readyToUse/restoreSize, Actions: Delete, Restore)
        - Button "Create snapshot"
    states:
      loading: { description: Spinner. }
      populated: { description: Volume detail + snapshot list. }
    interactions:
      - "Create snapshot: POST /storage_volumes/:id/snapshots; state=creating→ready after 2s."
      - "Restore snapshot: POST /storage_volumes/:vid/snapshots/:sid/restore → new volume."
      - "Delete snapshot: DELETE /storage_volumes/:vid/snapshots/:sid."

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/storage/VolumesPage.tsx
    - apps/app-frontend/src/pages/resources/storage/VolumeDetailPage.tsx
  deployment_variants: [standalone]

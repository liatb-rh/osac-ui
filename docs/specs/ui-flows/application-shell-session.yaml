flow: Application shell session
statechart_ref: ../statecharts/application-shell-session.statechart.yaml
design_system_ref: ../design-system.yaml

rbac:
  required_permissions_by_step:
    shell_primary_workspace:
      view_shell: view_shell
      select_nav_item: navigate_shell_sections
      open_account_menu: navigate_shell_sections
      logout: logout
      toggle_theme: use_theme_toggle
    shell_notifications_entry:
      open_recent_activities: view_recent_activities
    shell_utility_stubs:
      open_help_or_settings_stub: navigate_shell_sections

steps:
  - id: shell_primary_workspace
    title: Primary workspace shell
    goal: Navigate primary areas via sidebar while viewing masthead identity, operating mode, and tenant trust strip.

    role_variants:
      tenant_user:
        sidebar_nav: Dashboard, My VMs, Templates, Clusters (VMaaS + CaaS workspace)
        masthead: Tenant masthead logo; user display name; operating mode label for tenant user persona
        fleet_scope: Virtual machines for the signed-in tenant only (northstar or evergreen)
      tenant_admin:
        sidebar_nav: >-
          Dashboard; expandable Management (Users, Quota control, Template catalog); Infrastructure
          (Networks, Storage); Organization (Organization settings, Security & Compliance)
        masthead: Tenant masthead logo; admin display name; operating mode label for tenant admin persona
        fleet_scope: Same tenant as user path; admin pages show tenant-scoped administration content
      provider_admin:
        sidebar_nav: >-
          Dashboard; expandable Management (Tenant organizations, Resource allocation, Global templates);
          System (Infrastructure, Security & Compliance, Platform settings)
        masthead: Vertexa masthead logo; provider admin display name; operating mode label for provider persona
        fleet_scope: >-
          Prototype aggregates Northstar Bank and Bluestone Financial Group (tenant id evergreen) VM
          fleets when selectedDemoTenant is vertexa (provider console view across tenant orgs)

    ui:
      components:
        - PageShell
        - Page
        - PageSection
        - Stack
        - Flex
        - Masthead
        - MastheadLogo
        - Dropdown
        - Label
        - Toolbar
        - SidebarNav
        - ThemeToggle
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      avoid_custom_css: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      custom_css_policy_ref: ../design-system.yaml#layout_and_shell.implementation_policy

    states:
      - ready
      - nav_item_active
      - expandable_nav_group_expanded
      - expandable_nav_group_collapsed
      - user_menu_open
      - user_menu_closed
      - theme_light
      - theme_dark

    interactions:
      - Select sidebar nav item to change main content and reset topology-driven filters when leaving My VMs.
      - Re-select My VMs while already on My VMs to return from VM detail to list view.
      - Re-select Templates or Global templates or Template catalog while active to reset catalog drawer or grid.
      - Expand or collapse sidebar groups for tenant admin or provider admin.
      - Open account menu; click log out to clear session state and return to welcome landing.
      - Toggle light or dark theme from sidebar footer control.
      - Use landing shortcut on theme control to discard in-session created VMs and return to welcome landing.

  - id: shell_notifications_entry
    title: Notifications affordance
    goal: Open full-page recent activities from masthead bell.

    ui:
      components:
        - Button
        - Toolbar

    states:
      - recent_activities_closed
      - recent_activities_open

    interactions:
      - Click bell icon to open recent activities overlay route within shell.

  - id: shell_utility_stubs
    title: Help and settings (stubbed)
    goal: Placeholder clicks that do not navigate.

    ui:
      components:
        - Button

    states:
      - stub_no_navigation

    interactions:
      - Click help or settings with handler preventing default.

transitions:
  - from: shell_primary_workspace
    action: select different primary nav item
    to: shell_primary_workspace
  - from: shell_primary_workspace
    action: click masthead bell
    to: shell_notifications_entry
  - from: shell_notifications_entry
    action: render recent activities full page content
    to: ra_activity_feed
  - from: shell_notifications_entry
    action: select any primary nav item from sidebar before activities render
    to: shell_primary_workspace
  - from: shell_primary_workspace
    action: click help or settings
    to: shell_utility_stubs
  - from: shell_primary_workspace
    action: account menu log out
    to: wrs_welcome_landing
  - from: shell_primary_workspace
    action: theme control landing shortcut
    to: wrs_welcome_landing
  - from: tud_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace
  - from: tad_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace
  - from: pad_dashboard_home
    action: user authenticated and shell rendered
    to: shell_primary_workspace

validation_rules: []

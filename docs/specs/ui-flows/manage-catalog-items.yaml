# ui-flow: manage-catalog-items
# Generated: 2026-06-18

flow: manage-catalog-items
title: Manage Catalog Items (Tenant Admin)
summary: >-
  Tenant admin catalog item studio — list with published toggle, create/edit via
  CatalogItemStudio form+preview.
statechart_ref: ../statecharts/manage-catalog-items.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    tci_list_view: { view: manage_catalog_items, create: manage_catalog_items, edit: manage_catalog_items, toggle_published: manage_catalog_items }
    tci_detail_studio: { edit: manage_catalog_items, create: manage_catalog_items }

steps:
  - id: tci_list_view
    title: Admin Catalog Items list
    goal: List catalog items with type badges and published toggles.
    route: /resources/network/catalog/admin-catalog-items
    ui:
      components:
        - PageSection
        - PageHeader (title="Catalog Items")
        - Button "New catalog item" (primary, PlusCircleIcon)
        - ObjectsTable (Title, Type badge, Published switch, Actions)
        - Switch (published toggle per row)
        - ActionsColumn (Edit PencilAltIcon, Delete)
        - Label (type: vm=blue, cluster=green, baremetal=orange)
    states:
      loading: { description: Spinner. }
      empty: { description: No catalog items. }
      populated: { description: Table with items. }
    interactions:
      - "Published Switch toggles catalogItemsStore.published flag (client-side in demo)."
      - "New → navigate('/resources/network/catalog/admin-catalog-items/new')."
      - "Edit → navigate('/resources/network/catalog/admin-catalog-items/:id')."

  - id: tci_detail_studio
    title: Catalog Item studio (create/edit)
    goal: Create or edit a catalog item using CatalogItemStudio (form + live preview).
    route: /resources/network/catalog/admin-catalog-items/:id (or /new)
    ui:
      components:
        - CatalogItemStudio (left: FieldDefinitionBuilder form; right: CatalogFormPreview)
        - Button "Save"
        - Breadcrumb back to list

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/network/catalog/AdminCatalogItemsPage.tsx
    - apps/app-frontend/src/pages/resources/network/catalog/AdminCatalogItemDetailPage.tsx
    - libs/ui-components/src/components/studio/CatalogItemStudio.tsx
    - libs/ui-components/src/components/studio/CatalogFormPreview.tsx
    - libs/ui-components/src/components/studio/FieldDefinitionBuilder.tsx
  deployment_variants: [standalone]

# ui-flow: manage-networks
# statechart_ref: ../statecharts/manage-networks.statechart.yaml
# Generated: 2026-06-18

flow: manage-networks
title: Manage Networks
summary: >-
  Tenant admin network management — tabbed page with Virtual Networks, Subnets,
  Security Groups CRUD, and PatternFly react-topology canvas.
statechart_ref: ../statecharts/manage-networks.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    net_topology_tab:
      view: manage_networks
    net_virtual_networks_tab:
      view: manage_networks
      create: manage_networks
      delete: manage_networks
    net_subnets_tab:
      view: manage_networks
      create: manage_networks
      delete: manage_networks
    net_security_groups_tab:
      view: manage_networks
      create: manage_networks
      edit_rules: manage_networks
      delete: manage_networks

steps:
  - id: net_topology_tab
    title: Network topology (tab 0)
    goal: Visualise VN→Subnet→VM relationships as a DAG.
    route: /networks (tab=0 default)
    ui:
      components:
        - PageSection
        - PageHeader (title="Networks")
        - Tabs (Topology[0], Virtual Networks[1], Subnets[2], Security Groups[3])
        - FormSelect (VN picker when >1 VN)
        - VisualizationProvider + TopologyView + TopologyControlBar (react-topology)
        - OsacTopoNode (VNet, Subnet, VM node types)
        - TopologyControlBar (zoom in/out, fit, reset)
    states:
      empty:
        description: >-
          No virtual networks.  EmptyState: "No virtual networks found. Create one to view the topology."
      populated:
        description: DAG canvas rendered; VN selector shown if >1 VN.
    interactions:
      - "VN selector updates active VN; canvas model rebuilds via buildTopologyModel."
      - "Topology control buttons: zoom in/out, fit to screen, reset view."
      - "VMs matched by subnet name (mock data: vm.spec.subnet === sn.metadata.name)."

  - id: net_virtual_networks_tab
    title: Virtual Networks (tab 1)
    goal: List, create, and delete virtual networks.
    ui:
      components:
        - Button "New virtual network" (primary)
        - Card containing Table (Name, State, CIDR, Subnets count, SGs count, Actions)
        - VnStateLabel
        - ActionsColumn (Delete)
        - Pagination (when >10 VNs)
        - Modal (create: Name, Network Class select, CIDR expandable section)
        - Modal (delete confirm: warning about subnet/SG cascade)
    states:
      loading: { description: Spinner while VN list loads. }
      empty: { description: EmptyState with "Click New virtual network to get started." }
      populated: { description: Paginated table rendered. }
      create_open: { description: Create modal open. }
      delete_confirm: { description: Delete confirm modal open. }
    interactions:
      - "VN name click navigates to /networks/virtual-networks/:id."
      - "Delete: confirm modal warns about cascade deletion of all subnets and SGs."
    validation_rules:
      - VN name required to enable Create button.

  - id: net_vn_create_modal
    title: New virtual network modal
    goal: Create a new VN with name, optional network class, and optional CIDR.
    ui:
      components:
        - Modal small
        - Form: Name (required), Network Class (FormSelect), CIDR expandable (IPv4, IPv6)
    states:
      idle: { description: Empty form. }
      creating: { description: createVN mutation pending. }
      error: { description: Alert danger with error message. }
    validation_rules:
      - Name required.

  - id: net_subnets_tab
    title: Subnets (tab 2)
    goal: List, create, and delete subnets with VN filter.
    ui:
      components:
        - FormSelect (filter by VN)
        - Button "Create subnet"
        - Card containing Table (Name, Virtual Network, IPv4 CIDR, IPv6 CIDR, State, Actions)
        - SubnetStateLabel
        - Pagination
        - Modal (create), Modal (delete confirm)
    validation_rules:
      - Subnet name required; virtual network required.

  - id: net_subnet_create_modal
    title: Create subnet modal
    goal: Create subnet under a selected VN.
    ui:
      components:
        - Modal small
        - Form: Name, Virtual Network (required), IPv4 CIDR, IPv6 CIDR

  - id: net_security_groups_tab
    title: Security Groups (tab 3)
    goal: List, create, delete, and edit rules for security groups.
    ui:
      components:
        - Button "Create security group"
        - Card containing Table (Name, VN, Ingress rules, Egress rules, State, Actions)
        - SgStateLabel
        - ActionsColumn (Edit rules, Delete)
        - Pagination
        - Modal (create), Modal (delete confirm), RulesEditorModal (edit rules)
    interactions:
      - "Edit rules opens RulesEditorModal with per-direction rules tables."

  - id: net_sg_rules_editor_modal
    title: Security group rules editor
    goal: Edit ingress and egress firewall rules inline.
    ui:
      components:
        - Modal large
        - ExpandableSection (Ingress rules)
        - ExpandableSection (Egress rules)
        - RuleTable (Protocol, Port from, Port to, IPv4 CIDR, Remove button)
        - Button "+ Add rule"
        - Button "Save" (isLoading while saving)
    validation_rules:
      - Protocol required (PROTOCOL_TCP default).

  - id: net_vn_detail_page
    title: Virtual Network detail page
    goal: View VN metadata, spec, and related resources.
    route: /networks/virtual-networks/:id

  - id: net_subnet_detail_page
    title: Subnet detail page
    goal: View subnet metadata and spec.
    route: /networks/subnets/:id

transitions:
  - from: net_virtual_networks_tab
    to: net_vn_detail_page
    event: CLICK_VN_NAME
    mechanism: navigate('/networks/virtual-networks/:id')

  - from: net_subnets_tab
    to: net_subnet_detail_page
    event: CLICK_SUBNET_NAME
    mechanism: navigate('/networks/subnets/:id')

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/administration/NetworksPage.tsx
    - apps/app-frontend/src/pages/administration/VirtualNetworkDetailPage.tsx
    - apps/app-frontend/src/pages/administration/SubnetDetailPage.tsx
    - apps/app-frontend/src/hooks/useNetworking.ts
  deployment_variants: [standalone]

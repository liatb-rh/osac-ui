# ui-flow: tenant-catalog
# Generated: 2026-06-18

flow: tenant-catalog
title: Tenant Catalog
summary: >-
  Tenant user catalog browse — published catalog items as filterable cards.
  Clicking a VM card seeds the CreateVmWizard; Cluster cards open LaunchInstanceWizard.
statechart_ref: ../statecharts/tenant-catalog.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    cat_catalog_browse:
      view: view_catalog
      launch_vm: create_vm_from_catalog
      launch_cluster: create_cluster
      launch_baremetal: request_baremetal

steps:
  - id: cat_catalog_browse
    title: Catalog browse
    goal: Browse and filter catalog items; launch creation wizard.
    route: /catalog-items
    ui:
      components:
        - PageLayout (title="Catalog")
        - SearchInput
        - Filter chip bar (type: all / vm / cluster / baremetal, workload profile chips)
        - Gallery of FullCatalogItemCard (icon, title, description, type badge, profile)
        - LaunchInstanceWizard modal (cluster/baremetal create)
    states:
      empty: { description: No items match search/filter. }
      populated: { description: Gallery of catalog item cards. }
      wizard_open: { description: LaunchInstanceWizard rendered over gallery. }
    interactions:
      - "VM card click: navigate('/vms?catalogItem=<id>'). VmsPage auto-opens CreateVmWizard."
      - "Cluster card click: opens LaunchInstanceWizard modal."
      - "BM card click: opens LaunchInstanceWizard modal."
      - "Search filters by title/description (client-side)."
      - "Type chip filters catalogItemsStore.type field."
    validation_rules: []

transitions:
  - from: cat_catalog_browse
    to: cvm_wizard_template
    event: CLICK_VM_CATALOG_ITEM
    mechanism: navigate('/vms?catalogItem=<id>')

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/services/catalog/CatalogItemsPage.tsx
    - apps/app-frontend/src/pages/services/catalog/catalogItemsStore.ts
    - apps/app-frontend/src/components/instances/LaunchInstanceWizard.tsx
  deployment_variants: [standalone]

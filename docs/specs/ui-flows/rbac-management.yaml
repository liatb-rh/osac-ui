# ui-flow: rbac-management
# Role: providerAdmin
# Route: /provider/rbac
# Generated: 2026-06-20

flow: rbac-management
title: RBAC Management
summary: >-
  Provider admin RBAC console — manage predefined Roles, edit their permissions,
  inspect members via Keycloak group bindings, and maintain Group → Role mappings
  enforced by Authorino AuthPolicies at the Kuadrant gateway.

rbac:
  required_role: providerAdmin
  required_permissions:
    - manage_rbac

domain_ref: docs/data/domains/organizations.yaml

steps:
  - id: rbac_roles
    title: Roles list
    goal: >-
      Browse all system and org-scoped roles. Per-row actions: view members,
      edit permissions.
    route: /provider/rbac (Roles tab)
    ui:
      components:
        - PageLayout (title="RBAC Management")
        - Tabs: Roles | Group → Role mappings | Enforcement
        - ScopedRoleTable — System scope (2 rows): ObjectsTable columns [Role label, ID, Description, Members, Actions]
        - ScopedRoleTable — Organization scope (3 rows): same columns
        - ActionsColumn: "View members" → members_modal | "Edit permissions" → permissions_modal
    states:
      populated: Both role sections rendered.
    data_mapping:
      - RbacRole.label → Role label (purple=system, blue=org)
      - RbacRole.id → ID <code>
      - RbacRole.description → Description
      - RbacRole.members → Members count (derived from GROUPS)
      - RbacRole.readOnly → read-only Label badge on row

  - id: members_modal
    title: View members modal
    goal: >-
      Show all users bound to a role via Keycloak group memberships.
      Membership is IdP-sourced — read-only.
    route: /provider/rbac (modal overlay)
    ui:
      components:
        - Modal (ModalVariant.medium, title="Members: <role>")
        - SearchInput (client-side filter on name / email)
        - Badge: filtered member count
        - ObjectsTable: Name, Email, Keycloak group, Realm
        - Alert (info): "Membership is managed by the external IdP"
        - Close button
    states:
      open: SearchInput clears; table populated from MEMBER_POOL for role's groups.
      filtered: rows narrowed by search term.
    data_mapping:
      - RbacMember.name → Name
      - RbacMember.email → Email
      - RbacMember.group → Keycloak group <code>
      - RbacMember.realm → Realm <code>

  - id: permissions_modal
    title: Edit permissions modal
    goal: >-
      View and toggle the permission set for a role. Toggling stages changes
      locally; Publish re-generates Authorino AuthPolicies.
    route: /provider/rbac (modal overlay)
    ui:
      components:
        - Modal (ModalVariant.large, title="Edit permissions: <role>")
        - SearchInput (filter by permission name)
        - Badge: "X granted · Y pending changes"
        - 7 ExpandableSection panels (one per category)
        - 2-column Checkbox grid per category
        - Alert (warning): "Publishing will re-generate Authorino AuthPolicies for this role"
        - Footer: Cancel | Publish (primary, disabled when no pending changes)
    states:
      open: Checkboxes initialized from role's current permission set.
      dirty: Publish enabled; pending-changes badge > 0.
      publishing: Button loading state.
      done: Modal closes.

  - id: group_mappings
    title: Group → Role mappings list
    goal: List all Keycloak group → OSAC role bindings; edit or remove each.
    route: /provider/rbac (Group → Role mappings tab)
    ui:
      components:
        - ObjectsTable: Keycloak group, Realm, Mapped role (Label), Members, Actions
        - ActionsColumn: "Edit mapping" → edit_mapping_modal | "Remove"
    data_mapping:
      - GroupMapping.kcGroup → Keycloak group <code>
      - GroupMapping.realm → Realm <code>
      - GroupMapping.mappedRole → Mapped role Label
      - GroupMapping.members → Members count

  - id: edit_mapping_modal
    title: Edit mapping modal
    goal: Change which OSAC role a Keycloak group maps to.
    route: /provider/rbac (modal overlay)
    ui:
      components:
        - Modal (ModalVariant.small, title="Edit mapping: <group>")
        - Read-only group/realm display
        - Select: all 5 role IDs
        - Alert (info): "Affects all members in this Keycloak group"
        - Footer: Cancel | Save mapping (disabled when unchanged)

  - id: enforcement
    title: Enforcement info
    goal: Explain the deny-by-default Authorino/Kuadrant gateway pattern.
    route: /provider/rbac (Enforcement tab)
    ui:
      components:
        - Alert (info): deny-by-default description
        - <pre> block: sample AuthPolicy YAML
        - Button "View all AuthPolicies" (stub)

cross_flow_entry_points:
  - id: rbac_to_tenant_detail
    from_step: group_mappings
    to_step: org_detail (manage-organizations flow)
    mechanism: "Realm code → navigate('/provider/tenants/:tenant')"

error_states:
  - Permissions publish failed: Alert (danger) inside PermissionsModal.
  - Mapping save failed: Alert (danger) inside EditMappingModal.

edge_cases:
  - readOnly roles (cloud-provider-reader, tenant-reader): "Edit permissions" action disabled.
  - Empty member pool for a role: EmptyState in MembersModal table.

implementation_status:
  as_of: "2026-06-20"
  code_refs:
    - apps/app-frontend/src/pages/administration/RbacManagementPage.tsx
    - apps/app-frontend/src/mocks/rbac-store.ts
  deployment_variants: [standalone]

# ui-flow: manage-baremetal
# Generated: 2026-06-18

flow: manage-baremetal
title: Manage Bare Metal
summary: >-
  Tenant bare metal instance list and request wizard.  Available to tenantUser and tenantAdmin.
statechart_ref: ../statecharts/manage-baremetal.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    bm_list_view:
      view: view_baremetal
      request: request_baremetal
    bm_detail_page:
      view: view_baremetal

steps:
  - id: bm_list_view
    title: Bare Metal instances list
    goal: List bare metal instances; request new ones via wizard.
    route: /baremetal
    ui:
      components:
        - PageLayout (title="Bare Metal")
        - SearchInput
        - ToggleGroup (All / Running / In Progress)
        - Button "Request Bare Metal" (primary)
        - ObjectsTable (Name, Status, Catalog Item, Zone, Actions)
        - BmStateLabel (running/inprogress/stopped/failed)
        - RequestBareMetalWizard (modal)
        - ActionsColumn (Delete)
    states:
      loading: { description: Spinner while instances load. }
      empty: { description: EmptyState. }
      populated: { description: Table of instances. }
      wizard_open: { description: RequestBareMetalWizard modal open. }
    interactions:
      - "?catalogItem= on navigate auto-opens wizard with preset catalog item."
      - "Instance name navigates to /baremetal/:name."
    validation_rules: []

  - id: bm_request_wizard
    title: Request Bare Metal wizard
    goal: Configure and submit a bare metal instance request.
    ui:
      components:
        - RequestBareMetalWizard (PF Wizard inside Modal)
        - Steps: catalog item select, config (sshKey, zone, image, network), review

  - id: bm_detail_page
    title: Bare Metal detail
    goal: View instance spec and lifecycle metadata.
    route: /baremetal/:name

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/services/baremetal/BaremetalPage.tsx
    - apps/app-frontend/src/pages/services/baremetal/BaremetalDetailPage.tsx
    - libs/ui-components/src/components/baremetal/RequestBareMetalWizard.tsx
  deployment_variants: [standalone]

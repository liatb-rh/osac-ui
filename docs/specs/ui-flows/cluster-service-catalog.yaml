flow: Cluster service catalog
statechart_ref: ../statecharts/cluster-service-catalog.statechart.yaml
design_system_ref: ../design-system.yaml

rbac:
  required_permissions_by_step:
    csc_clusters_list:
      view_clusters: view_clusters
      open_create_cluster_modal: open_create_cluster
      delete_cluster: delete_cluster
      upgrade_cluster: upgrade_cluster
    csc_cluster_detail_drawer:
      view_cluster_detail: view_clusters
      scale_cluster_nodes: scale_cluster_nodes
      delete_cluster: delete_cluster
      upgrade_cluster: upgrade_cluster
      download_kubeconfig: download_kubeconfig
    csc_create_cluster_modal:
      select_catalog_item: view_cluster_catalog_items
      submit_create_cluster: open_create_cluster
    csc_upgrade_cluster_modal:
      submit_upgrade_cluster: upgrade_cluster

applies_when: >-
  Authenticated shell with demoShellRole tenantUser after Northstar Bank or Bluestone Financial Group
  (tenant id evergreen) sign-in. Route /clusters. Not available to provider admin or tenant admin from this page
  (they may view clusters through provider-administration or tenant-administration flows in future phases).

backend:
  description: Cluster data sources by BFF mode (see backend-fulfillment.yaml context.osac_bff_runtime_modes).
  clusters_list:
    normative_ref: >-
      backend-fulfillment.yaml apis.clusters_list_get
    rules:
      - >-
        Cluster rows derive from GET /api/fulfillment/v1/clusters; each item carries a
        ClusterState enum string (CLUSTER_STATE_PROGRESSING / CLUSTER_STATE_READY / CLUSTER_STATE_FAILED /
        CLUSTER_STATE_UPGRADING / CLUSTER_STATE_UPGRADE_FAILED).
      - >-
        Normalize snake_case wire fields to camelCase UI model: state, apiUrl, consoleUrl, createdAt,
        nodeSets, version, upgradeState, storageReady, network, storage.
      - >-
        Mock mode: BFF serves a clusterStore fixture with demo clusters for northstar and evergreen tenants;
        wire format uses CLUSTER_STATE_* string enums and snake_case keys identical to fulfillment wire.
  cluster_catalog_items:
    normative_ref: >-
      backend-fulfillment.yaml apis.cluster_catalog_items_list
    rules:
      - >-
        Catalog items come from GET /api/fulfillment/v1/cluster_catalog_items (only published items).
      - >-
        field_definitions drive which fields are shown and editable in the create-cluster modal;
        editable:false fields are pre-filled from the catalog item and cannot be changed by the user.
      - >-
        allowed_versions is the set of OCP version strings permitted for upgrade on clusters using this item.
      - >-
        Mock mode: BFF serves two demo catalog items (ocp-standard, ocp-gpu) with field_definitions
        exposing worker node count as an editable integer field and allowed_versions listing 4.17 and 4.18.
  create_cluster:
    mock:
      description: >-
        BFF mock receives cluster create payload, appends to clusterStore, and returns the new Cluster
        object with CLUSTER_STATE_PROGRESSING state. SPA polls GET /api/fulfillment/v1/clusters every 15s
        until state transitions to CLUSTER_STATE_READY or CLUSTER_STATE_FAILED.
      endpoint: POST /api/fulfillment/v1/clusters (mock BFF appends to clusterStore)
    dev:
      description: >-
        POST /api/fulfillment/v1/clusters with spec.catalog_item set; note that the upstream proto marks
        this endpoint as system-only — document as a platform-token flow or BFF-mediated order in production.
        Track in backend-fulfillment.yaml contract_note_cluster_create.
  cluster_polling:
    description: >-
      After cluster creation the SPA shows a "Provisioning" badge and polls GET clusters every 15 seconds
      while at least one cluster remains in CLUSTER_STATE_PROGRESSING or CLUSTER_STATE_UPGRADING state,
      OR while at least one READY cluster has storageReady !== true (storage provisioning in progress).
      Polling stops when all visible clusters are READY/FAILED/UPGRADE_FAILED and all READY clusters
      have storageReady === true. Reconnect with exponential backoff on network errors.
      Constant: PENDING_CLUSTER_LIST_POLL_MS = 15_000 (applies to both compute and storage polling windows).
  cluster_upgrade:
    description: >-
      POST /api/fulfillment/v1/clusters/{id}/upgrade with { target_version }. Returns updated Cluster
      object in CLUSTER_STATE_UPGRADING. SPA polls list to track upgrade progress.
      Mock mode: BFF transitions cluster to UPGRADING immediately then READY after 90s.
  cluster_kubeconfig:
    description: >-
      GET /api/fulfillment/v1/clusters/{id}/kubeconfig returns the kubeconfig YAML string.
      Only available when cluster state is CLUSTER_STATE_READY.
      Mock mode: BFF returns a generated placeholder kubeconfig YAML.
  virtual_networks:
    description: >-
      GET /api/fulfillment/v1/virtual_networks returns list of VirtualNetwork resources available to the tenant.
      Used to populate the VirtualNetwork selector in Create Cluster modal.
  subnets:
    description: >-
      GET /api/fulfillment/v1/subnets returns list of Subnet resources. Optionally filtered by
      virtual_network_id query param to show only subnets within the selected VirtualNetwork.
  security_groups:
    description: >-
      GET /api/fulfillment/v1/security_groups returns list of SecurityGroup resources for multi-select
      in Create Cluster modal.

steps:
  - id: csc_clusters_list
    title: Clusters list
    goal: >-
      Render the tenant organization's clusters in a PatternFly Table with status badges, header
      actions (Create cluster), and row actions menu (Delete). Empty state when no clusters exist.

    ui:
      components:
        - PageSection
        - PageHeader
        - Title
        - Button
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - Label
        - Spinner
        - EmptyState
        - EmptyStateIcon
        - EmptyStateBody
        - EmptyStateActions
        - ActionsColumn
        - Alert
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      design_system_ref: ../design-system.yaml

    states:
      - loading
      - empty_no_clusters
      - populated
      - error_load_failed
      - provisioning_in_progress

    interactions:
      - Page header reads "Clusters" with subtitle "OpenShift clusters provisioned for your organization."
      - >-
        Primary action button "Create cluster" opens the create-cluster modal; always visible even when the
        list is empty.
      - >-
        Table columns: Name, Status, Storage, OCP Version, Worker Nodes, API URL, Created.
        Status column shows a PatternFly Label color-coded by state:
          CLUSTER_STATE_PROGRESSING → blue Label + Spinner ("Provisioning")
          CLUSTER_STATE_READY → green Label ("Ready")
          CLUSTER_STATE_FAILED → red Label ("Failed")
          CLUSTER_STATE_UPGRADING → blue Label + Spinner ("Upgrading")
          CLUSTER_STATE_UPGRADE_FAILED → red Label ("Upgrade Failed")
          CLUSTER_STATE_UNSPECIFIED → grey Label ("Unknown")
        Storage column shows "Ready" (green) / "Provisioning" (blue) / "—" based on status.storageReady.
        "Provisioning" covers both storageReady null (storage setup not yet triggered) and
        storageReady false (VAST CSI driver and StorageClasses are being installed).
        OCP Version column shows status.version (e.g. "4.17.3") or "—" if not yet set.
      - >-
        Clicking a row or the Name cell opens the cluster detail drawer (csc_cluster_detail_drawer) for that
        cluster. Keyboard-focusable with Enter/Space.
      - >-
        Each row has an ActionsColumn kebab menu. Items: "View details" (opens drawer), "Upgrade" (opens
        csc_upgrade_cluster_modal; disabled when state is not CLUSTER_STATE_READY or cluster is already on
        latest allowed version), "Delete" (confirm modal then DELETE; disabled when state is
        CLUSTER_STATE_PROGRESSING or CLUSTER_STATE_UPGRADING).
      - >-
        Empty state shows a cubes icon, "No clusters yet" heading, "Create your first OpenShift cluster to
        get started." body text, and a "Create cluster" primary button.
      - >-
        Error state shows a PatternFly Alert (variant danger) inline below the header: "Failed to load
        clusters — please try again." with a Retry button.
      - >-
        Polling indicator: when any cluster is in PROGRESSING or UPGRADING state, an info Alert reads
        "One or more clusters are provisioning or upgrading. This page refreshes automatically."

    design_system_alignment:
      layout_guidance:
        - Use PatternFly Page layout with a single PageSection containing the header and table.
        - Table uses composable PatternFly Table primitives (Table, Thead, Tbody, Tr, Th, Td).
        - ActionsColumn provides per-row kebab action menu aligned with PatternFly Table patterns.
      accessibility_policy:
        - Row click regions have aria-label="Open details for cluster {name}".
        - Action menu buttons have descriptive aria-labels.
        - Status Label components include a visually-hidden text suffix for screen readers.
      mock_data_alignment:
        - >-
          Demo clusters for northstar tenant: one READY cluster (northstar-prod-1) and one PROGRESSING
          cluster (northstar-dev-1). Demo cluster for evergreen tenant: one READY cluster (evergreen-prod-1).
          Wire format uses CLUSTER_STATE_* strings and snake_case fields aligned with fulfillment proto.

  - id: csc_cluster_detail_drawer
    title: Cluster detail drawer
    goal: >-
      Show cluster details in an inline drawer (same-page slide-in) with two tabs: Overview and Node Sets.
      Optionally a Conditions tab. Support Delete action from the drawer header.

    ui:
      components:
        - Drawer
        - DrawerPanelContent
        - DrawerHead
        - DrawerActions
        - DrawerCloseButton
        - Title
        - Tabs
        - Tab
        - TabContent
        - DescriptionList
        - DescriptionListGroup
        - DescriptionListTerm
        - DescriptionListDescription
        - Label
        - Button
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - ClipboardCopy
        - Spinner
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - drawer_open
      - tab_overview_active
      - tab_node_sets_active
      - tab_networking_active
      - tab_storage_active
      - tab_conditions_active
      - scaling_node_set
      - kubeconfig_downloading

    interactions:
      - Drawer panel opens from the right on row click from csc_clusters_list.
      - Close button (×) in DrawerHead dismisses drawer and returns focus to the list table.
      - >-
        **Overview tab** — DescriptionList fields:
          Name: metadata.name
          Status: ClusterState label (same color scheme as list)
          OCP Version: status.version (show "—" if not yet set)
          API URL: ClipboardCopy of status.api_url (disabled / "Not available yet" when empty)
          Console URL: ClipboardCopy of status.console_url (disabled when empty)
          Created: metadata.creation_timestamp formatted as relative + absolute datetime
          Catalog Item: spec.catalog_item
          Release Image: spec.release_image (show "—" if not set)
          Pod CIDR: spec.network.pod_cidr (show server default "10.128.0.0/14" hint when not set)
          Service CIDR: spec.network.service_cidr (show server default "172.30.0.0/16" hint when not set)
      - >-
        **Node Sets tab** — Table with columns: Node Set ID, Host Type, Desired Size, Current Size.
        Desired Size comes from spec.node_sets[key].size; Current Size from status.node_sets[key].size.
        Each row shows a Spinner next to Current Size when Desired ≠ Current (scaling in progress).
        Scale action (pencil icon button) opens an inline number input to update size; PATCH /api/fulfillment/v1/clusters/{id}
        with updated spec.node_sets key. Min size 1; disable scale-down below 1.
      - >-
        **Networking tab** — DescriptionList fields:
          Virtual Network: spec.network.virtualNetworkRef (show name resolved from virtualNetworks list, or "—")
          Subnet: spec.network.subnetRef (show name resolved from subnets list, or "—")
          Security Groups: spec.network.securityGroupRefs as comma-separated labels, or "None"
          API Public IP: status.network.apiPublicIp (ClipboardCopy when available, "—" otherwise)
          Ingress Public IP: status.network.ingressPublicIp (ClipboardCopy when available, "—" otherwise)
          DNS Records: status.network.dnsRecords as a list of hostname entries, or "None configured"
      - >-
        **Storage tab** — Three sections:
          Storage Readiness: status.storageReady displayed as a Label ("Ready" green / "Provisioning" blue / "—").
          CSI Driver: status.storage.csiDriver (show "—" if not provisioned).
          StorageClasses: Table with columns Name, Tier, Default, Parameters. The Tier column shows the
          StorageTier id (e.g. "fast", "standard", "archive") this class was created for. Empty state
          "No storage classes available" when list is empty or storage not yet provisioned.
          VolumeSnapshotClasses: Table with columns Name, Driver, Deletion Policy, Default. Empty state
          "No snapshot classes available." when volume_snapshot_classes is empty or absent.
      - >-
        **Conditions tab** — Table with columns: Type, Status, Reason, Message, Last Transition.
        "No conditions reported." empty state when conditions array is empty or missing.
        Condition types are CLUSTER_CONDITION_TYPE_* enums; humanize by stripping prefix for display.
        Status values CONDITION_STATUS_TRUE / CONDITION_STATUS_FALSE / CONDITION_STATUS_UNKNOWN mapped to
        "True", "False", "Unknown" display text.
      - >-
        DrawerHead action buttons (right-aligned): "Upgrade" (opens csc_upgrade_cluster_modal; only enabled when
        state is CLUSTER_STATE_READY and an allowed_version newer than current version is available),
        "Download kubeconfig" (GET /api/fulfillment/v1/clusters/{id}/kubeconfig, triggers browser download
        of kubeconfig.yaml; only enabled when state is CLUSTER_STATE_READY; shows Spinner while downloading),
        "Delete" (confirm modal; disabled when state is CLUSTER_STATE_PROGRESSING or CLUSTER_STATE_UPGRADING).

    design_system_alignment:
      ui:
        components:
          - Drawer
          - DrawerPanelContent
          - DrawerHead
          - DrawerActions
          - DrawerCloseButton
          - Title
          - Tabs
          - Tab
          - TabContent
          - DescriptionList
          - DescriptionListGroup
          - DescriptionListTerm
          - DescriptionListDescription
          - Label
          - Button
          - Table
          - Thead
          - Tbody
          - Tr
          - Th
          - Td
          - ClipboardCopy
          - Spinner
      accessibility_policy:
        - Drawer has aria-label="Cluster details — {name}".
        - ClipboardCopy components have descriptive aria-labels.
        - Tab panel has role="tabpanel" with matching aria-labelledby.
        - Upgrade button has aria-disabled with tooltip when not available.

  - id: csc_create_cluster_modal
    title: Create cluster modal
    goal: >-
      Modal dialog for creating a new OpenShift cluster. First step selects a cluster catalog item;
      second step fills in user-configurable fields derived from the item's field_definitions plus
      standard fields (cluster name, ssh_public_key, network CIDRs). Submit issues create and returns
      to the list with a new Provisioning row.

    ui:
      components:
        - Modal
        - ModalHeader
        - ModalBody
        - ModalFooter
        - Form
        - FormGroup
        - FormSection
        - FormSelect
        - FormSelectOption
        - TextInput
        - NumberInput
        - ChipGroup
        - Chip
        - Select
        - SelectOption
        - HelperText
        - HelperTextItem
        - Alert
        - Button
        - Spinner
        - Gallery
        - Card
        - CardHeader
        - CardTitle
        - CardBody
        - ExpandableSection
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - catalog_loading
      - catalog_loaded
      - catalog_error
      - catalog_item_selected
      - networking_virtualnetwork_selected
      - form_invalid
      - submitting
      - submit_error
      - submit_success

    interactions:
      - >-
        Modal opens at "Select a cluster type" step showing a card Gallery of available ClusterCatalogItems
        (published: true). Each card shows title, description excerpt, and a "Select" radio-style highlight.
        Loading skeleton shown while fetching GET /api/fulfillment/v1/cluster_catalog_items.
        Error Alert if catalog fails to load; Cancel closes modal.
      - >-
        After selecting a catalog item, the form advances to "Configure cluster" step with:
          Cluster name (required TextInput; alphanumeric and hyphens; max 253 chars)
          Editable fields from catalog item field_definitions (editable: true); each rendered
          according to their type inferred from validation_schema — integer fields as NumberInput,
          string fields as TextInput. display_name used as FormGroup label. Default values pre-filled.
          SSH public key (optional TextInput; multi-line; helper text "Used to access worker nodes")
          Release image (optional TextInput; helper text "Leave blank to use template default")
          Networking FormSection (always visible, not expandable):
            Virtual Network (required FormSelect; options from GET /api/fulfillment/v1/virtual_networks)
            Subnet (required FormSelect; initially disabled until a VN is selected; repopulates when VN
            changes via GET /api/fulfillment/v1/subnets?virtual_network_id={id})
            Security Groups (optional multi-select with ChipGroup display; options from
            GET /api/fulfillment/v1/security_groups; helper text "Optional — leave empty to use defaults")
          Advanced networking (ExpandableSection, collapsed by default):
            Pod CIDR (optional TextInput; placeholder "10.128.0.0/14 (default)")
            Service CIDR (optional TextInput; placeholder "172.30.0.0/16 (default)")
      - >-
        "Back" button returns to catalog item selection. "Create cluster" primary button submits.
        Inline field validation on blur. Submit button shows Spinner and disabled state during submitting.
        Virtual Network and Subnet are required — form cannot submit without selections.
      - >-
        On success: modal closes, list refetches, new cluster row appears with CLUSTER_STATE_PROGRESSING badge.
        A brief success Alert in the page header reads "Cluster '{name}' is being provisioned."
      - >-
        On API error: submit_error Alert shown inside modal: "Failed to create cluster — {message}. Please try again."
        Modal stays open; user can correct and retry or cancel.
      - >-
        Cancel closes modal without persisting draft. No BFF session storage needed (single modal, not wizard).

    design_system_alignment:
      accessibility_policy:
        - Modal has aria-labelledby pointing to the modal header.
        - Each FormGroup has id-linked label and input.
        - Spinner in submit button has aria-label="Creating cluster".
        - Security Groups multi-select ChipGroup has aria-label="Selected security groups".
      mock_data_alignment:
        - >-
          BFF mock catalog_items endpoint returns:
            { id: "ocp-standard", title: "OpenShift Standard", description: "A standard OpenShift 4.17 cluster with 3 worker nodes. Ideal for development and staging workloads.", template: "openshift-4-17", published: true, allowed_versions: ["4.17.3", "4.18.0"], field_definitions: [{ path: "spec.node_sets.workers.size", display_name: "Worker node count", editable: true, default: { "@type": "type.googleapis.com/google.protobuf.Int32Value", "value": 3 }, validation_schema: '{"type":"integer","minimum":1,"maximum":10}' }] }
            { id: "ocp-gpu", title: "OpenShift GPU-Accelerated", description: "OpenShift cluster with GPU worker nodes for AI/ML workloads.", template: "openshift-4-17-gpu", published: true, allowed_versions: ["4.17.3", "4.18.0"], field_definitions: [{ path: "spec.node_sets.gpu-workers.size", display_name: "GPU worker node count", editable: true, default: { "@type": "type.googleapis.com/google.protobuf.Int32Value", "value": 2 }, validation_schema: '{"type":"integer","minimum":1,"maximum":4}' }] }
        - >-
          BFF mock cluster create: POST /api/fulfillment/v1/clusters appends new Cluster to clusterStore
          with state CLUSTER_STATE_PROGRESSING. After 60s (simulated), mock auto-transitions to CLUSTER_STATE_READY.

- id: csc_upgrade_cluster_modal
  title: Upgrade cluster modal
  goal: >-
    Modal dialog for upgrading an existing OpenShift cluster to a new version. Shows current version,
    target version select, warning callout, and submit. Polls cluster status after submission.

  ui:
    components:
      - Modal
      - ModalHeader
      - ModalBody
      - ModalFooter
      - Form
      - FormGroup
      - FormSelect
      - FormSelectOption
      - DescriptionList
      - DescriptionListGroup
      - DescriptionListTerm
      - DescriptionListDescription
      - Alert
      - Button
      - Spinner
  ui_policy:
    prefer_patternfly_primitives: true
    minimize_raw_div_wrappers: true
    max_raw_div_wrappers: 1

  states:
    - open
    - submitting
    - submit_error

  interactions:
    - >-
      Modal opens from "Upgrade" button in list row kebab or drawer header. Shows:
        Current version: status.version (read-only DescriptionList item)
        Target version: FormSelect populated from catalog_item.allowed_versions, filtered to versions
        strictly greater than current version. Placeholder "Select target version".
        Warning callout (variant=warning): "Upgrading the cluster may cause brief API downtime. Ensure
        your workloads can tolerate a restart."
    - >-
      "Upgrade" primary button submits POST /api/fulfillment/v1/clusters/{id}/upgrade with body
      { target_version }. While submitting, button shows Spinner and is disabled.
    - >-
      On success: modal closes; cluster list polls (UPGRADING badge); brief info Alert on page
      "Cluster '{name}' upgrade to {version} started."
    - >-
      On error: submit_error Alert inside modal: "Failed to start upgrade — {message}. Please try again."

  design_system_alignment:
    accessibility_policy:
      - Modal has aria-labelledby pointing to the modal header.
      - FormSelect for target version has id-linked label.
      - Warning Alert has role="alert".

transitions:
  - from: shell_primary_workspace
    action: tenant user selects Clusters nav item
    to: csc_clusters_list
  - from: csc_clusters_list
    action: click cluster row or Name cell
    to: csc_cluster_detail_drawer
  - from: csc_clusters_list
    action: click Create cluster button
    to: csc_create_cluster_modal
  - from: csc_clusters_list
    action: click Upgrade in row kebab menu
    to: csc_upgrade_cluster_modal
  - from: csc_cluster_detail_drawer
    action: close drawer
    to: csc_clusters_list
  - from: csc_cluster_detail_drawer
    action: confirm delete cluster
    to: csc_clusters_list
  - from: csc_cluster_detail_drawer
    action: click Upgrade in drawer header
    to: csc_upgrade_cluster_modal
  - from: csc_create_cluster_modal
    action: cancel modal
    to: csc_clusters_list
  - from: csc_create_cluster_modal
    action: submit create cluster success
    to: csc_clusters_list
  - from: csc_upgrade_cluster_modal
    action: cancel modal
    to: csc_clusters_list
  - from: csc_upgrade_cluster_modal
    action: submit upgrade success
    to: csc_clusters_list

validation_rules:
  - Cluster name must match [a-z0-9]([-a-z0-9]*[a-z0-9])? (RFC-1123 label) and be unique within the tenant.
  - Node count must satisfy validation_schema from the selected catalog item field_definition.
  - Pod CIDR and service CIDR must be valid CIDR notation when provided.
  - Catalog item must have published: true to appear in the modal gallery.
  - Delete action must be disabled while cluster state is CLUSTER_STATE_PROGRESSING or CLUSTER_STATE_UPGRADING.
  - Upgrade action must be disabled when state is not CLUSTER_STATE_READY or no newer allowed_version exists.
  - Virtual Network selection is required when creating a cluster.
  - Subnet selection is required and depends on Virtual Network selection.
  - Target version for upgrade must be strictly greater than current version.

ai-hints:
  route: /clusters
  role_gate: tenantUser only
  mock_wire_format: >-
    All BFF mock payloads for clusters and cluster_catalog_items MUST use snake_case field names and
    CLUSTER_STATE_* / CLUSTER_CONDITION_TYPE_* enum strings identical to fulfillment wire format.
    Normalization layer (normalizeCluster / normalizeClusterList) maps to camelCase UI model before
    React components consume the data.
  normalization_model: >-
    UI-facing Cluster shape: { id, metadata: { name, createdAt, creators, tenants, version },
    spec: { catalogItem, template, templateParameters, nodeSets: { [key]: { hostType, size } },
    releaseImage?, sshPublicKey?, network?: { podCidr?, serviceCidr?, virtualNetworkRef?, subnetRef?,
    securityGroupRefs?: string[] } },
    status: { state (ClusterState), conditions[], apiUrl, consoleUrl, version?,
    upgradeState?, storageReady?,
    storage?: { csiDriver?, storageClasses: Array<{ name, tier, isDefault, parameters }>,
    volumeSnapshotClasses: Array<{ name, driver, deletionPolicy, isDefault }> },
    network?: { apiPublicIp?, ingressPublicIp?, dnsRecords?: string[] },
    nodeSets: { [key]: { hostType, size } } } }
  cluster_states:
    CLUSTER_STATE_PROGRESSING: Provisioning (blue, spinner)
    CLUSTER_STATE_READY: Ready (green)
    CLUSTER_STATE_FAILED: Failed (red)
    CLUSTER_STATE_UPGRADING: Upgrading (blue, spinner)
    CLUSTER_STATE_UPGRADE_FAILED: Upgrade Failed (red)
    CLUSTER_STATE_UNSPECIFIED: Unknown (grey)
  create_constraint: >-
    POST /api/fulfillment/v1/clusters is marked system-only in the fulfillment proto. In mock mode the BFF
    handles create locally. In dev mode document as requiring a platform token or BFF-mediated order; track
    in backend-fulfillment.yaml contract_note_cluster_create. Do not block UI implementation on this.
  polling_strategy: >-
    useClustersList query: refetchOnMount always; poll every PENDING_CLUSTER_LIST_POLL_MS = 15_000 while
    any cluster has PROGRESSING or UPGRADING state, OR while any READY cluster has storageReady !== true.
    Stop polling when all clusters are READY/FAILED/UPGRADE_FAILED and all READY clusters have
    storageReady === true. Exponential backoff on consecutive network errors (max 60s interval).
  delete_constraint: >-
    Clusters in CLUSTER_STATE_PROGRESSING or CLUSTER_STATE_UPGRADING cannot be deleted; disable the delete
    action and show a tooltip explaining the constraint.
  upgrade_constraint: >-
    Upgrade is only available when cluster state is CLUSTER_STATE_READY and catalog item allowed_versions
    contains at least one version strictly greater than status.version. Disable button otherwise.
  kubeconfig_constraint: >-
    kubeconfig download is only available when cluster state is CLUSTER_STATE_READY.
  networking_dependency: >-
    Subnet selector in create modal must be reset and repopulated whenever the VirtualNetwork selection changes.
    Build subnets query key as ["subnets", virtualNetworkId] and only enable when virtualNetworkId is set.

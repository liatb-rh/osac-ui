flow: Cluster service catalog
statechart_ref: ../statecharts/cluster-service-catalog.statechart.yaml
design_system_ref: ../design-system.yaml

rbac:
  required_permissions_by_step:
    csc_clusters_list:
      view_clusters: view_clusters
      open_create_cluster_modal: open_create_cluster
      delete_cluster: delete_cluster
    csc_cluster_detail_drawer:
      view_cluster_detail: view_clusters
      scale_cluster_nodes: scale_cluster_nodes
      delete_cluster: delete_cluster
    csc_create_cluster_modal:
      select_catalog_item: view_cluster_catalog_items
      submit_create_cluster: open_create_cluster

applies_when: >-
  Authenticated shell with demoShellRole tenantUser after Northstar Bank or Bluestone Financial Group
  (tenant id evergreen) sign-in. Route /clusters. Not available to provider admin or tenant admin from this page
  (they may view clusters through provider-administration or tenant-administration flows in future phases).

backend:
  description: Cluster data sources by BFF mode (see backend-fulfillment.yaml context.osac_bff_runtime_modes).
  clusters_list:
    normative_ref: >-
      backend-fulfillment.yaml apis.clusters_list_get
    rules:
      - >-
        Cluster rows derive from GET /api/fulfillment/v1/clusters; each item carries a
        ClusterState enum string (CLUSTER_STATE_PROGRESSING / CLUSTER_STATE_READY / CLUSTER_STATE_FAILED).
      - Normalize snake_case wire fields to camelCase UI model: state, apiUrl, consoleUrl, createdAt, nodeSets.
      - >-
        Mock mode: BFF serves a clusterStore fixture with demo clusters for northstar and evergreen tenants;
        wire format uses CLUSTER_STATE_* string enums and snake_case keys identical to fulfillment wire.
  cluster_catalog_items:
    normative_ref: >-
      backend-fulfillment.yaml apis.cluster_catalog_items_list
    rules:
      - >-
        Catalog items come from GET /api/fulfillment/v1/cluster_catalog_items (only published items).
      - >-
        field_definitions drive which fields are shown and editable in the create-cluster modal;
        editable:false fields are pre-filled from the catalog item and cannot be changed by the user.
      - >-
        Mock mode: BFF serves two demo catalog items (ocp-standard, ocp-gpu) with field_definitions
        exposing worker node count as an editable integer field.
  create_cluster:
    mock:
      description: >-
        BFF mock receives cluster create payload, appends to clusterStore, and returns the new Cluster
        object with CLUSTER_STATE_PROGRESSING state. SPA polls GET /api/fulfillment/v1/clusters every 15s
        until state transitions to CLUSTER_STATE_READY or CLUSTER_STATE_FAILED.
      endpoint: POST /api/fulfillment/v1/clusters (mock BFF appends to clusterStore)
    dev:
      description: >-
        POST /api/fulfillment/v1/clusters with spec.catalog_item set; note that the upstream proto marks
        this endpoint as system-only — document as a platform-token flow or BFF-mediated order in production.
        Track in backend-fulfillment.yaml contract_note_cluster_create.
  cluster_polling:
    description: >-
      After cluster creation the SPA shows a "Provisioning" badge and polls GET clusters every 15 seconds
      while at least one cluster remains in CLUSTER_STATE_PROGRESSING state. Polling stops when all
      visible clusters are READY or FAILED. Reconnect with exponential backoff on network errors.

steps:
  - id: csc_clusters_list
    title: Clusters list
    goal: >-
      Render the tenant organization's clusters in a PatternFly Table with status badges, header
      actions (Create cluster), and row actions menu (Delete). Empty state when no clusters exist.

    ui:
      components:
        - PageSection
        - PageHeader
        - Title
        - Button
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - Label
        - Spinner
        - EmptyState
        - EmptyStateIcon
        - EmptyStateBody
        - EmptyStateActions
        - ActionsColumn
        - Alert
    ui_policy:
      prefer_patternfly_primitives: true
      avoid_raw_div_for_structure: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2
      design_system_ref: ../design-system.yaml

    states:
      - loading
      - empty_no_clusters
      - populated
      - error_load_failed
      - provisioning_in_progress

    interactions:
      - Page header reads "Clusters" with subtitle "OpenShift clusters provisioned for your organization."
      - >-
        Primary action button "Create cluster" opens the create-cluster modal; always visible even when the
        list is empty.
      - >-
        Table columns: Name, Status, API URL, Worker Nodes, Created. Status column shows a PatternFly Label
        component color-coded by state:
          CLUSTER_STATE_PROGRESSING → blue Label + Spinner inline ("Provisioning")
          CLUSTER_STATE_READY → green Label ("Ready")
          CLUSTER_STATE_FAILED → red Label ("Failed")
          CLUSTER_STATE_UNSPECIFIED → grey Label ("Unknown")
      - >-
        Clicking a row or the Name cell opens the cluster detail drawer (csc_cluster_detail_drawer) for that
        cluster. Keyboard-focusable with Enter/Space.
      - >-
        Each row has an ActionsColumn kebab menu. Items: "View details" (opens drawer), "Delete" (confirm
        modal then DELETE). Delete is disabled while cluster state is CLUSTER_STATE_PROGRESSING.
      - >-
        Empty state shows a cubes icon, "No clusters yet" heading, "Create your first OpenShift cluster to
        get started." body text, and a "Create cluster" primary button.
      - >-
        Error state shows a PatternFly Alert (variant danger) inline below the header: "Failed to load
        clusters — please try again." with a Retry button.
      - Polling indicator: when any cluster is in PROGRESSING state, a secondary Alert (variant info) reads
        "One or more clusters are provisioning. This page refreshes automatically."

    design_system_alignment:
      layout_guidance:
        - Use PatternFly Page layout with a single PageSection containing the header and table.
        - Table uses composable PatternFly Table primitives (Table, Thead, Tbody, Tr, Th, Td).
        - ActionsColumn provides per-row kebab action menu aligned with PatternFly Table patterns.
      accessibility_policy:
        - Row click regions have aria-label="Open details for cluster {name}".
        - Action menu buttons have descriptive aria-labels.
        - Status Label components include a visually-hidden text suffix for screen readers.
      mock_data_alignment:
        - >-
          Demo clusters for northstar tenant: one READY cluster (northstar-prod-1) and one PROGRESSING
          cluster (northstar-dev-1). Demo cluster for evergreen tenant: one READY cluster (evergreen-prod-1).
          Wire format uses CLUSTER_STATE_* strings and snake_case fields aligned with fulfillment proto.

  - id: csc_cluster_detail_drawer
    title: Cluster detail drawer
    goal: >-
      Show cluster details in an inline drawer (same-page slide-in) with two tabs: Overview and Node Sets.
      Optionally a Conditions tab. Support Delete action from the drawer header.

    ui:
      components:
        - Drawer
        - DrawerPanelContent
        - DrawerHead
        - DrawerActions
        - DrawerCloseButton
        - Title
        - Tabs
        - Tab
        - TabContent
        - DescriptionList
        - DescriptionListGroup
        - DescriptionListTerm
        - DescriptionListDescription
        - Label
        - Button
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - ClipboardCopy
        - Spinner
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - drawer_open
      - tab_overview_active
      - tab_node_sets_active
      - tab_conditions_active
      - scaling_node_set

    interactions:
      - Drawer panel opens from the right on row click from csc_clusters_list.
      - Close button (×) in DrawerHead dismisses drawer and returns focus to the list table.
      - >-
        **Overview tab** — DescriptionList fields:
          Name: metadata.name
          Status: ClusterState label (same color scheme as list)
          API URL: ClipboardCopy of status.api_url (disabled / "Not available yet" when empty)
          Console URL: ClipboardCopy of status.console_url (disabled when empty)
          Created: metadata.creation_timestamp formatted as relative + absolute datetime
          Catalog Item: spec.catalog_item
          Release Image: spec.release_image (show "—" if not set)
          Pod CIDR: spec.network.pod_cidr (show server default "10.128.0.0/14" hint when not set)
          Service CIDR: spec.network.service_cidr (show server default "172.30.0.0/16" hint when not set)
      - >-
        **Node Sets tab** — Table with columns: Node Set ID, Host Type, Desired Size, Current Size.
        Desired Size comes from spec.node_sets[key].size; Current Size from status.node_sets[key].size.
        Each row shows a Spinner next to Current Size when Desired ≠ Current (scaling in progress).
        Scale action (pencil icon button) opens an inline number input to update size; PATCH /api/fulfillment/v1/clusters/{id}
        with updated spec.node_sets key. Min size 1; disable scale-down below 1.
      - >-
        **Conditions tab** — Table with columns: Type, Status, Reason, Message, Last Transition.
        "No conditions reported." empty state when conditions array is empty or missing.
        Condition types are CLUSTER_CONDITION_TYPE_* enums; humanize by stripping prefix for display.
        Status values CONDITION_STATUS_TRUE / CONDITION_STATUS_FALSE / CONDITION_STATUS_UNKNOWN mapped to
        "True", "False", "Unknown" display text.
      - >-
        Delete button in DrawerActions: opens a confirm modal naming the cluster. On confirm issues
        DELETE /api/fulfillment/v1/clusters/{id}; on success closes drawer, refetches list, shows brief
        success Alert. Disabled while state is CLUSTER_STATE_PROGRESSING with tooltip "Cannot delete while cluster is provisioning."

    design_system_alignment:
      accessibility_policy:
        - Drawer has aria-label="Cluster details — {name}".
        - ClipboardCopy components have descriptive aria-labels.
        - Tab panel has role="tabpanel" with matching aria-labelledby.

  - id: csc_create_cluster_modal
    title: Create cluster modal
    goal: >-
      Modal dialog for creating a new OpenShift cluster. First step selects a cluster catalog item;
      second step fills in user-configurable fields derived from the item's field_definitions plus
      standard fields (cluster name, ssh_public_key, network CIDRs). Submit issues create and returns
      to the list with a new Provisioning row.

    ui:
      components:
        - Modal
        - ModalHeader
        - ModalBody
        - ModalFooter
        - Form
        - FormGroup
        - FormSelect
        - FormSelectOption
        - TextInput
        - NumberInput
        - HelperText
        - HelperTextItem
        - Alert
        - Button
        - Spinner
        - Gallery
        - Card
        - CardHeader
        - CardTitle
        - CardBody
        - ExpandableSection
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - catalog_loading
      - catalog_loaded
      - catalog_error
      - catalog_item_selected
      - form_invalid
      - submitting
      - submit_error
      - submit_success

    interactions:
      - >-
        Modal opens at "Select a cluster type" step showing a card Gallery of available ClusterCatalogItems
        (published: true). Each card shows title, description excerpt, and a "Select" radio-style highlight.
        Loading skeleton shown while fetching GET /api/fulfillment/v1/cluster_catalog_items.
        Error Alert if catalog fails to load; Cancel closes modal.
      - >-
        After selecting a catalog item, the form advances to "Configure cluster" step with:
          Cluster name (required TextInput; alphanumeric and hyphens; max 253 chars)
          Editable fields from catalog item field_definitions (editable: true); each rendered
          according to their type inferred from validation_schema — integer fields as NumberInput,
          string fields as TextInput. display_name used as FormGroup label. Default values pre-filled.
          SSH public key (optional TextInput; multi-line; helper text "Used to access worker nodes")
          Release image (optional TextInput; helper text "Leave blank to use template default")
          Advanced networking (ExpandableSection, collapsed by default):
            Pod CIDR (optional TextInput; placeholder "10.128.0.0/14 (default)")
            Service CIDR (optional TextInput; placeholder "172.30.0.0/16 (default)")
      - >-
        "Back" button returns to catalog item selection. "Create cluster" primary button submits.
        Inline field validation on blur. Submit button shows Spinner and disabled state during submitting.
      - >-
        On success: modal closes, list refetches, new cluster row appears with CLUSTER_STATE_PROGRESSING badge.
        A brief success Alert in the page header reads "Cluster '{name}' is being provisioned."
      - >-
        On API error: submit_error Alert shown inside modal: "Failed to create cluster — {message}. Please try again."
        Modal stays open; user can correct and retry or cancel.
      - >-
        Cancel closes modal without persisting draft. No BFF session storage needed (single modal, not wizard).

    design_system_alignment:
      accessibility_policy:
        - Modal has aria-labelledby pointing to the modal header.
        - Each FormGroup has id-linked label and input.
        - Spinner in submit button has aria-label="Creating cluster".
      mock_data_alignment:
        - >-
          BFF mock catalog_items endpoint returns:
            { id: "ocp-standard", title: "OpenShift Standard", description: "A standard OpenShift 4.17 cluster with 3 worker nodes. Ideal for development and staging workloads.", template: "openshift-4-17", published: true, field_definitions: [{ path: "spec.node_sets.workers.size", display_name: "Worker node count", editable: true, default: { "@type": "type.googleapis.com/google.protobuf.Int32Value", "value": 3 }, validation_schema: '{"type":"integer","minimum":1,"maximum":10}' }] }
            { id: "ocp-gpu", title: "OpenShift GPU-Accelerated", description: "OpenShift cluster with GPU worker nodes for AI/ML workloads.", template: "openshift-4-17-gpu", published: true, field_definitions: [{ path: "spec.node_sets.gpu-workers.size", display_name: "GPU worker node count", editable: true, default: { "@type": "type.googleapis.com/google.protobuf.Int32Value", "value": 2 }, validation_schema: '{"type":"integer","minimum":1,"maximum":4}' }] }
        - >-
          BFF mock cluster create: POST /api/fulfillment/v1/clusters appends new Cluster to clusterStore
          with state CLUSTER_STATE_PROGRESSING. After 60s (simulated), mock auto-transitions to CLUSTER_STATE_READY.

transitions:
  - from: shell_primary_workspace
    action: tenant user selects Clusters nav item
    to: csc_clusters_list
  - from: csc_clusters_list
    action: click cluster row or Name cell
    to: csc_cluster_detail_drawer
  - from: csc_clusters_list
    action: click Create cluster button
    to: csc_create_cluster_modal
  - from: csc_cluster_detail_drawer
    action: close drawer
    to: csc_clusters_list
  - from: csc_cluster_detail_drawer
    action: confirm delete cluster
    to: csc_clusters_list
  - from: csc_create_cluster_modal
    action: cancel modal
    to: csc_clusters_list
  - from: csc_create_cluster_modal
    action: submit create cluster success
    to: csc_clusters_list

validation_rules:
  - Cluster name must match [a-z0-9]([-a-z0-9]*[a-z0-9])? (RFC-1123 label) and be unique within the tenant.
  - Node count must satisfy validation_schema from the selected catalog item field_definition.
  - Pod CIDR and service CIDR must be valid CIDR notation when provided.
  - Catalog item must have published: true to appear in the modal gallery.
  - Delete action must be disabled while cluster state is CLUSTER_STATE_PROGRESSING.

ai-hints:
  route: /clusters
  role_gate: tenantUser only
  mock_wire_format: >-
    All BFF mock payloads for clusters and cluster_catalog_items MUST use snake_case field names and
    CLUSTER_STATE_* / CLUSTER_CONDITION_TYPE_* enum strings identical to fulfillment wire format.
    Normalization layer (normalizeCluster / normalizeClusterList) maps to camelCase UI model before
    React components consume the data.
  normalization_model: >-
    UI-facing Cluster shape: { id, metadata: { name, createdAt, creators, tenants, version },
    spec: { catalogItem, template, templateParameters, nodeSets: { [key]: { hostType, size } },
    releaseImage?, sshPublicKey?, network?: { podCidr?, serviceCidr? } },
    status: { state (ClusterState), conditions[], apiUrl, consoleUrl,
    nodeSets: { [key]: { hostType, size } } } }
  cluster_states:
    CLUSTER_STATE_PROGRESSING: Provisioning (blue, spinner)
    CLUSTER_STATE_READY: Ready (green)
    CLUSTER_STATE_FAILED: Failed (red)
    CLUSTER_STATE_UNSPECIFIED: Unknown (grey)
  create_constraint: >-
    POST /api/fulfillment/v1/clusters is marked system-only in the fulfillment proto. In mock mode the BFF
    handles create locally. In dev mode document as requiring a platform token or BFF-mediated order; track
    in backend-fulfillment.yaml contract_note_cluster_create. Do not block UI implementation on this.
  polling_strategy: >-
    useClustersList query: refetchOnMount always; while any cluster in clusterStore has PROGRESSING state,
    poll every PENDING_CLUSTER_LIST_POLL_MS = 15_000. Stop polling when all clusters are READY or FAILED.
    Exponential backoff on consecutive network errors (max 60s interval).
  delete_constraint: >-
    Clusters in CLUSTER_STATE_PROGRESSING cannot be deleted; disable the delete action and show a tooltip.
  phase_scope: >-
    Phase 1 (this spec): list, create, detail drawer, delete, node-set scaling via PATCH.
    Phase 2 (future): kubeconfig download (GET /api/fulfillment/v1/clusters/{id}/kubeconfig),
    console URL deep link, storage class management (VAST CSI driver status).

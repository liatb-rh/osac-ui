# ui-flow: vm-console-demo
# Generated: 2026-06-18

flow: vm-console-demo
title: VM Console Demo
summary: Standalone console demo opened in new tab via ?demo=vm-console query params.
statechart_ref: ../statecharts/vm-console-demo.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    vcd_console_page: { open: open_vm_console }

steps:
  - id: vcd_console_page
    title: VM console page
    goal: Simulate a terminal console session for a running VM.
    route: "?demo=vm-console&vm=<id>&name=<name>&os=<os>  (new tab)"
    ui:
      components:
        - Full-page terminal simulation
        - VM identity header (name, OS)
        - Terminal emulator component
    states:
      connecting: { description: Console session POST in flight. }
      active: { description: Terminal session open. }
      unavailable: { description: ConsoleAccess.available=false; reason displayed. }
    interactions:
      - "Opened via window.open(url, '_blank', 'noopener,noreferrer')."
      - "POST /api/console/v1/sessions with vmId, vmName, os."
    validation_rules: []

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-backend/src/routes/console.ts
  deployment_variants: [standalone]

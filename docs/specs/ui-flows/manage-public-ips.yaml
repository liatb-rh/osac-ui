# ui-flow: manage-public-ips
# Generated: 2026-06-18

flow: manage-public-ips
title: Manage Public IPs
summary: >-
  Tenant admin public IP lifecycle — allocate from pool, attach to VM, detach, delete.
statechart_ref: ../statecharts/manage-public-ips.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    pip_list_view:
      view: manage_public_ips
      allocate: manage_public_ips
      attach: manage_public_ips
      detach: manage_public_ips
      delete: manage_public_ips
    pip_detail_page:
      view: manage_public_ips

steps:
  - id: pip_list_view
    title: Public IPs list
    goal: >-
      List all PublicIPs for tenant with state.  Allocate from pool, attach/detach
      to compute instance, delete.
    route: /resources/network/catalog/public-ips
    ui:
      components:
        - PageSection
        - PageHeader (title="Public IPs")
        - Button "Allocate public IP"
        - ObjectsTable (Name, Address, State, Pool, VM Attachment, Actions)
        - PublicIpStateLabel (Attached/Allocated/Pending)
        - PoolStateLabel
        - ActionsColumn (Attach to VM / Detach / Delete)
        - Modal (allocate: pool select)
        - Modal (attach: VM select from compute instances)
    states:
      loading: { description: Spinner. }
      empty: { description: No IPs allocated yet. }
      populated: { description: Table with IP rows. }
      allocate_modal_open: { description: Allocate modal with pool picker open. }
      attach_modal_open: { description: Attach modal with VM picker open. }
    interactions:
      - "Allocate: POST public_ips with selected pool → state=ALLOCATED."
      - "Attach: PATCH public_ips/:id with compute_instance=<vmId> → state=ATTACHED."
      - "Detach: PATCH public_ips/:id with compute_instance=null → state=ALLOCATED."
      - "Delete: DELETE public_ips/:id."
      - "IP name navigates to detail page."
    validation_rules:
      - Attach requires target VM selected.

  - id: pip_allocate_modal
    title: Allocate public IP modal
    goal: Select pool and allocate a new public IP address.
    ui:
      components:
        - Modal small
        - FormSelect (pool list from GET public_ip_pools)
        - Button "Allocate"

  - id: pip_detail_page
    title: Public IP detail
    goal: View IP details (address, pool, state, attachments).
    route: /resources/network/catalog/public-ips/:id

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/resources/network/public-ip/PublicIpPoolsPage.tsx
    - apps/app-frontend/src/pages/resources/network/public-ip/PublicIpPoolDetailsPage.tsx
    - apps/app-frontend/src/hooks/useNetworking.ts
  deployment_variants: [standalone]

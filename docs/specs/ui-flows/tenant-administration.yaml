flow: Tenant administration
statechart_ref: ../statecharts/tenant-administration.statechart.yaml

rbac:
  required_permissions_by_step:
    tad_dashboard_home:
      view_admin_dashboard: view_tenant_admin_dashboard
      open_users_tile: manage_users
      open_quota_tile: view_quota
      open_templates_tile: view_catalog
      open_networks_tile: view_topology
    tad_users:
      view_users_table: manage_users
      add_user_action: manage_users
    tad_quota:
      view_quota_dashboard: view_quota
    tad_networks_management:
      view_virtual_networks: view_topology
      create_virtual_network: manage_networks
      delete_virtual_network: manage_networks
      view_subnets: view_topology
      create_subnet: manage_networks
      delete_subnet: manage_networks
      view_security_groups: view_topology
      create_security_group: manage_networks
      delete_security_group: manage_networks
      view_topology: view_topology
      open_vm_detail_handoff: open_vm_from_topology
    tad_public_ips:
      view_public_ips: manage_networks
      allocate_public_ip: manage_networks
      attach_public_ip: manage_networks
      detach_public_ip: manage_networks
      delete_public_ip: manage_networks
    tad_storage_placeholder:
      view_storage_placeholder: view_tenant_admin_dashboard
    tad_org_settings_placeholder:
      view_org_settings_placeholder: view_tenant_admin_dashboard
    tad_org_security_placeholder:
      view_org_security_placeholder: view_tenant_admin_dashboard
    tad_cluster_offerings:
      view_cluster_offerings: manage_cluster_offerings
      toggle_cluster_offering: manage_cluster_offerings
      edit_cluster_defaults: manage_cluster_offerings

applies_when: >-
  Authenticated shell with demoShellRole tenantAdmin for a customer tenant (northstar or evergreen /
  Bluestone Financial Group) — not provider admin and not tenant user VMaaS nav.

steps:
  - id: tad_dashboard_home
    title: Tenant admin dashboard
    goal: Operational summary for tenant admin persona with navigation tiles into management areas.

    ui:
      components:
        - PageSection
        - Stack
        - Flex
        - Title
        - Card
        - Gallery
        - Button
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - ready
      - loading
      - empty_insufficient_data
      - error_load_failed
      - success_populated

    interactions:
      - Click dashboard tiles to navigate to users networks storage or template catalog per handler mapping.

  - id: tad_users
    title: User management
    goal: Review tenant users table and invoke add user stub.

    ui:
      components:
        - PageSection
        - Stack
        - Flex
        - Title
        - Button
        - Table
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - ready
      - loading
      - empty_no_users
      - error_load_failed
      - success_populated
      - add_user_clicked_no_op

    interactions:
      - Click Add user primary button no handler in prototype.

  - id: tad_quota
    title: Quota control
    goal: Visualize quota consumption against fleet VMs demo charts.

    ui:
      components:
        - PageSection
        - Stack
        - Gallery
        - Title
        - DonutChart
        - Table
        - Card
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 2

    states:
      - ready
      - loading
      - error_load_failed
      - success_populated

    interactions:
      - View charts and tables read-only in prototype.

  - id: tad_networks_management
    title: Networks
    goal: >-
      Manage VirtualNetworks, Subnets, and SecurityGroups for the tenant organization; also
      includes a Topology tab for visualizing VM placement.

    ui:
      components:
        - PageSection
        - PageHeader
        - Tabs
        - Tab
        - TabTitleText
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - ActionsColumn
        - Button
        - Modal
        - ModalHeader
        - ModalBody
        - ModalFooter
        - Form
        - FormGroup
        - FormSelect
        - FormSelectOption
        - TextInput
        - HelperText
        - HelperTextItem
        - Label
        - Spinner
        - EmptyState
        - EmptyStateBody
        - Alert
        - NetworkTopologyPage
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - loading
      - error_load_failed
      - empty_no_resources
      - populated
      - creating_resource
      - deleting_resource
      - vm_node_selected

    interactions:
      - >-
        Page header: "Networks" with subtitle "Manage virtual networks, subnets, and security groups
        for your organization."
      - >-
        Four tabs: "Virtual Networks", "Subnets", "Security Groups", "Topology".
        Default active tab: Virtual Networks.
      - >-
        Virtual Networks tab: table columns Name, CIDR (IPv4), CIDR (IPv6), Network Class, State.
        State rendered as Label (green=READY, blue=PENDING, red=FAILED).
        "Create virtual network" primary button opens create modal.
        Row kebab action: Delete (with confirmation).
      - >-
        Create Virtual Network modal: Name (TextInput, required), IPv4 CIDR (TextInput, optional),
        IPv6 CIDR (TextInput, optional), Network Class (FormSelect from useNetworkClasses list).
        Submit calls POST /api/fulfillment/v1/virtual_networks.
        Validation: name required; at least one CIDR required.
      - >-
        Subnets tab: FormSelect to filter by Virtual Network (all VNs listed).
        Table columns: Name, Parent VN, IPv4 CIDR, IPv6 CIDR, State.
        "Create subnet" button (disabled until VN selected) opens create modal.
        Row kebab action: Delete.
      - >-
        Create Subnet modal: Name (TextInput), Parent VN (pre-filled from filter or FormSelect),
        IPv4 CIDR, IPv6 CIDR. Submit calls POST /api/fulfillment/v1/subnets.
      - >-
        Security Groups tab: table columns Name, Parent VN, Ingress Rules, Egress Rules, State.
        Rule counts shown as numeric badge. "Create security group" button opens create modal.
        Row kebab action: Delete.
      - >-
        Create Security Group modal: Name, Parent VN (FormSelect). Submit calls
        POST /api/fulfillment/v1/security_groups. Rule editor is out of scope (v1).
      - >-
        Topology tab: existing NetworkTopologyPage grouped by subnet name; clicking a VM node
        triggers the cross-flow handoff to mvm_topology_handoff.
      - >-
        Empty state per tab: descriptive message with "Create" CTA.
        Error state: inline danger Alert with Retry.

    design_system_alignment:
      accessibility_policy:
        - Delete confirmation modal has aria-labelledby pointing to modal header.
        - Tab panel regions have aria-labelledby matching Tab id.
        - State Labels have aria-label describing resource name and state.

  - id: tad_public_ips
    title: Public IPs
    goal: >-
      Manage floating public IP addresses — allocate from a pool, attach to or detach from a
      ComputeInstance, and release (delete).

    ui:
      components:
        - PageSection
        - PageHeader
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - ActionsColumn
        - Button
        - Modal
        - ModalHeader
        - ModalBody
        - ModalFooter
        - Form
        - FormGroup
        - FormSelect
        - FormSelectOption
        - HelperText
        - HelperTextItem
        - Label
        - Spinner
        - EmptyState
        - EmptyStateBody
        - Alert
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - loading
      - error_load_failed
      - empty_no_public_ips
      - populated
      - allocating
      - attaching
      - detaching
      - deleting

    interactions:
      - >-
        Page header: "Public IPs" with subtitle "Allocate and manage public IP addresses for your
        workloads."
      - >-
        Table columns: Name, Address, Pool, State, Attached To.
        State rendered as Label: grey=PENDING/RELEASING, blue=ALLOCATED, green=ATTACHED,
        orange=ATTACHING, red=FAILED.
        Attached To shows ComputeInstance name or "—".
      - >-
        "Allocate IP" primary button opens allocate modal: Name (TextInput), Pool (FormSelect
        from GET /api/fulfillment/v1/public_ip_pools). Submit calls
        POST /api/fulfillment/v1/public_ips.
      - >-
        Row kebab actions:
          Attach (visible when state=ALLOCATED) — opens attach modal: select ComputeInstance
          (FormSelect from useComputeInstances). Calls PATCH /api/fulfillment/v1/public_ips/{id}
          with { spec: { compute_instance: id } }.
          Detach (visible when state=ATTACHED) — calls PATCH /api/fulfillment/v1/public_ips/{id}
          with { spec: { compute_instance: null } }.
          Delete — calls DELETE /api/fulfillment/v1/public_ips/{id} (disabled when ATTACHING/RELEASING).
      - >-
        Row polling: refetch interval 5s when any IP is in PENDING/ATTACHING/RELEASING state.
      - >-
        Empty state: "No public IPs allocated. Click Allocate IP to get started."
        Error state: inline danger Alert with Retry.

  - id: tad_storage_placeholder
    title: Storage (placeholder)
    goal: Communicate future scope for disk pools snapshots backups.

    ui:
      components:
        - PageSection
        - Title
        - Content
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - placeholder_static

    interactions:
      - Read only.

  - id: tad_org_settings_placeholder
    title: Organization settings (placeholder)
    goal: Communicate branding IdP defaults scope.

    ui:
      components:
        - PageSection
        - Title
        - Content
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - placeholder_static

    interactions:
      - Read only.

  - id: tad_org_security_placeholder
    title: Security and compliance (placeholder)
    goal: Communicate audit policy compliance reporting scope.

    ui:
      components:
        - PageSection
        - Title
        - Content
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 0

    states:
      - placeholder_static

    interactions:
      - Read only.

  - id: tad_cluster_offerings
    title: Cluster offerings
    goal: >-
      Manage which ClusterCatalogItems are enabled for this tenant organization, and configure
      org-level default overrides (worker count, SSH key).

    ui:
      components:
        - PageSection
        - PageHeader
        - Title
        - Table
        - Thead
        - Tbody
        - Tr
        - Th
        - Td
        - Switch
        - Button
        - Modal
        - ModalHeader
        - ModalBody
        - ModalFooter
        - Form
        - FormGroup
        - NumberInput
        - TextInput
        - Alert
    ui_policy:
      prefer_patternfly_primitives: true
      minimize_raw_div_wrappers: true
      max_raw_div_wrappers: 1

    states:
      - loading
      - empty_no_offerings
      - populated
      - error_load_failed
      - editing_defaults

    interactions:
      - >-
        Page header reads "Cluster Offerings" with subtitle "Manage which OpenShift cluster types are
        available to your organization."
      - >-
        Table columns: Name, Description, Status (Enabled/Disabled badge), Default Worker Count,
        Default SSH Key, Actions.
        Each row has a Switch toggle to enable/disable the offering for this org.
        Toggling calls PATCH /api/fulfillment/v1/cluster_catalog_items/{id}/org-settings with
        { enabled: true/false }.
      - >-
        "Edit defaults" action per row opens a modal to configure org-level overrides:
          Worker count (NumberInput; overrides catalog item default)
          SSH public key (TextInput; overrides tenant-level default)
        Submit calls PATCH /api/fulfillment/v1/cluster_catalog_items/{id}/org-settings with
        { default_overrides: { worker_count, ssh_public_key } }.
      - >-
        Empty state: "No cluster offerings available. Contact your provider to publish offerings."
      - >-
        Error state: inline danger Alert with Retry.

    design_system_alignment:
      accessibility_policy:
        - Switch toggles have aria-label="Toggle {item.title} for this organization".
        - Edit modal has aria-labelledby pointing to modal header.

transitions:
  - from: auth_post_login_transition
    action: complete login as tenant admin
    to: tad_dashboard_home
  - from: shell_primary_workspace
    action: select tenant admin dashboard nav
    to: tad_dashboard_home
  - from: tad_dashboard_home
    action: navigate to users tile
    to: tad_users
  - from: tad_dashboard_home
    action: navigate to quota tile
    to: tad_quota
  - from: tad_dashboard_home
    action: navigate to templates tile
    to: vmc_catalog_grid
  - from: tad_dashboard_home
    action: navigate to networks tile
    to: tad_networks_management
  - from: tad_dashboard_home
    action: navigate to storage tile
    to: tad_storage_placeholder
  - from: shell_primary_workspace
    action: select users nav under tenant admin
    to: tad_users
  - from: shell_primary_workspace
    action: select quota control nav
    to: tad_quota
  - from: shell_primary_workspace
    action: select template catalog nav
    to: vmc_catalog_grid
  - from: shell_primary_workspace
    action: select networks nav
    to: tad_networks_management
  - from: shell_primary_workspace
    action: select public ips nav
    to: tad_public_ips
  - from: shell_primary_workspace
    action: select storage nav
    to: tad_storage_placeholder
  - from: shell_primary_workspace
    action: select organization settings nav
    to: tad_org_settings_placeholder
  - from: shell_primary_workspace
    action: select security compliance nav
    to: tad_org_security_placeholder
  - from: tad_dashboard_home
    action: navigate to cluster offerings tile
    to: tad_cluster_offerings
  - from: shell_primary_workspace
    action: select cluster offerings nav
    to: tad_cluster_offerings
  - from: tad_networks_management
    action: click vm node in topology tab
    to: mvm_topology_handoff

validation_rules:
  - Cluster offering toggle requires manage_cluster_offerings permission.
  - Org-level default overrides must pass the same validation_schema constraints as the catalog item field_definitions.

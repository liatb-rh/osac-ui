# ui-flow: manage-cluster-offerings
# Generated: 2026-06-18

flow: manage-cluster-offerings
title: Manage Cluster Offerings
summary: >-
  TenantAdmin enables/disables per-org cluster catalog items.
  ProviderAdmin CRUDs ClusterCatalogItems (fieldDefinitions, allowedVersions, published).
statechart_ref: ../statecharts/manage-cluster-offerings.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    cof_list_view:
      view_tenant: manage_cluster_offerings_tenant
      view_provider: manage_cluster_offerings_provider
      create: manage_cluster_offerings_provider
      toggle_published: manage_cluster_offerings_provider
      enable_per_org: manage_cluster_offerings_tenant
    cof_detail_page:
      edit: manage_cluster_offerings_provider

steps:
  - id: cof_list_view
    title: Cluster Offerings list
    goal: >-
      TenantAdmin: view and enable/disable offerings per org.
      ProviderAdmin: CRUD catalog items + fieldDefinitions.
    route: /cluster-offerings
    ui:
      components:
        - PageLayout (title="Cluster Offerings")
        - Button "New offering" (providerAdmin only)
        - ObjectsTable (Title, Template, Published, Versions, Actions)
        - Switch (published per row, providerAdmin only)
        - ActionsColumn (Edit, Delete — providerAdmin; Enable/Disable — tenantAdmin)

  - id: cof_detail_page
    title: Cluster Offering detail/edit
    goal: Edit ClusterCatalogItem (template, fieldDefinitions, allowedVersions).
    route: /cluster-offerings/:id
    ui:
      components:
        - Form (title, template, fieldDefinitions editor, allowedVersions list)
        - Button "Save"

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/administration/ClusterOfferingsPage.tsx
    - apps/app-frontend/src/pages/administration/ClusterOfferingDetailPage.tsx
  deployment_variants: [standalone]

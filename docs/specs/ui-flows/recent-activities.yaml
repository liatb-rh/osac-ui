# ui-flow: recent-activities
# Generated: 2026-06-18

flow: recent-activities
title: Recent Activities
summary: >-
  Full-page activity feed from masthead bell.  Lists OsacEvent items from
  GET /api/events/v1/events.
statechart_ref: ../statecharts/recent-activities.statechart.yaml
rbac_ref: ../rbac.yaml

rbac:
  required_permissions_by_step:
    ra_activity_feed: { view: view_recent_activities }

steps:
  - id: ra_activity_feed
    title: Activity feed
    goal: Show paginated list of recent OsacEvents.
    route: /activities
    ui:
      components:
        - PageSection
        - ShellBreadcrumb (back button visible for this route)
        - List of OsacEvent items (type, severity badge, timestamp, message, relatedObjectRefs)
        - Spinner (loading)
        - EmptyState (no events)
    states:
      loading: { description: Spinner while events load. }
      empty: { description: No events. }
      populated: { description: Event list rendered. }
    interactions:
      - "Breadcrumb back navigates to previous route."
      - "In dev mode: GET /api/events/v1/events streams events."
      - "In mock mode: static paginated JSON from BFF mock."
    validation_rules: []

implementation_status:
  as_of: "2026-06-18"
  code_refs:
    - apps/app-frontend/src/pages/RecentActivitiesPage.tsx
    - apps/app-backend/src/routes/events.ts
  deployment_variants: [standalone]

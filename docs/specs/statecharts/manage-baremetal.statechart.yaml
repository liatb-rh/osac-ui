id: manage-baremetal
title: Manage Baremetal Statechart
source_flow: ../ui-flows/manage-baremetal.yaml
rbac_ref: ../rbac.yaml
initial: bm_list_view

states:
  bm_list_view:
    permissions: [view_baremetal]
    on:
      CLICK_REQUEST: { target: bm_request_wizard, guard: "can(role, 'request_baremetal')" }
      CLICK_INSTANCE_NAME: { target: bm_detail_page }
  bm_request_wizard:
    permissions: [request_baremetal]
    on:
      WIZARD_COMPLETE: { target: bm_list_view }
      WIZARD_CANCEL: { target: bm_list_view }
  bm_detail_page:
    permissions: [view_baremetal]
    on:
      CLICK_BACK: { target: bm_list_view }
ai-hints:
  summary: Baremetal list + request wizard + detail.

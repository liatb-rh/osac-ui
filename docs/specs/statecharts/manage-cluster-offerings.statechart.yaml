id: manage-cluster-offerings
title: Manage Cluster Offerings Statechart
source_flow: ../ui-flows/manage-cluster-offerings.yaml
rbac_ref: ../rbac.yaml
initial: cof_list_view

states:
  cof_list_view:
    permissions: [manage_cluster_offerings_tenant, manage_cluster_offerings_provider]
    on:
      CLICK_OFFERING: { target: cof_detail_page }
      CLICK_NEW: { target: cof_detail_page, guard: "can(role, 'manage_cluster_offerings_provider')" }
  cof_detail_page:
    permissions: [manage_cluster_offerings_provider]
    on:
      SAVE: { target: cof_list_view }
      CLICK_BACK: { target: cof_list_view }
ai-hints:
  summary: Cluster offerings list + detail/edit. ProviderAdmin CRUD; TenantAdmin toggle.

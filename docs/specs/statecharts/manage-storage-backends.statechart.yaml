id: manage-storage-backends
title: Manage Storage Backends Statechart
source_flow: ../ui-flows/manage-storage-backends.yaml
rbac_ref: ../rbac.yaml
initial: sb_overview_page

states:
  sb_overview_page:
    permissions: [manage_storage_backends]
    on:
      NAVIGATE_BACKENDS: { target: sb_list_view }
  sb_list_view:
    permissions: [manage_storage_backends]
    on:
      CLICK_REGISTER: { target: sb_register_form }
      CLICK_BACKEND_NAME: { target: sb_detail_page }
      CLICK_OVERVIEW: { target: sb_overview_page }
  sb_register_form:
    permissions: [manage_storage_backends]
    on:
      CONFIRM_REGISTER: { target: sb_list_view }
      CANCEL: { target: sb_list_view }
  sb_detail_page:
    permissions: [manage_storage_backends]
    on:
      CLICK_BACK: { target: sb_list_view }
ai-hints:
  summary: Storage overview + backend list + register form.

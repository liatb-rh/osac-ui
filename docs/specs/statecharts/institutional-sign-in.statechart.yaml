id: institutional-sign-in
title: Institutional Sign-In Statechart
source_flow: ../ui-flows/institutional-sign-in.yaml
rbac_ref: ../rbac.yaml
initial: auth_sign_in_form

states:
  auth_sign_in_form:
    on:
      SUBMIT_SIGN_IN:
        target: auth_post_login_transition
      CLICK_BACK_TO_WELCOME:
        target: wrs_welcome_landing
        external: welcome-and-role-selection.statechart.yaml#wrs_welcome_landing

  auth_post_login_transition:
    on:
      LOGIN_COMPLETE:
        target: shell_primary_workspace
        external: application-shell-session.statechart.yaml#shell_primary_workspace

ai-hints:
  summary: 2s simulated login delay (auth_post_login_transition) then routes to shell.

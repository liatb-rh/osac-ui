id: manage-global-templates
title: Manage Global Templates Statechart
source_flow: ../ui-flows/manage-global-templates.yaml
rbac_ref: ../rbac.yaml
initial: glt_list_view

states:
  glt_list_view:
    permissions: [manage_global_templates]
    on:
      CLICK_TEMPLATE: { target: glt_detail_page }
      CLICK_CREATE: { target: glt_detail_page, guard: "can(role, 'manage_global_templates')" }
  glt_detail_page:
    permissions: [manage_global_templates]
    on:
      SAVE: { target: glt_list_view }
      CLICK_BACK: { target: glt_list_view }
ai-hints:
  summary: Global template list + edit page.

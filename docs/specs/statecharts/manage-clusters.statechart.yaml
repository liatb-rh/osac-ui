# statechart: manage-clusters
# Generated: 2026-06-18

id: manage-clusters
title: Manage Clusters Statechart
source_flow: ../ui-flows/manage-clusters.yaml
rbac_ref: ../rbac.yaml
initial: csc_clusters_list

states:
  csc_clusters_list:
    permissions: [view_clusters]
    on:
      CLICK_CLUSTER_ROW:
        target: csc_cluster_detail_page
        guard: can(role, "view_clusters")
      CLICK_CREATE_CLUSTER:
        target: csc_create_cluster_modal
        guard: can(role, "create_cluster")
      CLICK_UPGRADE_CLUSTER:
        target: csc_upgrade_cluster_modal
        guard: can(role, "upgrade_cluster")

  csc_cluster_detail_page:
    permissions: [view_clusters]
    on:
      CLICK_BACK_BREADCRUMB:
        target: csc_clusters_list

  csc_create_cluster_modal:
    permissions: [create_cluster]
    on:
      CONFIRM_CREATE:
        target: csc_clusters_list
      CANCEL:
        target: csc_clusters_list

  csc_upgrade_cluster_modal:
    permissions: [upgrade_cluster]
    on:
      CONFIRM_UPGRADE:
        target: csc_clusters_list
      CANCEL:
        target: csc_clusters_list

ai-hints:
  summary: Cluster list and detail; create + upgrade as modals.
  impossibleStates:
    - CLICK_UPGRADE_CLUSTER when cluster state != CLUSTER_STATE_READY

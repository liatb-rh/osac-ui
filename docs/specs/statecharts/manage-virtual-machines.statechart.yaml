# statechart: manage-virtual-machines
# source_flow: ../ui-flows/manage-virtual-machines.yaml
# Generated: 2026-06-18

id: manage-virtual-machines
title: Manage Virtual Machines Statechart
source_flow: ../ui-flows/manage-virtual-machines.yaml
rbac_ref: ../rbac.yaml
initial: mvm_list_view

states:
  mvm_list_view:
    permissions: [view_vms]
    on:
      CLICK_VM_ROW:
        target: mvm_detail_page
        guard: can(role, "view_vms")
      CLICK_CREATE_VM:
        target: cvm_wizard_template
        guard: can(role, "create_vm")
        external: create-virtual-machine-wizard.statechart.yaml#cvm_wizard_template
      CLICK_DELETE_VM:
        target: mvm_delete_confirm_modal
        guard: can(role, "delete_vm")
      CLICK_OPEN_CONSOLE:
        target: vcd_console_page
        guard: can(role, "open_vm_console")
        external: vm-console-demo.statechart.yaml#vcd_console_page

  mvm_detail_page:
    permissions: [view_vms]
    on:
      CLICK_BACK_BREADCRUMB:
        target: mvm_list_view
      CLICK_DELETE_VM:
        target: mvm_delete_confirm_modal
        guard: can(role, "delete_vm")
      CONFIRM_DELETE_FROM_DETAIL:
        target: mvm_list_view
        notes: navigate('/vms') after successful delete

  mvm_delete_confirm_modal:
    permissions: [delete_vm]
    on:
      CONFIRM_DELETE:
        target: mvm_list_view
        guard: can(role, "delete_vm")
      CANCEL_DELETE:
        target: mvm_list_view

ai-hints:
  summary: >-
    VM list and detail; create via external wizard statechart.
    Delete confirm modal is an overlay on either list or detail.
  impossibleStates:
    - mvm_detail_page with vm=null after data load (→ not_found EmptyState, stays on page)
    - mvm_delete_confirm_modal with vmToDelete=null

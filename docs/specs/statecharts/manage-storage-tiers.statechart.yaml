id: manage-storage-tiers
title: Manage Storage Tiers Statechart
source_flow: ../ui-flows/manage-storage-tiers.yaml
rbac_ref: ../rbac.yaml
initial: tier_list_view

states:
  tier_list_view:
    permissions: [view_storage_tiers]
    on:
      CLICK_TIER_NAME: { target: tier_detail_page }
      CLICK_CREATE: { target: tier_create_wizard, guard: "can(role, 'manage_storage_tiers')" }
  tier_detail_page:
    permissions: [view_storage_tiers]
    on:
      CLICK_BACK: { target: tier_list_view }
  tier_create_wizard:
    permissions: [manage_storage_tiers]
    on:
      WIZARD_COMPLETE: { target: tier_list_view }
      WIZARD_CANCEL: { target: tier_list_view }
ai-hints:
  summary: Tiers list (all roles read-only; providerAdmin can create/edit).

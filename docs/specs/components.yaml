    classification: admin_editor
    used_in_flows: [manage-catalog-items]
    composes:
      - Form, FormGroup, TextInput, Select, Button (@patternfly/react-core)
    design_system_gaps: []

  # ── Theme ─────────────────────────────────────────────────────────────────

  - name: LightDarkToggle
    file: libs/ui-components/src/components/LightDarkToggle.tsx
    ux_role: theme_toggle
    ux_role_description: >-
      Light/dark mode toggle.  Rendered on welcome page and in sidebar footer.
      Calls setIsDarkTheme from SessionContext.
    classification: utility
    used_in_flows: [welcome-and-role-selection, application-shell-session]
    composes:
      - Switch (@patternfly/react-core)
    design_system_gaps: []

  # ── Gallery ───────────────────────────────────────────────────────────────

  - name: TemplatesGallery
    file: libs/ui-components/src/components/TemplatesGallery.tsx

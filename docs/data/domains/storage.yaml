storage_volume:
  description: >
    An allocated persistent storage volume on a StorageTier. Tenants create volumes and
    mount them to ComputeInstances. Volumes are independent of VM lifecycle — they persist
    after VM deletion.

  layers:
    fulfillment_service:
      notes: "TODO: StorageVolume proto/API"
      api_base: ""    # TODO

    osac_operator:
      notes: "TODO: likely maps to a PersistentVolumeClaim (PVC) in the tenant namespace"
      crd_kind: StorageVolume or PVC    # TODO

    osac_ui:
      ui_flow: specs/osac/ui-flows/manage-storage-volumes.yaml

  spec_fields:
    # TODO
    - name: storage_tier
      notes: "Reference to parent StorageTier"
    - name: size_gib
      notes: "Requested size in GiB"
    - name: access_mode
      notes: "ReadWriteOnce / ReadWriteMany / ReadOnlyMany?"

  status_fields:
    # TODO

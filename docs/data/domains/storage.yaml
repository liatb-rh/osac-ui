domain: storage
title: Storage (Storage Tiers, Storage Backends, Storage Volumes)
status: draft
owner: ""

overview: >
  OSAC storage has three main resource types:
  1. StorageBackend — provider-managed; defines the physical storage system (e.g. VAST, Ceph)
  2. StorageTier — tenant-facing; a named storage class with performance characteristics
     backed by a StorageBackend
  3. StorageVolume — tenant-facing; an allocated persistent volume on a StorageTier

  The fulfillment-service does NOT currently have proto definitions for storage resources.
  Storage is provisioned via osac-installer and a dedicated storage operator pathway.
  This spec is primarily derived from enhancement proposals and UI flow specs.
  Backend source data must be added manually via chat context.

known_backends:
  - VAST (primary integration, see specs/features/vast-storage-integration.yaml)
  - Ceph (TODO: confirm if supported)

# ──────────────────────────────────────────────────────────────────
# Resource: StorageBackend (provider-admin only)
# ──────────────────────────────────────────────────────────────────

storage_backend:
  description: >
    Provider-level resource representing a physical storage system.
    Admins create StorageBackends to make storage capacity available to tenants.
    Tenants cannot directly manage StorageBackends but can see their available StorageTiers.

  layers:
    fulfillment_service:
      notes: "TODO: determine if fulfillment-service has a StorageBackend proto or if this is osac-installer only"
      api_base: ""    # TODO
      operations: []  # TODO

    osac_operator:
      notes: "TODO: StorageBackend CRD — is this in osac-operator or a dedicated storage operator?"
      crd_kind: StorageBackend    # TODO: confirm

    osac_installer:
      notes: >
        osac-installer is the primary component for StorageBackend provisioning.
        It handles the initial integration with physical storage systems (e.g. VAST).
        Source context to be added manually — repo not present in workspace.

    osac_aap:
      playbooks:
        - playbook_osac_configure_tenant_storage.yml
      notes: "TODO: clarify which playbooks handle StorageBackend vs StorageTier provisioning"

    osac_ui:
      ui_flow: specs/osac/ui-flows/manage-storage-backends.yaml
      notes: Provider admin view for managing storage backends.

  spec_fields:
    # TODO: populate from osac-installer source or enhancement proposals
    - name: provider_type
      notes: "e.g. 'vast', 'ceph', 'nfs'"
    - name: connection_config
      notes: "Connection details (endpoint, credentials, etc.) — likely sensitive/write-only"
    - name: capacity
      notes: "Total capacity in GiB"

  status_fields:
    # TODO
    - name: state
      notes: "TODO: PENDING | READY | FAILED | DEGRADED?"
    - name: available_capacity
      notes: "TODO: dynamic availability"

# ──────────────────────────────────────────────────────────────────
# Resource: StorageTier (tenant-facing, admin-configurable)
# ──────────────────────────────────────────────────────────────────

storage_tier:
  description: >
    A named storage class exposing a subset of a StorageBackend with specific performance
    characteristics (IOPS, throughput, latency class). Tenants request volumes from StorageTiers.
    Provider admins create StorageTiers backed by StorageBackends.

  layers:
    fulfillment_service:
      notes: "TODO: StorageTier proto/API — not found in current proto files"
      api_base: ""    # TODO

    osac_operator:
      notes: >
        Likely maps to a Kubernetes StorageClass with OSAC-specific annotations.
        The osac-operator or storage operator creates/manages the underlying StorageClass.
      crd_kind: StorageTier or maps to StorageClass    # TODO: confirm

    osac_ui:
      ui_flow: specs/osac/ui-flows/manage-storage-tiers.yaml
      statechart: ""    # TODO

  spec_fields:
    # TODO: populate from enhancement proposals
    - name: storage_backend
      notes: "Reference to parent StorageBackend"
    - name: display_name
      notes: "Human-friendly name (e.g. 'Fast SSD', 'Standard HDD')"
    - name: iops
      notes: "Target IOPS"
    - name: throughput_mbps
      notes: "Target throughput in MB/s"
    - name: tenant_scope
      notes: "Which tenants can access this tier (all / specific list)"

  two_phase_provisioning:
    description: >
      VAST StorageTier provisioning follows a two-phase model (from vast-storage-integration.yaml):
      Phase 1 — Admin creates the VAST VIP pool and exports
      Phase 2 — Admin creates the OSAC StorageTier and links it to the VAST backend
    source: specs/features/vast-storage-integration.yaml


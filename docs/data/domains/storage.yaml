tenant_storage_onboarding:
  description: >
    Tenant-specific storage setup (separate from StorageTier creation).
    See feature spec: specs/features/tenant-storage-onboarding.yaml
  crd: TenantStorage    # TODO: confirm CRD name
  source: specs/features/tenant-storage-onboarding.yaml
  aap_playbook: playbook_osac_configure_tenant_storage.yml
  delete_playbook: playbook_osac_delete_tenant_storage.yml
  notes: >
    When a tenant is onboarded, OSAC provisions tenant-specific storage resources
    (e.g. VAST exports, NFS shares) using the configure_tenant_storage playbook.

workflows:
  storage_backend_create: |
    ## Create Storage Backend Workflow (Admin)

    1. **osac-ui (provider admin)** — Admin configures StorageBackend (connection details, capacity)
    2. **osac-installer / fulfillment-service** — Creates StorageBackend resource
    3. **osac-operator / storage-operator** — Reconciles backend connectivity
    4. **osac-aap** — TODO: confirm playbook
    5. Status: READY when backend is connected and capacity is verified

  storage_tier_create: |
    ## Create Storage Tier Workflow (Admin)

    See two-phase model for VAST (specs/features/vast-storage-integration.yaml).
    1. Admin creates StorageTier linked to a READY StorageBackend
    2. Operator creates Kubernetes StorageClass (or equivalent)
    3. Tier becomes available to tenants

  volume_create: |
    ## Create Storage Volume Workflow (Tenant)

    1. **osac-ui** — Tenant selects StorageTier and specifies size
    2. **fulfillment-service / osac-operator** — Creates PVC from StorageClass
    3. Storage backend provisions the volume
    4. Volume becomes available for attachment to ComputeInstance

storage_class_labeling:
  description: >
    From enhancements/tenant-specific-storageclasses/README.md and
    enhancements/tenant-storage-tiers/README.md (MGMT-23669).
    StorageClasses are labeled with two required axes to enable multi-tenant, multi-tier storage.

  label_schema:
    tenant_label:
      key: osac.openshift.io/tenant
      required: true
      values:
        - "<tenant-id>": assigns StorageClass to a specific tenant
        - "Default": shared StorageClass available as fallback (capital D, safe from collision)
      notes: StorageClasses without this label are ignored by OSAC.

    tier_label:
      key: osac.openshift.io/storage-tier
      required: true
      values:
        - freeform string (case-sensitive, lowercase recommended)
        - conventional_values: [fast, standard, archival, default]
        - notes: "OSAC-shipped templates use tier name 'default'. CSP templates can use 'fast', etc."
      notes: StorageClasses without this label are ignored by OSAC.

  resolution_algorithm:
    description: >
      For each distinct (tenant, storage-tier) combination:
    steps:
      - "1. Find StorageClass with tenant=<this-tenant> AND storage-tier=<tier>: use it (tenant-specific wins)"
      - "2. Else: find StorageClass with tenant=Default AND storage-tier=<tier>: use it (shared fallback)"
      - "3. Else: error (tier not available for this tenant)"
    error: "Descriptive error with list of available tiers for this tenant"

  tenant_crd_status:
    description: >
      The Tenant CRD status field was changed from singular to plural (breaking change).
    old_field: status.storageClass (string, singular — REMOVED)
    new_field: "status.storageClasses (list of ResolvedStorageClass {name: string, tier: string})"
    notes: >
      The osac-operator is the single source of truth for StorageClass resolution.
      Resolved list is injected into AAP extra_vars as `storageClasses` list.
      Ansible roles must specify `tenant_storage_class_storage_tier` parameter (no default;
      fails immediately with available tiers list if not provided).

  example_configuration: |
    # Tenant-specific fast storage
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: netapp-tenant123-fast
      labels:
        osac.openshift.io/tenant: tenant123
        osac.openshift.io/storage-tier: fast
    provisioner: csi.trident.netapp.io

    # Shared default storage
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: ceph-default
      labels:
        osac.openshift.io/tenant: Default
        osac.openshift.io/storage-tier: default
    provisioner: rook-ceph.rbd.csi.ceph.com

  template_usage:
    osac_shipped: "Always use storage-tier=default"
    csp_custom: "Can use fast, archival, or any custom tier"
    ansible_role: "tenant_storage_class Ansible role requires tenant_storage_class_storage_tier parameter"

helm_installation:
  description: >
    From enhancements/helm-based-installation/README.md (MGMT-24053).
    OSAC storage prerequisites for Helm chart installation.
  requirements:
    - "StorageClass with RWX (ReadWriteMany) access mode for fulfillment-service database"
    - "PostgreSQL (external HA or bundled single-replica): postgres.enabled=true/false"
    - "StorageClass for PostgreSQL PVCs"
  database_migration: >
    Pre-upgrade Helm hook runs migration Job (migrate subcommand in fulfillment-service).
    Idempotent; failure blocks upgrade.

cross_layer_gaps:
  - gap: >
      Storage resources (StorageBackend, StorageTier, StorageVolume) do NOT appear in the
      fulfillment-service proto files. Storage is managed by osac-installer and/or a dedicated
      storage operator. The exact API contract for storage must be sourced from osac-installer
      (not present in this workspace).

  - gap: >
      The TenantStorage CR from the tenant-storage-onboarding feature spec relates to
      per-tenant storage provisioning but may be a separate resource from the user-facing
      StorageVolume. The relationship needs clarification.

  - gap: >
      Storage provisioning path for VAST vs. generic storage backends may differ significantly.
      The two-phase provisioning model for VAST is documented in the enhancement proposals.

  - gap: >
      Tenant CRD status.storageClass (singular) was REMOVED and replaced by status.storageClasses (list).
      Any code referencing tenant.status.storageClass must be updated.


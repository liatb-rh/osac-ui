# OSAC Domain Spec — Virtual Networks
# Sources:
#   proto/public/osac/public/v1/virtual_network_type.proto
#   Projects/osac-backends/osac-operator/api/v1alpha1/virtualnetwork_types.go
#   Projects/osac-backends/fulfillment-service/FRONTEND-SPEC.md §9
#   specs/osac/ui-flows/manage-networks.yaml
#   OSAC-1008 (Netris Backend), OSAC-1029 (Networking API)

domain: virtual-networks
title: Virtual Networks
status: draft
owner: ""

layers:
  fulfillment_service:
    proto_package: osac.public.v1
    key_messages:
      - VirtualNetwork
      - VirtualNetworkSpec
      - VirtualNetworkStatus
      - VirtualNetworkCapabilities
    api_base: /api/fulfillment/v1/virtual_networks
    operations:
      - GET    /virtual_networks              # List
      - GET    /virtual_networks/{id}         # Get
      - POST   /virtual_networks              # Create
      - DELETE /virtual_networks/{id}         # Delete (no Update — all spec fields are immutable)
    proto_source: proto/public/osac/public/v1/virtual_network_type.proto

  osac_operator:
    crd_group: osac.redhat.com
    crd_kind: VirtualNetwork    # TODO: confirm kind name in operator
    crd_version: v1alpha1
    managed_by: osac-operator
    source: Projects/osac-backends/osac-operator/api/v1alpha1/virtualnetwork_types.go

  osac_aap:
    playbooks:
      - playbook_osac_create_virtual_network.yml
      - playbook_osac_delete_virtual_network.yml
    triggered_by: osac-operator

  osac_ui:
    ui_flow: specs/osac/ui-flows/manage-networks.yaml
    statechart: specs/osac/statecharts/manage-networks.statechart.yaml
    typescript_types: []
    notes: >
      UI allows creation of IPv4-only, IPv6-only, or dual-stack networks.
      NetworkClass selection determines available capabilities.

data_model:
  spec_fields:
    - name: region
      proto_field: spec.region    # unified-networking OSAC-1029
      operator_field: ""    # TODO
      ui_prop: spec.region
      type: string (Region ID)
      mutable: false
      notes: >
        ADDED by unified-networking (OSAC-1029). VirtualNetworks are scoped to a Region.
        A Region has exactly one NetworkClass (provider-configured, not in tenant API).

    - name: network_class
      proto_field: spec.network_class
      operator_field: ""    # TODO
      ui_prop: spec.networkClass
      type: string (NetworkClass ID)
      mutable: false
      notes: >
        IMMUTABLE. Determines network implementation strategy.
        IMPORTANT (unified-networking OSAC-1029): NetworkClass is a provider-level CRD;
        it should NOT be exposed in the tenant-facing VirtualNetwork creation form.
        One NetworkClass per Region; automatically selected based on region.
        Tenants should not need to select or know the NetworkClass — the region determines it.

    - name: ipv4_cidr
      proto_field: spec.ipv4_cidr (optional)
      operator_field: ""    # TODO
      ui_prop: spec.ipv4Cidr
      type: string (CIDR notation, e.g. "10.0.0.0/16")
      mutable: false
      notes: >
        IMMUTABLE. Required for IPv4 or dual-stack networks. Leave empty for IPv6-only.

    - name: ipv6_cidr
      proto_field: spec.ipv6_cidr (optional)
      operator_field: ""    # TODO
      ui_prop: spec.ipv6Cidr
      type: string (CIDR notation, e.g. "2001:db8::/48")
      mutable: false
      notes: >
        IMMUTABLE. Required for IPv6 or dual-stack networks. Leave empty for IPv4-only.

    - name: capabilities
      proto_field: spec.capabilities (VirtualNetworkCapabilities)
      operator_field: ""    # TODO
      ui_prop: spec.capabilities
      type: "{enable_ipv4: bool, enable_ipv6: bool, enable_dual_stack: bool}"
      mutable: false
      notes: >
        IMMUTABLE. Must be consistent with which CIDR fields are set.
        Must be compatible with the selected NetworkClass.capabilities.

  status_fields:
    - name: state
      proto_field: status.state (VirtualNetworkState enum)
      operator_field: ""    # TODO
      ui_prop: status.state
      type: enum
      values:
        - VIRTUAL_NETWORK_STATE_UNSPECIFIED → unknown
        - VIRTUAL_NETWORK_STATE_PENDING → being initialized
        - VIRTUAL_NETWORK_STATE_READY → fully operational
        - VIRTUAL_NETWORK_STATE_FAILED → error; see status.message

    - name: message
      proto_field: status.message (optional string)
      operator_field: ""    # TODO
      ui_prop: status.message
      type: string
      notes: >
        Human-readable detail for PENDING progress or FAILED error explanation.
        UI should display this in the network detail view when state is not READY.

lifecycle:
  transitions:
    - UNSPECIFIED → PENDING: resource created
    - PENDING → READY: CIDR allocated, network backend configured
    - PENDING → FAILED: validation error or backend failure (terminal; requires recreation)
    - READY → DELETING: user calls DELETE
  notes: >
    VirtualNetwork cannot be updated after creation (all spec fields immutable).
    Failed networks require deletion and recreation with corrected parameters.
    Networks with attached Subnets or ComputeInstances cannot be deleted.

dependency_chain:
  - "VirtualNetwork must be READY before Subnets can be created"
  - "VirtualNetwork must be READY before SecurityGroups can be created"
  - "All Subnets and SecurityGroups must be deleted before VirtualNetwork can be deleted"

network_classes:
  description: >
    NetworkClasses are provider-managed resources that define the implementation strategy
    for virtual networks. Each backend implements the full Networking API contract.
    The selected NetworkClass determines which backend provisions and manages the network.
  known_backends:
    - id: udn-net
      backend: OVN-Kubernetes User-Defined Networks (UDN)
      description: Software-defined overlay network via OVN-K UDN
      vnet_mapping: VirtualNetwork → OVN UDN VRF

    - id: phys-net
      backend: Physical network infrastructure
      description: Hardware network pass-through

    - id: netris
      backend: Netris Network Fabric Controller
      description: >
        Full-stack network fabric controller (FabricManager) that implements the complete Networking API.
        Manages physical network fabric (spine/leaf switches) via Netris controller.
        Covers VirtualNetwork (VPC/VRF), Subnet (V-Net/VXLAN), SecurityGroup (ACL),
        ExternalIPPool/ExternalIP (IPAM), and NATGateway (SoftGate SNAT).
      jira: OSAC-1008
      networking_api_epic: OSAC-1029
      caas_integration: OSAC-1136 / OSAC-1137
      unified_networking_role: fabricManager
      vnet_mapping: VirtualNetwork → Netris VPC or VRF
      subnet_mapping: Subnet → Netris V-Net (VXLAN-backed)
      security_group_mapping: SecurityGroup → Netris ACL
      public_ip_mapping: ExternalIPPool / ExternalIP → Netris IPAM
      nat_gateway_mapping: NATGateway → Netris SoftGate SNAT (outbound only)
      work_areas:
        - "Internal Network API: VirtualNetwork, Subnet, SecurityGroup"
        - "External Network API: ExternalIPPool, ExternalIP, NATGateway, ExternalIPAttachment"
        - "Netris operator integration and installer requirements"
        - "Deployment scripts and lab setup"
      notes: >
        Netris is the primary production FabricManager. When the region's NetworkClass uses
        fabricManager=netris, all networking resources are provisioned via the Netris controller.
        If the region also hosts VMs, a k8sManager (e.g. cudn_localnet) bridges the OVN overlay
        to the Netris physical fabric.

  unified_networking_networkclass_redesign:
    description: >
      From enhancements/unified-networking/README.md (OSAC-1029).
      NetworkClass is redesigned with TWO manager fields.
    fields:
      fabricManager:
        description: >
          Single product managing ALL physical networking (isolation, ACLs, IP allocation, DNAT, SNAT).
          Examples: netris, neutron.
          Required for all regions.
      k8sManager:
        description: >
          Bridges the Kubernetes/OVN overlay to the physical fabric.
          Only needed for regions hosting VMs (ComputeInstances).
          Examples: cudn_localnet (CUDN with LocalNet), evpn (OVN EVPN via BGP).
          If absent: ComputeInstance creation is rejected for this region.
    examples:
      - "Netris + CUDN (VMs + BM): fabricManager=netris, k8sManager=cudn_localnet"
      - "Neutron + CUDN (VMs + BM): fabricManager=neutron, k8sManager=cudn_localnet"
      - "BM-only (no VMs): fabricManager=netris (no k8sManager)"
    registration:
      mechanism: ConfigMap with labels osac.openshift.io/network/fabric-manager or k8s-manager
      note: Manager self-registration — adding a new manager requires only a new ConfigMap + Ansible role
    capabilities:
      source: Auto-populated from manager ConfigMaps; provider can override with disableCapabilities
      items:
        - addressFamily: ipv4 | ipv6 | dualStack
        - dpuSupport: bool

  how_vms_join_fabric:
    description: >
      VMs in KubeVirt/OVN overlay are bridged to the physical fabric via the k8sManager.
      This makes VMs first-class fabric participants alongside BM servers and cluster nodes.
    mechanisms:
      cudn_localnet: OVN network mapped to physical VLAN; full L2 adjacency
      ovn_evpn: OVN advertises VM routes via BGP EVPN; L3 reachable (not yet GA)
      cudn_vrf_lite: VRF instances route between OVN overlay and fabric
      dpu_bridging: SmartNICs offload bridging to hardware

  notes: "TODO: add dedicated NetworkClass domain spec if needed"

workflows:
  create: |
    ## Create Virtual Network Workflow

    1. **osac-ui** — User selects IP mode (IPv4/IPv6/dual-stack), enters CIDRs, selects NetworkClass
       (e.g. "netris", "udn-net", "phys-net")
    2. **fulfillment-service** — POST /virtual_networks: validates CIDR format and NetworkClass compatibility
    3. **osac-operator** — VirtualNetwork CR reconciler, dispatches to NetworkClass backend:

       **If network_class = "netris":**
       - Calls Netris controller API to create VPC or VRF
       - Configures VXLAN fabric on spine/leaf switches

       **If network_class = "udn-net":**
       - Configures OVN-Kubernetes UDN VRF
       - Allocates CIDR space in the SDN control plane

       **If network_class = "phys-net":**
       - Configures physical network pass-through

    4. **osac-operator** — Updates VirtualNetwork status: PENDING → READY
    5. **fulfillment-service** — Propagates status; Subnets can now be created

  delete: |
    ## Delete Virtual Network Workflow

    Pre-condition: All Subnets, SecurityGroups, NATGateways, and ComputeInstances using this network must be deleted first.

    1. **osac-ui** — User confirms deletion (UI should validate no dependent resources exist)
    2. **fulfillment-service** — DELETE /virtual_networks/{id}: validates no dependent resources
    3. **osac-operator** — Finalizer tears down backend VPC/VRF (Netris) or UDN/physical equivalent
    4. **fulfillment-service** — Resource removed

cross_layer_gaps:
  - gap: >
      VirtualNetwork operator CRD types (virtualnetwork_types.go) need to be read to confirm
      field names and any operator-specific status fields.

  - gap: >
      NetworkClass selection: the UI needs to list available NetworkClasses and their capabilities
      to determine whether to show IPv6/dual-stack options. Network capability validation
      happens server-side but the UI should pre-filter options for better UX.

open_questions:
  - What is the VirtualNetwork CRD spec in the operator?
  - Does the operator create any intermediate CRDs (e.g. NetworkAttachmentDefinition) for the UDN?
  - Are VirtualNetworks scoped to a region? How is region expressed in the data model?
  - What happens when a NetworkClass becomes unavailable after a VirtualNetwork is READY?
  - Is there a maximum number of VirtualNetworks per tenant?
  - For Netris: does VirtualNetwork map to a VPC or a VRF, and when is each used?
  - For Netris: what are the installer prerequisites for Netris controller connectivity?
  - For Netris: does the operator call the Netris controller API directly or via AAP playbooks?
  - What is the exact Netris NetworkClass ID string used in spec.network_class?

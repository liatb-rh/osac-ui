# OSAC Domain Spec — Instance Types (VM)
# Sources:
#   enhancements/vm-instance-types/README.md (OSAC-46)
#   enhancements/vm-api-fields/README.md

domain: instance-types
title: Instance Types (VM Compute Resource Bundles)
status: draft
owner: ""

overview: >
  InstanceType is a global, provider-managed resource that bundles a fixed set of compute
  resources (cores + memory_gib) under a named identifier. VM creation requires specifying
  an instance_type by name instead of raw cores/memory values.

  Rationale: standardizes compute offerings, enables capacity planning, enforces governance.
  Analogous to AWS EC2 instance types.

  Scope: VMaaS only (CaaS uses HostType for bare metal node pools).

  API layer: instance_type name is resolved to cores/memory_gib by fulfillment-service
  before creating the ComputeInstance operator CRD. The osac-operator sees only cores/memory_gib.

layers:
  fulfillment_service:
    proto_package: osac.public.v1
    key_messages:
      - InstanceType
      - InstanceTypeSpec           # TODO: confirm — spec may be flat on InstanceType
      - InstanceTypeDeprecation
    api_base: /api/fulfillment/v1/instance_types
    operations:
      public:
        - GET /instance_types        # List (tenant user view)
        - GET /instance_types/{name} # Get by name
      private:
        - GET/POST/PATCH/DELETE /instance_types  # Admin CRUD
    proto_source: proto/public/osac/public/v1/instance_type_type.proto
    primary_key: name (string, globally unique — NOT a UUID id)
    notes: >
      InstanceType uses `name` as its primary key (like IdentityProvider), not a UUID `id`.
      Names are immutable after creation. Example: "standard-4-16", "gpu-8-64".

  osac_operator:
    notes: >
      No CRD for InstanceType. The fulfillment-service resolves instance_type name →
      cores/memory_gib values and writes them to the ComputeInstance CRD spec directly.
      The operator sees cores and memory_gib as concrete values, unaware of instance types.
      Audit trail: osac.io/instance-type-name label on ComputeInstance CR.

  database:
    table: instance_types
    primary_key: name (globally unique; never reusable after deletion)
    format: JSONB for InstanceType proto data

data_model:
  fields:
    - name: name
      type: string (globally unique, user-specified)
      mutable: false
      notes: >
        Primary key. Immutable after creation. Not a UUID — human-readable identifier.
        Examples: "standard-4-16", "memory-4-32", "gpu-8-64".

    - name: cores
      type: int32
      mutable: false
      notes: Number of CPU cores. Immutable — defined at creation time.

    - name: memory_gib
      type: int32
      mutable: false
      notes: Memory in GiB. Immutable — defined at creation time.

    - name: description
      type: string
      mutable: true
      notes: Human-readable description of the instance type.

    - name: state
      type: InstanceTypeState enum
      mutable: true
      values:
        - ACTIVE (1): VM creation succeeds; no warnings
        - DEPRECATED (2): VM creation succeeds; warning returned in CreateComputeInstanceResponse.warnings
        - OBSOLETE (3): VM creation rejected with 409 Conflict
      notes: >
        Transitions are fully bidirectional (ACTIVE ↔ DEPRECATED ↔ OBSOLETE).
        Timestamps auto-populated on state change.

    - name: deprecation
      type: InstanceTypeDeprecation object
      mutable: true
      fields:
        - state: string
        - replacement: string (optional — suggested replacement instance type name)
        - deprecated_at: Timestamp (auto-set when transitioning to DEPRECATED)
        - obsolete_at: Timestamp (auto-set when transitioning to OBSOLETE)

authorization:
  create_global: Cloud Provider Admin only
  list_get: all authenticated users (all instance types are global/visible to all)
  update_delete: Cloud Provider Admin only

deletion_protection: >
  Deletion rejected if any ComputeInstance references this instance type
  (detected via osac.io/instance-type-name label on ComputeInstance CRs).
  Name is never reusable even after deletion.

resolution_at_api_boundary:
  description: >
    When creating a ComputeInstance, the fulfillment-service:
    1. Validates instance_type exists and is in ACTIVE or DEPRECATED state
    2. Expands instance_type name → {cores, memory_gib} values
    3. Sets those values in the ComputeInstance CRD spec
    4. Sets osac.io/instance-type-name label on the CRD for audit trail
    5. Returns DEPRECATED warning in CreateComputeInstanceResponse.warnings if applicable
    The osac-operator never sees or processes InstanceType resources.

lifecycle:
  state_machine:
    ACTIVE:
      allowed_transitions: [DEPRECATED, OBSOLETE]
      vm_creation: allowed (no warning)
    DEPRECATED:
      allowed_transitions: [ACTIVE, OBSOLETE]
      vm_creation: allowed + warning in response
    OBSOLETE:
      allowed_transitions: [ACTIVE, DEPRECATED]
      vm_creation: rejected (409 Conflict)

workflows:
  provider_creates_instance_type: |
    ## Create Instance Type (Cloud Provider Admin)

    1. Admin calls private API: POST /instance_types
       {name: "standard-4-16", cores: 4, memory_gib: 16, description: "Standard VM — 4 vCPU / 16 GiB"}
    2. fulfillment-service: validates name uniqueness, stores in instance_types table
    3. Instance type immediately ACTIVE and visible to all tenants

  tenant_creates_vm: |
    ## Create VM Using Instance Type (Tenant User)

    1. Tenant lists instance types: GET /instance_types (sees name, cores, memory_gib, state)
    2. Tenant creates VM: POST /compute_instances {spec: {instance_type: "standard-4-16", ...}}
    3. fulfillment-service: validates instance_type state (ACTIVE or DEPRECATED)
    4. fulfillment-service: resolves name → {cores: 4, memory_gib: 16}
    5. fulfillment-service: creates ComputeInstance CR with explicit cores/memory_gib values
    6. If DEPRECATED: response includes warnings: ["Instance type standard-4-16 is deprecated; migrate to standard-4-16v2"]

  provider_deprecates: |
    ## Deprecate Instance Type

    1. Admin: PATCH /instance_types/standard-4-16 {state: DEPRECATED, replacement: "standard-4-16v2"}
    2. Existing VMs: unaffected (instance type is resolved at create time; CR stores explicit values)
    3. New VMs with deprecated type: creation succeeds + warning

  provider_obsoletes: |
    ## Obsolete Instance Type

    1. Admin: PATCH /instance_types/standard-4-16 {state: OBSOLETE}
    2. New VM creation with obsolete type: rejected with 409 Conflict
    3. Existing VMs: unaffected

cross_layer_gaps:
  - gap: >
      ComputeInstance CRD spec still contains cores and memory_gib fields (operator needs them).
      These fields are REMOVED from the public API spec (ComputeInstanceSpec proto) for tenants.
      The fulfillment-service is the translation layer: API instance_type → CRD cores/memory_gib.
      Frontend agents must NOT show cores/memory_gib as input fields in the Create VM form;
      instead show the instance_type selector with the resolved values as display-only metadata.

  - gap: >
      The InstanceType proto message name and exact field structure (flat vs nested spec)
      needs confirmation from the proto source once implemented.

open_questions:
  - Is the proto resource flat (name, cores, memory_gib on InstanceType directly) or does it have spec/status?
  - What is the maximum number of instance types a provider can define?
  - Phase 2: will flexible mode (user-specified cores/memory without instance_type) be added?
  - Should instance types support GPU specifications in the future?
  - Are instance types visible to tenants before VMs are created (discovery API)?

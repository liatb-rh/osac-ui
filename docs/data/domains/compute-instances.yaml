# OSAC Domain Spec — Compute Instances (VMs)
# Sources:
#   proto/public/osac/public/v1/compute_instance_type.proto
#   Projects/osac-backends/osac-operator/api/v1alpha1/computeinstance_types.go
#   Projects/osac-backends/fulfillment-service/FRONTEND-SPEC.md §3
#   specs/osac/ui-flows/manage-virtual-machines.yaml
#   specs/osac/ui-flows/create-virtual-machine-wizard.yaml
#   enhancements/vm-api-fields/README.md
#   enhancements/computeinstance-phase-condition-expansion/README.md
#   enhancements/vm-instance-types/README.md (OSAC-46)
#   enhancements/image-management/README.md (OSAC-979)
#   enhancements/vm-snapshots/README.md (OSAC-55)
#   enhancements/catalog-items/README.md
#   enhancements/vmaas/README.md

domain: compute-instances
title: Compute Instances (VMs)
status: draft
owner: ""

layers:
  fulfillment_service:
    proto_package: osac.public.v1
    key_messages:
      - ComputeInstance
      - ComputeInstanceSpec
      - ComputeInstanceStatus
      - ComputeInstanceCondition
      - ComputeInstanceImage
      - ComputeInstanceDisk
      - NetworkAttachment
    api_base: /api/fulfillment/v1/compute_instances
    operations:
      - GET    /compute_instances              # List
      - GET    /compute_instances/{id}         # Get
      - POST   /compute_instances              # Create
      - PUT    /compute_instances/{id}         # Update (mutable fields only)
      - DELETE /compute_instances/{id}         # Delete
    proto_source: proto/public/osac/public/v1/compute_instance_type.proto
    private_api: proto/private/osac/private/v1/compute_instances_service.proto

  osac_operator:
    crd_group: osac.redhat.com
    crd_kind: ComputeInstance
    crd_version: v1alpha1
    short_name: ci
    managed_by: osac-operator
    source: Projects/osac-backends/osac-operator/api/v1alpha1/computeinstance_types.go
    notes: >
      The operator creates a KubeVirt VirtualMachine CR in the tenant-specific namespace
      determined by the primary subnet (spec.networkAttachments[0].subnetRef).
      It tracks progress via Jobs (status.jobs).

  osac_aap:
    playbooks:
      - playbook_osac_create_compute_instance.yml
      - playbook_osac_delete_compute_instance.yml
    triggered_by: osac-operator
    notes: >
      The operator reconciler calls AAP playbooks to provision and deprovision compute
      instances on the underlying infrastructure (KubeVirt / hypervisor).

  osac_ui:
    ui_flows:
      - specs/osac/ui-flows/manage-virtual-machines.yaml
      - specs/osac/ui-flows/create-virtual-machine-wizard.yaml
    statechart: specs/osac/statecharts/manage-virtual-machines.statechart.yaml
    typescript_types: []    # TODO: add key TS interface paths from osac-ui
    notes: >
      The Create VM wizard supports both template-based and catalog-item-based creation.
      Console access uses a separate gRPC bidirectional streaming endpoint.

  osac_installer:
    notes: "TODO: add installer role (if any) for compute instances"

data_model:
  spec_fields:
    - name: template
      proto_field: spec.template
      operator_field: spec.templateID
      ui_prop: spec.template
      type: string (ID reference)
      mutable: false
      notes: Mutually exclusive with catalog_item. Immutable after create.

    - name: catalog_item
      proto_field: spec.catalog_item
      operator_field: spec.catalogItemID     # TODO: confirm operator field name
      ui_prop: spec.catalogItem
      type: string (ID reference)
      mutable: false
      notes: >
        Mutually exclusive with template. When set, server fetches catalog item and
        applies its field definitions. Preferred over template in newer flows.

    - name: template_parameters
      proto_field: spec.template_parameters
      operator_field: spec.templateParameters (JSON-encoded string)
      ui_prop: spec.templateParameters
      type: map<string, google.protobuf.Any> / JSON string
      mutable: false
      notes: >
        Proto uses map<string,Any> with type URLs. Operator encodes as JSON string.
        UI must serialize to ProtoJSON format (with @type field) on create.

    - name: compute_image
      proto_field: spec.compute_image    # replaces old spec.image field (OSAC-979)
      operator_field: spec.image (ImageSpec — resolved by fulfillment-service)
      ui_prop: spec.computeImage
      type: string (ComputeImage resource ID)
      mutable: false
      notes: >
        BREAKING CHANGE (OSAC-979): The old `image` field (ComputeInstanceImage with source_type/source_ref)
        is replaced by `compute_image` (a ComputeImage resource ID).
        The fulfillment-service resolves the ID → OCI source_ref before creating the operator CRD.
        UI must show an image picker (list ComputeImages) instead of a free-text URL field.
        See domains/compute-images.yaml for ComputeImage resource spec.
      api_behavior_by_image_state:
        AVAILABLE: creation succeeds, no warning
        DEPRECATED: creation succeeds + warning in CreateComputeInstanceResponse.warnings
        OBSOLETE: creation rejected with 409 Conflict

    - name: instance_type
      proto_field: spec.instance_type    # added by OSAC-46
      operator_field: spec.cores + spec.memoryGiB (resolved by fulfillment-service)
      ui_prop: spec.instanceType
      type: string (InstanceType name, e.g. "standard-4-16")
      mutable: false
      notes: >
        REPLACES cores and memory_gib at the API layer (OSAC-46).
        Users specify an instance type name; the fulfillment-service resolves name →
        {cores, memory_gib} before writing the ComputeInstance CRD.
        Operator CRD still carries explicit cores/memory_gib fields (unchanged).
        The osac.io/instance-type-name label on the CRD provides audit trail.
        See domains/instance-types.yaml for InstanceType resource spec.
      api_behavior_by_instance_type_state:
        ACTIVE: creation succeeds, no warning
        DEPRECATED: creation succeeds + warning in CreateComputeInstanceResponse.warnings
        OBSOLETE: creation rejected with 409 Conflict

    - name: cores
      proto_field: REMOVED from public API spec (OSAC-46)
      operator_field: spec.cores
      type: int32 (operator CRD only)
      mutable: false
      constraints: "operator: min=1, max=128"
      notes: >
        REMOVED from tenant-facing API (OSAC-46). Still present in operator CRD — populated
        by fulfillment-service when resolving instance_type. Frontend must NOT show this field.

    - name: memory_gib
      proto_field: REMOVED from public API spec (OSAC-46)
      operator_field: spec.memoryGiB
      type: int32 (operator CRD only)
      mutable: false
      constraints: "operator: min=1"
      notes: >
        REMOVED from tenant-facing API (OSAC-46). Still present in operator CRD — populated
        by fulfillment-service when resolving instance_type. Frontend must NOT show this field.

    - name: boot_disk
      proto_field: spec.boot_disk (ComputeInstanceDisk)
      operator_field: spec.bootDisk (DiskSpec)
      ui_prop: spec.bootDisk
      type: object {size_gib: int32}
      mutable: false
      notes: Immutable after create.

    - name: additional_disks
      proto_field: spec.additional_disks (repeated ComputeInstanceDisk)
      operator_field: spec.additionalDisks ([]DiskSpec)
      ui_prop: spec.additionalDisks
      type: array of {size_gib: int32}
      mutable: false
      notes: Immutable after create.

    - name: run_strategy
      proto_field: spec.run_strategy (string "Always" | "Halted")
      operator_field: spec.runStrategy (RunStrategyType enum "Always" | "Halted")
      ui_prop: spec.runStrategy
      type: string enum
      mutable: true
      notes: >
        MUTABLE. Controls VM power state. "Always" = running; "Halted" = stopped.
        UI uses this to implement Start/Stop actions without a dedicated endpoint.

    - name: ssh_key
      proto_field: spec.ssh_key
      operator_field: spec.sshKey
      ui_prop: spec.sshKey
      type: string (SSH public key)
      mutable: false
      notes: Immutable after create.

    - name: user_data
      proto_field: spec.user_data
      operator_field: spec.userDataSecretRef (LocalObjectReference to a Secret)
      ui_prop: spec.userData
      type: string (cloud-init / ignition payload)
      mutable: false
      cross_layer_gap: >
        Proto carries raw string; operator stores it as a Secret and references by name.
        Fulfillment-service is responsible for creating the Secret from the proto string.
        UI should never display or POST the raw secret content after initial create.
      notes: Immutable after create. Max 64 KB (enforced by server).

    - name: network_attachments
      proto_field: spec.network_attachments (repeated NetworkAttachment)
      operator_field: spec.networkAttachments ([]NetworkAttachment)
      ui_prop: spec.networkAttachments
      type: "array of {subnet: string (fulfillment ID), security_groups: []string}"
      mutable: partial
      notes: >
        Subnet references (subnetRef) are immutable. SecurityGroup list per NIC is MUTABLE.
        Array size and subnet assignments cannot change after initial assignment.
        First entry is primary NIC (determines VM namespace placement in operator).
        Max 8 attachments (operator CRD constraint for CEL cost budget).
      cross_layer_gap: >
        Proto uses fulfillment-service IDs for subnet and security_groups.
        Operator uses CR names (subnetRef, securityGroupRefs) within the hub namespace.
        Fulfillment-service resolves IDs → CR names before writing the operator CRD.

    - name: restart_requested_at
      proto_field: spec.restart_requested_at (optional Timestamp)
      operator_field: spec.restartRequestedAt (*metav1.Time)
      ui_prop: spec.restartRequestedAt
      type: ISO-8601 timestamp
      mutable: true
      notes: >
        MUTABLE signal field. Set to current time (NOW) to request a restart.
        Controller executes restart if value > status.lastRestartedAt.
        Declarative restart mechanism — UI should set to current timestamp on user action.

  status_fields:
    - name: state
      proto_field: status.state (ComputeInstanceState enum)
      operator_field: status.phase (ComputeInstancePhaseType string)
      ui_prop: status.state
      type: enum
      values:
        - COMPUTE_INSTANCE_STATE_UNSPECIFIED / "" → unknown
        - COMPUTE_INSTANCE_STATE_STARTING / "Starting"
        - COMPUTE_INSTANCE_STATE_RUNNING / "Running"
        - COMPUTE_INSTANCE_STATE_FAILED / "Failed"
        - COMPUTE_INSTANCE_STATE_DELETING / "Deleting"
        - COMPUTE_INSTANCE_STATE_STOPPING / "Stopping"
        - COMPUTE_INSTANCE_STATE_STOPPED / "Stopped"
        - COMPUTE_INSTANCE_STATE_PAUSED / "Paused"
      cross_layer_gap: >
        Proto uses SCREAMING_SNAKE enum values (ComputeInstanceState).
        Operator uses PascalCase phase strings (ComputeInstancePhaseType).
        Fulfillment-service maps operator phase → proto state when serving API responses.

    - name: conditions
      proto_field: status.conditions (repeated ComputeInstanceCondition)
      operator_field: status.conditions ([]metav1.Condition)
      ui_prop: status.conditions
      design_note: >
        Conditions are orthogonal health indicators, independent of the phase.
        Each condition has: type, status (TRUE/FALSE/UNKNOWN), last_transition_time, reason, message.
        Source: enhancements/computeinstance-phase-condition-expansion/README.md
      condition_types:
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_PROVISIONED / "Provisioned"
          meaning: Infrastructure resources (KubeVirt VM + storage) allocated
          granular_reasons:
            - Initialized: operator has started provisioning
            - TenantNotReady: tenant namespace not ready
            - WaitingForVM: waiting for KubeVirt VM creation
            - ProvisioningStorage: storage PVC provisioning in progress
            - InfrastructureReady: KubeVirt VM exists and storage complete
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_CONFIGURATION_APPLIED / "ConfigurationApplied"
          meaning: Desired spec config applied (desiredConfigVersion == reconciledConfigVersion)
          notes: Mirrors KubeVirt configuration reconciliation state
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_READY / "Ready"
          meaning: VM reachable per readiness check (infrastructure readiness, not guest OS boot)
          notes: Mirrors KubeVirt VirtualMachineReady condition; populated at status.internal_ip_address
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_IN_PROGRESS / "RestartInProgress"
          meaning: Power cycle in progress
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_FAILED / "RestartFailed"
          meaning: Restart attempt failed
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_RESTART_REQUIRED / "RestartRequired"
          meaning: Spec changes pending a restart to take effect (synced from KubeVirt VM.Status.Conditions)
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_RESTORE_IN_PROGRESS / "RestoreInProgress"
          meaning: KubeVirt VirtualMachineRestore CR created and executing (OSAC-55)
        - type: COMPUTE_INSTANCE_CONDITION_TYPE_RESTORE_FAILED / "RestoreFailed"
          meaning: Restore attempt failed; check condition message for details (OSAC-55)

    - name: internal_ip_address
      proto_field: status.internal_ip_address
      operator_field: status.ipAddress
      ui_prop: status.internalIpAddress
      type: string (IPv4/IPv6)
      notes: Populated when state = RUNNING. Empty otherwise.

    - name: public_ip_address
      proto_field: status.public_ip_address
      operator_field: status.publicIPAddress
      ui_prop: status.publicIpAddress
      type: string
      notes: >
        Populated when a PublicIPAttachment referencing this instance reaches READY state.
        The operator watches PublicIP CRs in "Attached" state and mirrors here.

    - name: last_restarted_at
      proto_field: status.last_restarted_at (optional Timestamp)
      operator_field: status.lastRestartedAt (*metav1.Time)
      ui_prop: status.lastRestartedAt
      type: ISO-8601 timestamp
      notes: Set by controller when restart is processed. Used to detect new restart requests.

  operator_only_status_fields:
    - name: virtualMachineReference
      operator_field: status.virtualMachineReference {namespace, kubeVirtVirtualMachineName}
      notes: Internal reference to the KubeVirt VM CR. Not exposed in fulfillment-service API.

    - name: tenantReference
      operator_field: status.tenantReference {name, namespace}
      notes: Internal reference to the Tenant CR. Not exposed in fulfillment-service API.

    - name: desiredConfigVersion
      operator_field: status.desiredConfigVersion (string/hash)
      notes: Hash of desired spec. Compared with reconciledConfigVersion for ConfigurationApplied condition.

    - name: jobs
      operator_field: status.jobs ([]JobStatus)
      notes: History of provision/deprovision jobs. Last N (default 10). Not exposed via public API.

lifecycle:
  design_note: >
    Phase model expanded from 4 → 7 states (enhancements/computeinstance-phase-condition-expansion/README.md).
    Old phases: Progressing, Ready, Failed, Deleting.
    New phases: Starting, Running, Stopping, Stopped, Paused, Failed, Deleting.

  phase_determination_from_kubevirt:
    description: >
      The osac-operator maps KubeVirt VirtualMachine PrintableStatus → OSAC phase.
      Priority order (first match wins):
    logic:
      - condition: DeletionTimestamp set on ComputeInstance CR → phase=Deleting
      - condition: KubeVirt VM does not exist → phase=Starting
      - condition: PrintableStatus=Starting → phase=Starting
      - condition: PrintableStatus=Running AND VMI Paused condition=True → phase=Paused
      - condition: PrintableStatus=Running → phase=Running
      - condition: PrintableStatus=Stopping → phase=Stopping
      - condition: PrintableStatus=Stopped → phase=Stopped
      - condition: PrintableStatus=ErrorUnschedulable → phase=Failed

  states:
    - name: Starting
      proto_enum: COMPUTE_INSTANCE_STATE_STARTING
      operator_phase: "Starting"
      description: VM is being provisioned or powered on; KubeVirt VM not yet running

    - name: Running
      proto_enum: COMPUTE_INSTANCE_STATE_RUNNING
      operator_phase: "Running"
      description: VM is running and reachable at internal IP (Ready condition=True)

    - name: Stopping
      proto_enum: COMPUTE_INSTANCE_STATE_STOPPING
      operator_phase: "Stopping"
      description: VM is being powered off (run_strategy changed to Halted; hypervisor shutting down)

    - name: Stopped
      proto_enum: COMPUTE_INSTANCE_STATE_STOPPED
      operator_phase: "Stopped"
      description: VM is powered off (run_strategy=Halted; hypervisor confirmed off)

    - name: Paused
      proto_enum: COMPUTE_INSTANCE_STATE_PAUSED
      operator_phase: "Paused"
      description: VM is paused by hypervisor (KubeVirt VMI Paused condition=True)

    - name: Failed
      proto_enum: COMPUTE_INSTANCE_STATE_FAILED
      operator_phase: "Failed"
      description: VM is in an error state; check conditions for details (e.g. ErrorUnschedulable)

    - name: Deleting
      proto_enum: COMPUTE_INSTANCE_STATE_DELETING
      operator_phase: "Deleting"
      description: Delete request received; KubeVirt VM cleanup in progress

  transitions:
    - from: [Starting] → Running: Provisioned + ConfigurationApplied + Ready conditions all True
    - from: [Running]  → Stopping: user sets run_strategy=Halted
    - from: [Stopping] → Stopped: hypervisor confirms power-off
    - from: [Stopped]  → Starting: user sets run_strategy=Always
    - from: [Running]  → Paused: hypervisor pauses VM (KubeVirt VMI Paused=True)
    - from: [any]      → Deleting: user calls DELETE /compute_instances/{id}
    - from: [any]      → Failed: provisioning or reconciliation error

  snapshot_restore_fields:
    description: >
      Two new mutable fields added to ComputeInstanceSpec for in-place restore (OSAC-55).
      See domains/compute-instance-snapshots.yaml for full restore workflow.
    fields:
      - name: restore_from_snapshot
        proto_field: spec.restore_from_snapshot (optional string)
        type: string (ComputeInstanceSnapshot ID)
        mutable: true
        notes: Snapshot must be in Ready phase and belong to this ComputeInstance.

      - name: restore_requested_at
        proto_field: spec.restore_requested_at (optional Timestamp)
        type: ISO-8601 timestamp
        mutable: true
        notes: >
          Set to current timestamp to signal restore intent (same pattern as restart_requested_at).
          Controller executes restore when restore_requested_at > status.last_restored_at.
          VM must be Stopped (run_strategy=Halted) before controller will execute restore.

    new_status_field:
      name: last_restored_at
      proto_field: status.last_restored_at (optional Timestamp)
      type: ISO-8601 timestamp
      notes: Set by controller on restore completion.

# ──────────────────────────────────────────────────────────────────
# Implementation Workflows (narrative in Markdown blocks)
# ──────────────────────────────────────────────────────────────────

workflows:
  create: |
    ## Create Compute Instance Workflow

    1. **osac-ui** — User fills Create VM Wizard:
       - Selects catalog item OR template
       - Fills template parameters (rendered dynamically from field_definitions)
       - Selects network: VirtualNetwork → Subnet → (optional) SecurityGroups
       - Configures run_strategy, ssh_key, user_data, image (if not fixed by catalog)
       - Submits form

    2. **fulfillment-service** — POST /api/fulfillment/v1/compute_instances:
       - Validates spec fields, resolves catalog item if used
       - Persists ComputeInstance resource with state=STARTING
       - Creates ComputeInstance CR in osac-operator hub cluster namespace
       - Returns 201 with resource envelope (id, metadata, spec, status)

    3. **osac-operator** — Reconciler detects new ComputeInstance CR:
       - Resolves subnet CR name from fulfillment subnet ID
       - Determines target namespace (from subnet-namespace annotation)
       - Calls AAP playbook: playbook_osac_create_compute_instance.yml
       - Tracks job in status.jobs

    4. **osac-aap** — playbook_osac_create_compute_instance.yml:
       - Creates KubeVirt VirtualMachine CR in tenant namespace
       - Configures NICs, disks, cloud-init via KubeVirt API
       - Reports job success/failure back to operator

    5. **osac-operator** — Post-provisioning reconciliation:
       - Sets Provisioned condition = True when KubeVirt VM exists
       - Watches KubeVirt VMI for IP address → sets status.ipAddress
       - Sets ConfigurationApplied condition when desiredConfigVersion matches
       - Sets Ready condition when readiness check passes
       - Sets phase = Running

    6. **fulfillment-service** — Status propagation:
       - Watches operator CRD for status changes
       - Maps operator phase/conditions → proto state/conditions
       - Available to UI via GET /compute_instances/{id} or Events SSE stream

  update: |
    ## Update Compute Instance Workflow

    Only mutable fields can be updated: run_strategy, security_groups (per NIC), restart_requested_at.

    1. **osac-ui** — User actions: Start/Stop button sets run_strategy; Restart button sets restart_requested_at=NOW
    2. **fulfillment-service** — PUT /compute_instances/{id}: validates mutable fields only, updates CRD
    3. **osac-operator** — Reconciler detects spec change:
       - For run_strategy: sets KubeVirt VM running/stopped
       - For restart_requested_at > lastRestartedAt: triggers power cycle via AAP
       - For securityGroupRefs: updates NetworkPolicy (or equivalent)
    4. **fulfillment-service** — Reflects updated status to UI

  delete: |
    ## Delete Compute Instance Workflow

    1. **osac-ui** — User confirms delete action
    2. **fulfillment-service** — DELETE /compute_instances/{id}: sets deletion_timestamp, state→DELETING
    3. **osac-operator** — Finalizer triggers deprovision:
       - Calls playbook_osac_delete_compute_instance.yml
       - AAP deletes KubeVirt VM and associated resources
       - Operator removes finalizer, CR is garbage-collected
    4. **fulfillment-service** — Resource removed from API (returns 404 after deletion)

  console_access: |
    ## VM Console Access

    Uses a dedicated gRPC bidirectional streaming endpoint (not REST).
    - Proto: osac.public.v1.ConsoleService / ConsoleProxyService
    - Source: proto/public/osac/public/v1/console_service.proto
    - UI flow: specs/osac/ui-flows/manage-virtual-machines.yaml (console tab)

cross_layer_gaps:
  - field: user_data
    gap: >
      Proto carries raw string payload; operator stores as Kubernetes Secret.
      Fulfillment-service creates the Secret; agent should not attempt to read/write
      user_data from the operator CRD directly.

  - field: network_attachments (subnet / security_groups)
    gap: >
      Proto uses fulfillment-service UUIDs; operator uses CR names within the hub namespace.
      The ID→name resolution happens inside fulfillment-service. UI should only use UUIDs.

  - field: status.state vs status.phase
    gap: >
      Proto enum uses SCREAMING_SNAKE (COMPUTE_INSTANCE_STATE_*).
      Operator phase uses PascalCase strings ("Running", "Stopped", etc.).
      Both map identically; the fulfillment-service performs the translation.

  - field: template_parameters serialization
    gap: >
      Proto uses map<string, google.protobuf.Any> with @type discriminator.
      Operator stores as JSON-encoded string (templateParameters).
      UI must send ProtoJSON format; fulfillment-service re-serializes for operator.

open_questions:
  - What is the exact annotation or mechanism for subnet → namespace resolution in the operator?
  - Is there a quota/limit on compute instances per tenant?
  - How does the UI discover available images (OCI image URLs) for the image field?
  - What fields does the catalog item fix vs. leave open for user input?
  - Does the private API have additional admin-only fields not in the public proto?
  - How is desiredConfigVersion (hash) computed — from which fields?

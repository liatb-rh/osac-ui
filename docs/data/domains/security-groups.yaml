# OSAC Domain Spec — Security Groups
# Sources:
#   proto/public/osac/public/v1/security_group_type.proto
#   Projects/osac-backends/osac-operator/api/v1alpha1/securitygroup_types.go
#   Projects/osac-backends/fulfillment-service/FRONTEND-SPEC.md §11
#   specs/osac/ui-flows/manage-networks.yaml
#   OSAC-1008 (Netris Backend — Internal Network API), OSAC-1029 (Networking API)

domain: security-groups
title: Security Groups
status: draft
owner: ""

layers:
  fulfillment_service:
    proto_package: osac.public.v1
    key_messages:
      - SecurityGroup
      - SecurityGroupSpec
      - SecurityGroupStatus
      - SecurityRule
    api_base: /api/fulfillment/v1/security_groups
    operations:
      - GET    /security_groups              # List
      - GET    /security_groups/{id}         # Get
      - POST   /security_groups              # Create
      - PUT    /security_groups/{id}         # Update (ingress/egress rules are mutable)
      - DELETE /security_groups/{id}         # Delete
    proto_source: proto/public/osac/public/v1/security_group_type.proto

  osac_operator:
    crd_group: osac.redhat.com
    crd_kind: SecurityGroup    # TODO: confirm
    crd_version: v1alpha1
    managed_by: osac-operator
    source: Projects/osac-backends/osac-operator/api/v1alpha1/securitygroup_types.go

  osac_aap:
    playbooks:
      - playbook_osac_create_security_group.yml
      - playbook_osac_delete_security_group.yml
    triggered_by: osac-operator
    notes: "TODO: is there an update playbook for rule changes?"

  osac_ui:
    ui_flow: specs/osac/ui-flows/manage-networks.yaml
    notes: >
      Security groups are managed within the network management UI.
      Rules can be added/removed after creation (mutable).
      SecurityGroups must be attached to ComputeInstance NICs to take effect.

data_model:
  spec_fields:
    - name: virtual_network
      proto_field: spec.virtual_network
      operator_field: ""    # TODO
      ui_prop: spec.virtualNetwork
      type: string (VirtualNetwork ID)
      mutable: false
      notes: >
        REQUIRED and IMMUTABLE. SecurityGroups are scoped to one VirtualNetwork.
        Cannot be used across different VirtualNetworks.
        Establishes resource hierarchy for garbage collection
        (osac.openshift.io/owner-reference annotation → parent VirtualNetwork ID).
        Parent VirtualNetwork must be in READY state.

    - name: ingress
      proto_field: spec.ingress (repeated SecurityRule)
      operator_field: ""    # TODO
      ui_prop: spec.ingress
      type: array of SecurityRule
      mutable: true
      notes: >
        MUTABLE. Inbound traffic rules. Default-deny if no rules match.
        Order matters — first matching rule determines outcome.

    - name: egress
      proto_field: spec.egress (repeated SecurityRule)
      operator_field: ""    # TODO
      ui_prop: spec.egress
      type: array of SecurityRule
      mutable: true
      notes: >
        MUTABLE. Outbound traffic rules. Default-deny if no rules match.

  security_rule_fields:
    proto_message: SecurityRule
    fields:
      - name: protocol
        type: Protocol enum — TCP | UDP | ICMP | ALL
        notes: PROTOCOL_ALL matches any protocol; port fields ignored for ICMP and ALL.

      - name: port_from
        type: optional int32 (1–65535)
        notes: Required for TCP/UDP. Ignored for ICMP/ALL. Must be <= port_to.

      - name: port_to
        type: optional int32 (1–65535)
        notes: Required for TCP/UDP. Single port: set port_from = port_to.

      - name: ipv4_cidr
        type: optional string (CIDR)
        notes: >
          Source CIDR (ingress) or destination CIDR (egress).
          Use "0.0.0.0/0" for all IPv4. Leave empty for IPv6-only rules.

      - name: ipv6_cidr
        type: optional string (CIDR)
        notes: Use "::/0" for all IPv6. Leave empty for IPv4-only rules.

    dual_stack_behavior: >
      Setting both ipv4_cidr and ipv6_cidr creates two separate rules internally.
      The UI should handle dual-stack rules as a single logical entry.

  status_fields:
    - name: state
      proto_field: status.state (SecurityGroupState enum)
      operator_field: ""    # TODO
      ui_prop: status.state
      type: enum
      values:
        - SECURITY_GROUP_STATE_UNSPECIFIED → unknown
        - SECURITY_GROUP_STATE_PENDING → being configured
        - SECURITY_GROUP_STATE_READY → rules active and enforced
        - SECURITY_GROUP_STATE_FAILED → error (terminal; requires recreation)
        - SECURITY_GROUP_STATE_DELETING → deletion in progress
        - SECURITY_GROUP_STATE_DELETE_FAILED → deletion failed

    - name: message
      proto_field: status.message (optional string)
      operator_field: ""    # TODO
      ui_prop: status.message
      type: string
      notes: Error detail for FAILED states.

lifecycle:
  firewall_model: "stateful default-deny"
  notes: >
    Return traffic for established connections is automatically allowed.
    Only explicitly allowed traffic passes. If no rules match, traffic is blocked.
    SecurityGroups must be in READY state to be attached to ComputeInstances.

  states:
    - PENDING: Validating rules, configuring firewall backend
    - READY: Rules active and enforced
    - FAILED: Terminal error — delete and recreate
    - DELETING: Cleanup in progress
    - DELETE_FAILED: Deletion failed — manual intervention may be needed

  attachment: >
    SecurityGroups are attached to ComputeInstances via spec.networkAttachments[i].securityGroupRefs.
    This field is MUTABLE on ComputeInstance — groups can be added/removed without recreating the VM.

workflows:
  create: |
    ## Create Security Group Workflow

    Pre-condition: Parent VirtualNetwork must be in READY state.

    1. **osac-ui** — User selects parent VirtualNetwork, defines ingress/egress rules
    2. **fulfillment-service** — POST /security_groups: validates rules (port ranges, CIDRs, parent VNet READY)
    3. **osac-operator** — SecurityGroup CR reconciler calls playbook_osac_create_security_group.yml
    4. **osac-aap** — Playbook configures OVN/NetworkPolicy firewall rules in the network backend
    5. **osac-operator** — Updates SecurityGroup status: PENDING → READY
    6. **fulfillment-service** — SecurityGroup available for attachment to ComputeInstances

  update_rules: |
    ## Update Security Group Rules Workflow

    1. **osac-ui** — User adds/removes ingress or egress rules
    2. **fulfillment-service** — PUT /security_groups/{id}: updates spec.ingress and/or spec.egress
    3. **osac-operator** — Reconciler detects rule diff:
       - TODO: determine if this calls an update playbook or re-runs create playbook
    4. **osac-aap** — Applies updated rules to firewall backend
    5. All attached ComputeInstances immediately reflect the new rules (no VM restart needed)

  delete: |
    ## Delete Security Group Workflow

    Pre-condition: SecurityGroup must not be referenced by any ComputeInstance NICs.

    1. **osac-ui** — User confirms deletion; UI should warn if SecurityGroup is attached to VMs
    2. **fulfillment-service** — DELETE /security_groups/{id}: validates no ComputeInstances reference it
    3. **osac-operator** — Finalizer calls playbook_osac_delete_security_group.yml
    4. **osac-aap** — Removes firewall rules from network backend
    5. **fulfillment-service** — Resource removed

backend_mapping:
  netris:
    rule_type: Netris ACL (Access Control List)
    description: >
      When the parent VirtualNetwork uses network_class = "netris", SecurityGroup rules are
      implemented as Netris ACLs. The Netris controller manages ACLs per V-Net.
      Ingress and egress rules in the OSAC spec translate directly to Netris ACL entries.
    jira: OSAC-1008 (Internal Network API work area)
    notes: >
      Netris ACLs are stateful (return traffic is automatically allowed).
      Rule evaluation order in Netris may differ from the OSAC proto ordering model —
      need to confirm if Netris uses priority-based or ordered-list ACL evaluation.

  udn-net:
    rule_type: OVN ACL / NetworkPolicy
    description: Rules implemented as OVN-Kubernetes NetworkPolicy or OVN ACL entries.

cross_layer_gaps:
  - gap: >
      SecurityGroup operator CRD types need to be read to confirm field names
      (securitygroup_types.go).

  - gap: >
      The UI must prevent SecurityGroup deletion while it is referenced by ComputeInstances.
      The fulfillment-service should enforce this server-side (409 or 412 error), but the
      UI should also perform a client-side check for better UX.

  - gap: >
      Update workflow (rule changes) AAP playbook not yet confirmed. Need to determine
      if there is a dedicated update playbook or if the create playbook is idempotent.

  - gap: >
      Netris ACL rule ordering: OSAC proto uses ordered list (first match wins).
      Need to confirm if Netris uses priority numbers or positional ordering for ACL evaluation,
      and whether the operator must translate the OSAC rule list into Netris priority values.

open_questions:
  - What is the SecurityGroup CRD spec in the operator?
  - Is there an update/reconcile playbook for rule changes, or does the operator apply diffs directly?
  - For Netris: does the operator call the Netris ACL API directly or via AAP playbook?
  - For Netris: how does Netris ACL evaluation order map to OSAC SecurityRule list order?
  - Can a SecurityGroup be shared across multiple ComputeInstances in the same VirtualNetwork?
  - What is the maximum number of rules per SecurityGroup?

# OSAC Domain Spec — Events (Activity Feed)
# Sources:
#   proto/public/osac/public/v1/event_type.proto
#   Projects/osac-backends/fulfillment-service/FRONTEND-SPEC.md §24
#   specs/osac/ui-flows/recent-activities.yaml

domain: events
title: Events (Activity Feed / Recent Activities)
status: draft
owner: ""

overview: >
  The Events resource provides a real-time and historical stream of resource lifecycle events.
  It is used to power the "Recent Activities" feed in the UI and to enable reactive UI updates
  (e.g. auto-refreshing a VM's status when it transitions to RUNNING without polling).

  Delivery mechanism: Server-Sent Events (SSE) over HTTP or native gRPC streaming.
  The UI can subscribe to events globally or filter by resource type/tenant.

layers:
  fulfillment_service:
    proto_package: osac.public.v1
    key_messages:
      - Event
    api_base: /api/fulfillment/v1/events
    operations:
      - GET /events    # SSE stream (HTTP) or gRPC stream — filter by resource type, tenant, time range
    proto_source: proto/public/osac/public/v1/event_type.proto
    transport:
      sse: "GET /api/fulfillment/v1/events — HTTP Server-Sent Events stream"
      grpc: "osac.public.v1.EventsService.Watch — bidirectional gRPC stream"

  osac_ui:
    ui_flow: specs/osac/ui-flows/recent-activities.yaml
    notes: >
      The Recent Activities page subscribes to the events stream and renders a feed
      of resource lifecycle events (create, update, delete, state transitions).
      Individual resource detail pages may also use events to update status without polling.

data_model:
  proto_message: osac.public.v1.Event
  source: proto/public/osac/public/v1/event_type.proto
  fields:
    # TODO: read event_type.proto to populate exact fields
    - name: id
      type: string (UUID)
      notes: Unique event identifier.

    - name: metadata
      type: Metadata
      notes: Standard metadata (timestamp, tenant, etc.).

    - name: resource_type
      proto_field: ""    # TODO: confirm field name
      type: string (e.g. "ComputeInstance", "Cluster")
      notes: The type of resource that generated this event.

    - name: resource_id
      proto_field: ""    # TODO: confirm
      type: string (UUID of the affected resource)

    - name: action
      proto_field: ""    # TODO: confirm
      type: string enum (e.g. Created | Updated | Deleted | StateChanged)

    - name: timestamp
      proto_field: ""    # TODO: confirm
      type: google.protobuf.Timestamp

    - name: details
      proto_field: ""    # TODO: confirm
      type: string or structured object
      notes: Human-readable description of the event.

    - name: actor
      proto_field: ""    # TODO: confirm
      type: string (user ID or system component)
      notes: Who or what triggered the event.

stream_filtering:
  description: >
    The events stream supports filtering to reduce noise. Common filters:
  filters:
    - resource_type: filter by ComputeInstance, Cluster, etc.
    - tenant: filter by tenant ID (enforced server-side for auth)
    - resource_id: filter to a specific resource (for detail page polling replacement)
    - from: start time for historical events
    - to: end time (for historical queries only)

ui_usage_patterns:
  recent_activities_feed:
    description: "Global activity feed — all events in the tenant"
    implementation: >
      Subscribe to SSE stream with no resource filter. Render events as a timeline list.
      Paginate historical events with an offset/limit query.

  reactive_resource_status:
    description: "Auto-update resource state without polling"
    implementation: >
      When viewing a ComputeInstance detail page, subscribe to events filtered by resource_id.
      When an event indicates a state change (e.g. Starting → Running), update the UI
      without requiring a manual refresh or polling loop.
    benefit: Eliminates need for polling on resource detail pages.

workflows:
  event_consumption: |
    ## Consuming Events in the UI

    1. **osac-ui** — On mount: open SSE connection to GET /events?tenant=<id>&from=<now>
    2. **fulfillment-service** — Streams events as they are generated by resource mutations
    3. **osac-ui** — On each event: append to activity feed; optionally refresh resource in local cache
    4. **osac-ui** — On page unload / unmount: close SSE connection to free server resources

  event_generation: |
    ## How Events are Generated

    1. Any mutation to a resource (create, update, delete, status change) generates an event
    2. **fulfillment-service** — Persists event to event store after applying the mutation
    3. Events are fanned out to active SSE/gRPC subscribers
    4. Historical events are queryable via the same endpoint with time range filters

cross_layer_gaps:
  - gap: >
      Event proto schema (event_type.proto) not yet fully read. The exact field names,
      action enum values, and filtering capabilities need verification.

  - gap: >
      SSE reconnection handling: the UI must implement reconnect-on-disconnect logic
      with a last-event-ID mechanism to avoid missing events during network interruptions.
      The fulfillment-service SSE endpoint should support Last-Event-ID header.

open_questions:
  - What is the full Event proto schema?
  - What action/type enum values are defined?
  - Does the SSE endpoint support Last-Event-ID for reconnection without gaps?
  - How long are events retained? Is there a TTL or max event count?
  - Are events delivered in-order per resource? Or globally ordered?
  - Is there a separate events endpoint for the private (provider admin) API?

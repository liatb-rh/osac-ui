# OSAC Error Code Reference
# Source: fulfillment-service FRONTEND-SPEC.md §27, proto error conventions

error_model:
  transport: HTTP/JSON (gRPC-Gateway) and native gRPC
  format: >
    HTTP errors follow RFC 7807 / gRPC-Gateway error envelope.
    gRPC status codes map to HTTP status codes per Google API conventions.

http_status_codes:
  400:
    meaning: Bad Request — validation failure
    common_causes:
      - Required field missing
      - Field value out of allowed range
      - Invalid CIDR notation
      - Immutable field change attempted
      - Conflicting fields (e.g. template + catalog_item both set)

  401:
    meaning: Unauthorized — missing or invalid auth token
    ui_action: Redirect to login

  403:
    meaning: Forbidden — authenticated but insufficient permissions
    ui_action: Show permission-denied banner; do not redirect

  404:
    meaning: Not Found — resource does not exist or is not visible to the caller

  409:
    meaning: Conflict — optimistic concurrency or duplicate resource
    common_causes:
      - Stale version on update (use latest version field)
      - Duplicate name within tenant

  412:
    meaning: Precondition Failed — dependency not in required state
    common_causes:
      - Parent VirtualNetwork not in READY state
      - PublicIP not in ALLOCATED state
      - ComputeInstance not in RUNNING state (for attachment)

  422:
    meaning: Unprocessable Entity — semantic validation failure
    # TODO: confirm if fulfillment-service uses 422 or returns as 400

  429:
    meaning: Too Many Requests — rate limit exceeded
    ui_action: Show retry-after message; back off before retrying

  500:
    meaning: Internal Server Error — unexpected server-side failure
    ui_action: Show generic error; log correlation ID from response body

  503:
    meaning: Service Unavailable — fulfillment-service or dependency unavailable
    ui_action: Show maintenance banner if persistent

grpc_status_codes:
  # Standard gRPC → HTTP mapping used by gRPC-Gateway
  INVALID_ARGUMENT: 400
  NOT_FOUND: 404
  ALREADY_EXISTS: 409
  PERMISSION_DENIED: 403
  UNAUTHENTICATED: 401
  RESOURCE_EXHAUSTED: 429
  FAILED_PRECONDITION: 412
  ABORTED: 409
  INTERNAL: 500
  UNAVAILABLE: 503

resource_specific_errors:
  # TODO: populate per-resource error reasons as they are discovered
  ComputeInstance:
    - code: INVALID_ARGUMENT
      reason: "subnet not in READY state"
    - code: INVALID_ARGUMENT
      reason: "security group belongs to different VirtualNetwork"

  PublicIP:
    - code: FAILED_PRECONDITION
      reason: "pool has no available addresses"
    - code: FAILED_PRECONDITION
      reason: "PublicIP is currently attached — detach first"

  PublicIPAttachment:
    - code: FAILED_PRECONDITION
      reason: "PublicIP not in ALLOCATED state"
    - code: FAILED_PRECONDITION
      reason: "ComputeInstance not in RUNNING state"
    - code: ALREADY_EXISTS
      reason: "PublicIP is already attached"

  VirtualNetwork:
    - code: INVALID_ARGUMENT
      reason: "NetworkClass does not support requested capabilities"

  Subnet:
    - code: INVALID_ARGUMENT
      reason: "CIDR overlaps with existing subnet in same VirtualNetwork"
    - code: INVALID_ARGUMENT
      reason: "CIDR not a subset of parent VirtualNetwork CIDR"

ui_error_handling_guidelines:
  - Always display the `message` field from the error body in the UI toast/alert.
  - For 400/412/422: highlight the specific field that failed validation if identifiable.
  - For 409 (version conflict): silently refresh and retry the operation once.
  - For 401: clear local auth state and redirect to /login.
  - For 403: show inline banner — do NOT redirect.
  - For 5xx: show a generic error with a "Try again" action; log to telemetry.
  - Include the correlation/request ID in error displays for support escalation.

open_questions:
  - Does the fulfillment-service include a `request_id` or `trace_id` in error responses?
  - Are there quota/limit errors (e.g. max VMs per tenant) and what is their error code?

# OSAC Technical Design Specs — Master Index
# Purpose:
#   Cross-layer alignment between osac-ui (frontend) and all OSAC backend components.
#   Read this file first to understand the spec structure and locate domain specs.

version: "1.2"
last_updated: "2026-06-18"

motivation: >
  These specs exist to align data objects, API contracts, and implementation workflows
  across all OSAC layers: osac-ui, fulfillment-service, osac-operator, osac-aap (AAP),
  osac-installer, bare-metal-fulfillment-operator, and sac-massopencloud-templates.
  Future agents working on OSAC should read the relevant domain spec before making
  code changes to ensure cross-layer consistency.

spec_locations:
  global:
    - path: data/osac/global/resource-envelope.yaml
      description: "Shared Resource envelope, Metadata, Condition, ListResponse patterns"

    - path: data/osac/global/rbac-model.yaml
      description: "Roles, RoleBindings, Organization/Tenant RBAC scoping"

    - path: data/osac/global/error-codes.yaml
      description: "HTTP/gRPC error codes, per-resource error reasons, UI handling guidelines"

  domains:
    - id: compute-instances
      path: data/osac/domains/compute-instances.yaml
      title: "Compute Instances (VMs)"
      status: draft
      proto_message: osac.public.v1.ComputeInstance
      operator_crd: ComputeInstance (v1alpha1)
      fulfillment_api: /api/fulfillment/v1/compute_instances
      ui_flows: [manage-virtual-machines, create-virtual-machine-wizard]
      aap_playbooks: [create_compute_instance, delete_compute_instance]

    - id: clusters
      path: data/osac/domains/clusters.yaml
      title: "Clusters (CaaS — Hosted OpenShift)"
      status: draft
      proto_message: osac.public.v1.Cluster
      operator_crd: ClusterOrder (v1alpha1)
      fulfillment_api: /api/fulfillment/v1/clusters
      ui_flows: [manage-clusters]
      aap_playbooks: [create_hosted_cluster, create_hosted_cluster_post_install, delete_hosted_cluster, report_hosted_cluster_status]

    - id: baremetal-instances
      path: data/osac/domains/baremetal-instances.yaml
      title: "Bare Metal Instances (BMaaS)"
      status: draft
      proto_message: osac.public.v1.BareMetalInstance
      operator_crd: "TODO (bare-metal-fulfillment-operator)"
      fulfillment_api: /api/fulfillment/v1/baremetal_instances
      ui_flows: [manage-baremetal, manage-baremetal-inventory]
      aap_playbooks: [create_bare_metal_instance, delete_bare_metal_instance]

    - id: virtual-networks
      path: data/osac/domains/virtual-networks.yaml
      title: "Virtual Networks"
      status: draft
      proto_message: osac.public.v1.VirtualNetwork
      operator_crd: "VirtualNetwork (v1alpha1, TODO: confirm)"
      fulfillment_api: /api/fulfillment/v1/virtual_networks
      ui_flows: [manage-networks]
      aap_playbooks: [create_virtual_network, delete_virtual_network]

    - id: subnets
      path: data/osac/domains/subnets.yaml
      title: "Subnets"
      status: draft
      proto_message: osac.public.v1.Subnet
      operator_crd: "Subnet (v1alpha1, TODO: confirm)"
      fulfillment_api: /api/fulfillment/v1/subnets
      ui_flows: [manage-networks]
      aap_playbooks: [create_subnet, delete_subnet]
      dependency: virtual-networks

    - id: security-groups
      path: data/osac/domains/security-groups.yaml
      title: "Security Groups"
      status: draft
      proto_message: osac.public.v1.SecurityGroup
      operator_crd: "SecurityGroup (v1alpha1, TODO: confirm)"
      fulfillment_api: /api/fulfillment/v1/security_groups
      ui_flows: [manage-networks]
      aap_playbooks: [create_security_group, delete_security_group]
      dependency: virtual-networks

    - id: public-ips
      path: data/osac/domains/public-ips.yaml
      title: "Public IPs, Public IP Pools, and Public IP Attachments"
      status: draft
      proto_messages:
        - osac.public.v1.PublicIPPool
        - osac.public.v1.PublicIP
        - osac.public.v1.PublicIPAttachment
      operator_crds:
        - PublicIPPool (v1alpha1)
        - PublicIP (v1alpha1)
        - PublicIPAttachment (v1alpha1)
      fulfillment_apis:
        - /api/fulfillment/v1/public_ip_pools
        - /api/fulfillment/v1/public_ips
        - /api/fulfillment/v1/public_ip_attachments
      ui_flows: [manage-public-ips]
      aap_playbooks: [create_public_ip, delete_public_ip, attach_public_ip, detach_public_ip]

    - id: storage
      path: data/osac/domains/storage.yaml
      title: "Storage (Tiers, Backends, Volumes)"
      status: draft
      proto_messages: []    # storage is not in fulfillment-service proto
      operator_crd: "TODO — osac-installer or dedicated storage operator"
      fulfillment_api: "TODO"
      ui_flows: [manage-storage-tiers, manage-storage-volumes, manage-storage-backends]
      aap_playbooks: [configure_tenant_storage, delete_tenant_storage]
      notes: "Storage API source is osac-installer — not yet mapped. Add context manually."

    - id: catalog-items
      path: data/osac/domains/catalog-items.yaml
      title: "Catalog Items & Templates (Compute, Cluster, Bare Metal)"
      status: draft
      proto_messages:
        - osac.public.v1.ComputeInstanceCatalogItem
        - osac.public.v1.ClusterCatalogItem
        - osac.public.v1.BareMetalInstanceCatalogItem
        - osac.public.v1.FieldDefinition
        - osac.public.v1.ComputeInstanceTemplate
        - osac.public.v1.ClusterTemplate
      fulfillment_apis:
        # Catalog items (public: read-only filtered; private: full CRUD)
        - /api/fulfillment/v1/compute_instance_catalog_items
        - /api/fulfillment/v1/cluster_catalog_items
        - /api/fulfillment/v1/baremetal_instance_catalog_items
        # Templates (published by AAP; public: read-only; private: upsert by AAP job)
        - /api/fulfillment/v1/compute_instance_templates
        - /api/fulfillment/v1/cluster_templates
      ui_flows: [manage-catalog-items, tenant-catalog]
      aap_collection: osac.templates
      aap_playbooks:
        - publish_templates    # scheduled job — discovers roles, upserts templates to private API
      aap_template_roles:
        - osac.templates.ocp_virt_vm           # ComputeInstance — Linux + Windows VMs
        - osac.templates.ocp_4_17_small        # Cluster — OCP 4.17, fc430 nodes
        - osac.templates.ocp_4_17_small_github # Cluster — OCP 4.17 with GitHub OAuth
        - osac.templates.ocp_4_20_small_nico   # Cluster — OCP 4.20 on NICo/DGX bare metal
        - osac.templates.ocp_ci_small          # Cluster — OCP 4.17 for CI (ci-worker node)
      notes: >
        Templates are Ansible roles auto-discovered from osac-aap collections by the publish_templates
        job. Catalog items layer on top of templates — a single template can back many catalog items.
        BareMetalInstanceCatalogItem is the ONLY provisioning path for BareMetalInstance (no template
        path). Catalog item visibility controlled by spec.published (bool) + tenant scoping.
        Full schema in domain spec including FieldDefinition protobuf type mapping and all known
        template parameters for each existing template role.

    - id: organizations
      path: data/osac/domains/organizations.yaml
      title: "Organizations, Projects, and Tenants"
      status: draft
      proto_messages:
        - osac.public.v1.Organization
        - osac.public.v1.Project
      operator_crd: "Tenant (v1alpha1)"
      fulfillment_apis:
        - /api/fulfillment/v1/organizations
        - /api/fulfillment/v1/projects
      ui_flows: [provider-administration, tenant-administration]

    - id: identity-providers
      path: data/osac/domains/identity-providers.yaml
      title: "Identity Providers (OIDC)"
      status: draft
      proto_message: osac.public.v1.IdentityProvider
      fulfillment_api: /api/fulfillment/v1/identity_providers
      ui_flows: [institutional-sign-in, welcome-and-role-selection]
      notes: "Uses `name` as primary key (not UUID id) — unique in the API."

    - id: instance-types
      path: data/osac/domains/instance-types.yaml
      title: "Instance Types (VM Compute Resource Bundles)"
      status: draft
      proto_message: "osac.public.v1.InstanceType (OSAC-46, primary key = name)"
      fulfillment_api: /api/fulfillment/v1/instance_types
      notes: >
        Replaces cores/memory_gib at API layer. Fulfillment-service resolves name → values.
        Operator CRD still uses explicit cores/memoryGiB. State lifecycle: ACTIVE/DEPRECATED/OBSOLETE.

    - id: compute-images
      path: data/osac/domains/compute-images.yaml
      title: "Compute Images (VM Image Registry)"
      status: draft
      proto_message: "osac.public.v1.ComputeImage (OSAC-979)"
      fulfillment_api: /api/fulfillment/v1/compute_images
      notes: >
        Replaces raw image.source_ref URL with managed compute_image ID reference.
        Two-tier: global (provider) and tenant-scoped. State lifecycle: AVAILABLE/DEPRECATED/OBSOLETE.

    - id: compute-instance-snapshots
      path: data/osac/domains/compute-instance-snapshots.yaml
      title: "Compute Instance Snapshots"
      status: draft
      proto_message: "osac.public.v1.ComputeInstanceSnapshot (OSAC-55)"
      operator_crd: ComputeInstanceSnapshot (v1alpha1)
      fulfillment_api: /api/fulfillment/v1/compute_instance_snapshots
      ui_flows: [manage-virtual-machines]
      notes: >
        Restore is a declarative signal on ComputeInstance (restore_from_snapshot + restore_requested_at).
        Online and offline snapshots. Cascade-delete on VM deletion. Requires KubeVirt VolumeSnapshot support.

    - id: nat-gateway
      path: data/osac/domains/nat-gateway.yaml
      title: "NAT Gateway (Netris SoftGate DNAT/SNAT)"
      status: draft
      proto_message: "TODO — NATGateway (new resource, OSAC-1008)"
      operator_crd: "NATGateway (v1alpha1, TODO: confirm)"
      fulfillment_api: "TODO — /api/fulfillment/v1/nat_gateways"
      ui_flows: [manage-public-ips]
      backend: netris-only
      jira: OSAC-1008
      notes: >
        New resource introduced by Netris backend. Implements DNAT/SNAT via Netris SoftGate.
        Relationship to PublicIPAttachment TBD — may replace it for Netris networks.
      dependency: [virtual-networks, public-ips]

    - id: events
      path: data/osac/domains/events.yaml
      title: "Events (Activity Feed)"
      status: draft
      proto_message: osac.public.v1.Event
      fulfillment_api: /api/fulfillment/v1/events (SSE or gRPC stream)
      ui_flows: [recent-activities]

backend_systems:
  - name: fulfillment-service
    type: Go gRPC+REST service
    location: Projects/osac-backends/fulfillment-service
    proto: proto/public/osac/public/v1/ (public) and proto/private/osac/private/v1/ (admin)
    api_base: /api/fulfillment/v1
    notes: Primary API consumed by osac-ui. Manages resource state and orchestrates operator CRDs.

  - name: osac-operator
    type: Kubernetes operator (Go, controller-runtime)
    location: Projects/osac-backends/osac-operator
    crd_api: osac.redhat.com/v1alpha1
    notes: Reconciles OSAC CRDs; calls AAP playbooks for provisioning.

  - name: osac-aap
    type: Ansible Automation Platform collection
    location: Projects/osac-backends/osac-aap
    github: https://github.com/osac-project/osac-aap
    notes: >
      Ansible playbooks for infrastructure provisioning (VMs, clusters, networking, BM).
      Template roles in the osac.templates collection are auto-discovered and published to the
      fulfillment service private API via the publish_templates scheduled job.
      Template metadata lives in meta/osac.yaml (title, description, template_type, spec_defaults,
      default_node_request, parameters with validation). Parameter types map to protobuf well-known
      type URLs. See catalog-items domain spec for full schema details.

  - name: osac-installer
    type: "External — not in workspace"
    notes: >
      Handles storage backend provisioning and OSAC platform installation.
      Add context manually via chat when working on storage features.

  - name: bare-metal-fulfillment-operator
    type: "External — not in workspace"
    notes: >
      Dedicated operator for BMaaS lifecycle (Metal³/Ironic integration).
      Add context manually via chat when working on bare metal features.

  - name: sac-massopencloud-templates
    type: "External — not in workspace"
    notes: >
      Helm templates and configuration for Mass Open Cloud (MOC) deployments.
      Add context manually via chat when working on MOC-specific features.

  - name: netris-controller
    type: "External third-party — Netris Network Fabric Controller"
    jira: OSAC-1008
    description: >
      Full-stack network fabric controller used as the production networking backend.
      Manages physical network fabric (spine/leaf switches) and software networking.
      Provides: VPC/VRF (→ VirtualNetwork), V-Net/VXLAN (→ Subnet), ACL (→ SecurityGroup),
      IPAM (→ PublicIPPool/PublicIP), SoftGate DNAT/SNAT (→ NATGateway).
    integration_points:
      - osac-operator Netris backend calls Netris controller API
      - Installer must configure Netris controller credentials and connectivity
      - Netris SoftGate node required for NATGateway (DNAT/SNAT)
    caas_integration: OSAC-1136 / OSAC-1137
    notes: >
      Netris is not in the workspace. Add context from OSAC-1008 implementation
      when working on networking features.

frontend:
  - name: osac-ui
    type: React/TypeScript (PatternFly 6, Nx monorepo)
    location: Projects/osac-ui
    ui_specs: specs/osac/ui-flows/
    statecharts: specs/osac/statecharts/ and Projects/osac-ui/docs/specs/statecharts/
    api_consumption: fulfillment-service public API via gRPC-Gateway (REST+JSON)

how_to_use_these_specs:
  - step: 1
    action: >
      Before making OSAC code changes, identify the relevant domain(s) in this INDEX.
      Read the domain spec file(s) to understand field mappings and workflows.

  - step: 2
    action: >
      If the spec has open_questions or TODOs relevant to your change,
      resolve them with the user and update the spec file.

  - step: 3
    action: >
      After implementing changes, update the relevant domain spec to reflect
      any new fields, workflow changes, or resolved open_questions.

  - step: 4
    action: >
      If a change touches a cross_layer_gap, ensure the fix is reflected in BOTH
      the frontend code (osac-ui) and the backend spec/code, and update the gap
      entry to mark it as resolved.

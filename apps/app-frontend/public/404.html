<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OSAC</title>
    <script>
      // GitHub Pages SPA redirect: encode the path into the query string so
      // index.html can restore it and hand off to React Router.
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + 1).join('/') +
          '/?p=' +
          encodeURIComponent(l.pathname.slice(1) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash),
      )
    </script>
  </head>
  <body></body>
</html>
